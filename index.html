    {ctx:"Position: Head of Compliance, RegionsFirst Bank\nThe successful candidate will oversee the bank's regulatory compliance programme, manage a team of eight, and serve as the primary liaison to regulators. A minimum of 10 years' financial services experience is required, including at least three in a senior compliance role.",q:"What experience is specifically required?",opts:["A) 3 years at a central bank","B) 10 years total, including 3 in senior compliance","C) 10 years in compliance only","D) 5 years regulatory experience"],ans:"B) 10 years total, including 3 in senior compliance",exp:"'10 years' experience...at least three in a senior compliance role'."},

"900": {

  listening: [
    {ctx:"Man: Our analysis suggests the proposed acquisition is strategically sound, but the integration risk is material. The target's technology stack is largely proprietary and will require a complete migration over 18 to 24 months. Woman: And what's the impact on run-rate costs during that window? Man: We're modelling a 15 to 20% uplift in IT spend.",q:"What is a key risk identified?",opts:["A) regulatory approval","B) cultural misalignment","C) technology integration complexity","D) talent attrition"],ans:"C) technology integration complexity",exp:"'technology stack is proprietary and will require complete migration'.",audio:"Acquisition risk: proprietary tech stack needs 18-24 month migration, with 15-20% IT cost uplift."},
    {ctx:"Woman: The tribunal's ruling has significant implications. By finding that the restrictive covenant was unreasonably broad, the court has effectively signalled that standard clauses used across the industry may now be unenforceable. Man: That puts us in an awkward position. We'll need to review all contracts with non-compete provisions.",q:"What is the implication of the ruling?",opts:["A) the employee won compensation","B) standard non-compete clauses may be invalid","C) restrictive covenants are now illegal","D) a new tribunal will be required"],ans:"B) standard non-compete clauses may be invalid",exp:"'standard clauses...may now be unenforceable'.",audio:"Tribunal found covenant unreasonably broad — standard industry clauses may now be unenforceable."},
    {ctx:"Narrator: The following is an excerpt from a keynote speech. The notion that digital transformation is primarily a technology problem is one of the most persistent and costly misconceptions in business today. The companies that have failed were not short of capital or software. They lacked the organisational adaptability to embed new processes and the leadership courage to make decisions under conditions of irreducible uncertainty.",q:"What does the speaker identify as the real barrier to digital transformation?",opts:["A) insufficient technology investment","B) lack of customer data","C) organisational adaptability and leadership","D) regulatory constraints"],ans:"C) organisational adaptability and leadership",exp:"'organisational adaptability...leadership courage'.",audio:"Digital transformation failures stem from lack of organisational adaptability and leadership courage, not technology or capital."},
    {ctx:"Man: The independent auditor flagged three material weaknesses: inconsistent revenue recognition practices, insufficient controls around related-party transactions, and lack of a formal whistleblower mechanism. Woman: That last one is particularly concerning from a governance standpoint.",q:"Which weakness concerns the woman most?",opts:["A) revenue recognition","B) related-party controls","C) the absence of a whistleblower mechanism","D) inadequate financial disclosures"],ans:"C) the absence of a whistleblower mechanism",exp:"'That last one is particularly concerning from a governance standpoint'.",audio:"Auditor flagged 3 weaknesses: revenue recognition, related-party controls, and no whistleblower mechanism. Woman: last one is governance concern."},
    {ctx:"Woman: The elasticity data shows that price sensitivity varies significantly by segment. Premium users show near-zero elasticity — they'll absorb increases up to 25%. But the mid-tier cohort has an elasticity of negative 1.4, meaning a 10% price increase would drive approximately 14% churn.",q:"What does the data indicate about mid-tier customers?",opts:["A) they are loyal regardless of price","B) they are insensitive to price changes","C) they are significantly price-sensitive","D) they prefer premium features"],ans:"C) they are significantly price-sensitive",exp:"'elasticity of negative 1.4...10% increase drives 14% churn'.",audio:"Premium users: near-zero price elasticity. Mid-tier: -1.4 elasticity — 10% price rise drives 14% churn."},
    {ctx:"Man: The supply chain audit revealed that three of our Tier 2 suppliers source raw materials from regions with documented labour rights violations. Woman: That exposes us to reputational and regulatory risk, particularly given the incoming supply chain due diligence legislation. Man: We have two options: exit those suppliers or require verified remediation within 90 days.",q:"What risk does the woman highlight?",opts:["A) quality control failure","B) financial exposure","C) reputational and regulatory risk","D) delivery disruption"],ans:"C) reputational and regulatory risk",exp:"'reputational and regulatory risk...due diligence legislation'.",audio:"Tier 2 suppliers sourcing from labour-rights violation regions exposes us to reputational and regulatory risk under incoming legislation."},
    {ctx:"Narrator: Good evening. On behalf of the Board, I want to address the speculation about leadership changes. While we do not comment on personnel matters, I can confirm that our strategic priorities remain unchanged, and the senior leadership team has the Board's full confidence.",q:"What does the speaker confirm?",opts:["A) a leadership change is planned","B) the company strategy will be revised","C) leadership has the Board's confidence","D) a new CEO has been appointed"],ans:"C) leadership has the Board's confidence",exp:"'senior leadership team has the Board's full confidence'.",audio:"Board: strategic priorities unchanged, senior leadership team has full Board confidence."},
    {ctx:"Woman: If we consolidate the three regional data centres into one, we achieve a 30% reduction in operating costs. But the latency impact on Asia-Pacific operations would be material. Man: Have we modelled the impact on customer-facing SLAs? Woman: Yes — we'd breach our 200-millisecond threshold for about 12% of transactions.",q:"What is a downside of consolidation?",opts:["A) higher capital costs","B) staff redundancies","C) latency breaching SLA thresholds","D) loss of data sovereignty"],ans:"C) latency breaching SLA thresholds",exp:"'breach our 200-millisecond threshold for 12% of transactions'.",audio:"Data centre consolidation saves 30% opex but breaches 200ms SLA threshold for ~12% of transactions."},
    {ctx:"Man: The scenario analysis suggests that under a base case, IRR comes in at 14.2%. Under the stress scenario — incorporating a 20% revenue shortfall and 200 basis points of margin compression — the IRR drops to 8.1%, which is below our hurdle rate of 9%.",q:"What happens to the IRR under the stress scenario?",opts:["A) it exceeds the hurdle rate","B) it falls below the hurdle rate","C) it stays above 12%","D) it becomes negative"],ans:"B) it falls below the hurdle rate",exp:"'8.1%, which is below our hurdle rate of 9%'.",audio:"Base case IRR: 14.2%. Stress scenario: 8.1% — below 9% hurdle rate."},
    {ctx:"Woman: The preliminary clinical data is encouraging, but statistical significance wasn't achieved in the secondary endpoints. Man: That's going to complicate the FDA submission. Woman: Agreed. The medical affairs team is exploring whether the existing data supports a narrower indication.",q:"What is a challenge for the FDA submission?",opts:["A) primary endpoints failed","B) secondary endpoints lack significance","C) trial population was too small","D) adverse events were severe"],ans:"B) secondary endpoints lack significance",exp:"'statistical significance wasn't achieved in the secondary endpoints'.",audio:"Secondary endpoints didn't achieve significance — complicating FDA submission. Medical affairs exploring narrower indication."}
  ],
  reading: [
    {ctx:"ACQUISITION AGREEMENT — EXCERPT\n5.3 Representations and Warranties. Each Party represents and warrants that: (a) it has full authority to enter into and perform its obligations under this Agreement; (b) this Agreement has been duly authorised, executed, and delivered by such Party; and (c) this Agreement does not conflict with any existing contractual obligation.\n\nThe Seller further represents that there are no pending or, to the Seller's knowledge, threatened legal proceedings that would materially and adversely affect the Target.",q:"What does the Seller additionally represent?",opts:["A) the target has no debts","B) no known legal proceedings threaten the target materially","C) all employees will be retained","D) financial statements are audited"],ans:"B) no known legal proceedings threaten the target materially",exp:"'no pending or threatened legal proceedings that would materially...affect the Target'."},
    {q:"The redundancy programme will affect a ___ number of roles across the organisation, with operational divisions bearing the greatest impact.",opts:["A) significant","B) signify","C) significantly","D) significance"],ans:"A) significant",exp:"Adjective modifies noun: significant number."},
    {ctx:"Executive Summary — Market Entry Analysis: Southeast Asia\nOur assessment identifies Vietnam and Indonesia as the highest-priority markets based on GDP growth trajectory, demographic dividend, and existing distribution infrastructure. The Philippines, while attractive on demographic metrics, presents elevated entry barriers due to regulatory complexity and entrenched domestic competitors. Thailand is characterised by market saturation in the target segment.\n\nRecommended sequencing: Vietnam first (Q3 entry), Indonesia concurrently or by Q4, with Philippines and Thailand deferred pending regulatory reform.",q:"Why is the Philippines given lower priority?",opts:["A) small market size","B) limited infrastructure","C) regulatory complexity and entrenched competitors","D) low consumer spending"],ans:"C) regulatory complexity and entrenched competitors",exp:"'entry barriers due to regulatory complexity and entrenched domestic competitors'."},
    {q:"___ by the unexpectedly strong Q2 results, the Board revised its full-year guidance upward.",opts:["A) Encouraged","B) Encouraging","C) Having encourage","D) To encourage"],ans:"A) Encouraged",exp:"Participial phrase (passive): Encouraged by... the Board revised."},
    {ctx:"Research Brief: The Productivity Paradox Revisited\nDespite unprecedented investment in digital tools since 2015, aggregate productivity growth across OECD economies has remained stubbornly low — a phenomenon economists have termed the 'digital productivity paradox.' Several explanations have been advanced: a lag effect, whereby transformative gains take years to materialise; mismeasurement, since digital value is poorly captured in GDP statistics; and skill-biased displacement, where productivity gains accrue only to firms with the human capital to exploit new technologies effectively.",q:"Which explanation suggests productivity gains may be underreported?",opts:["A) lag effect","B) mismeasurement","C) skill-biased displacement","D) regulatory burden"],ans:"B) mismeasurement",exp:"'digital value is poorly captured in GDP statistics'."},
    {q:"The restructuring plan ___ board approval is contingent upon regulatory sign-off, which is expected no earlier than Q4.",opts:["A) that received","B) having received","C) which received","D) received"],ans:"A) that received",exp:"Restrictive relative clause: the plan that received board approval."},
    {ctx:"Internal Audit Report — Procurement Function\nFindings: (1) Competitive tendering was bypassed in 38% of contracts above the $50,000 threshold over the review period. (2) Approval authority was exceeded in 14 instances, with contracts authorised by personnel below the required signatory level. (3) Three suppliers were awarded repeat contracts totalling $1.2M without documented performance reviews.\n\nRisk rating: High. Immediate remediation recommended.",q:"Which finding represents the greatest number of non-compliant contracts?",opts:["A) contracts without performance reviews","B) approval authority violations","C) bypassed competitive tendering","D) contracts above $50,000"],ans:"C) bypassed competitive tendering",exp:"'38% of contracts' is the largest category mentioned."},
    {q:"The fund's mandate expressly ___ investment in securities that do not meet the ESG screening criteria.",opts:["A) prohibits","B) prohibit","C) is prohibited","D) has prohibited"],ans:"A) prohibits",exp:"Third person singular: the mandate prohibits."},
    {ctx:"PRESS RELEASE\nGloVertex Inc. today announced a strategic partnership with Arken Logistics to expand same-day delivery coverage to 45 additional metropolitan areas by mid-year. Under the agreement, Arken will operate dedicated micro-fulfilment centres co-located at GloVertex distribution hubs. The arrangement is expected to reduce last-mile delivery costs by approximately 18% and improve delivery density in urban corridors.",q:"What financial benefit is expected from the partnership?",opts:["A) 18% reduction in total logistics costs","B) 18% reduction in last-mile delivery costs","C) 45% cost reduction in urban areas","D) elimination of third-party logistics costs"],ans:"B) 18% reduction in last-mile delivery costs",exp:"'reduce last-mile delivery costs by approximately 18%'."},
    {q:"Notwithstanding the provisions of clause 7, either party may terminate this agreement with immediate effect ___ a material breach that remains uncured after 30 days' written notice.",opts:["A) following","B) in lieu of","C) in the event of","D) subject to"],ans:"C) in the event of",exp:"In the event of = if a certain situation occurs (legal/formal)."}
