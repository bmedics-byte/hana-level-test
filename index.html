  }
  const _isL=sec==='listening';
  if(q.context){if(_isL){h+=`<div class="qctx hidden" id="qctx-hidden" style="position:relative">${q.context}<div id="ctx-cover" style="position:absolute;inset:0;background:var(--color-background-secondary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-text-secondary);gap:6px"><span>🎧</span><span>Script revealed after answering</span></div></div>`;}else{h+=`<div class="qctx">${q.context}</div>`;}}  h+=`<div class="qtext">${q.question}</div>`;

  const isFill=q.type==='fillin';
  if(isFill){
    h+=`<input class="fi" id="fi" placeholder="Type the correct word...">
    <div id="fb" class="hidden fb"></div>
    <div class="navrow">
      <div class="dots">${mkDots()}</div>
      <button class="btn btn-p" onclick="subFill('${esc(q.answer)}','${esc(q.explanation)}','${curSec}','${esc(q.question)}')">${L.sub}</button>
    </div>`;
  }else{
    h+=`<div class="opts" id="ob">
      ${(q.options||[]).map((o,i)=>`<div class="opt" id="op${i}" onclick="pickOpt(${i},'${esc(o)}','${esc(q.answer)}','${esc(q.explanation)}','${curSec}','${esc(q.question)}')">${o}</div>`).join('')}
    </div>
    <div id="fb" class="hidden fb"></div>
    <div class="navrow">
      <div class="dots">${mkDots()}</div>
      <button class="btn btn-p hidden" id="nb" onclick="nextQ()">${L.nq}</button>
    </div>`;
  }
  document.getElementById('qc').innerHTML=h;
}

function mkDots(){
  const tLen=selType==='toeic'||selType==='ielts'?20:selType==='senior'?20:selType==='ketpet'?40:selType==='korean'?42:40;
  return Array.from({length:tLen},(_,i)=>{
    const a=allA[i];
    const cls=i<cq?(a&&!a.ok?'wr':'done'):i===cq?'active':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');
}

const EL={voices:{default:'21m00Tcm4TlvDq8ikWAM'},model:'eleven_turbo_v2_5',apiKey:'f706e654f7c23186d2d3243308b57778a4fba351101d662c516ec591448dc5b6'};
try{EL.apiKey=localStorage.getItem('el_api_key')||EL.apiKey;}catch(e){}
const _audioCache=new Map();
function setPlayBtn(p){const b=document.querySelector('.play');if(!b)return;b.innerHTML=p?'⏹':'▶';b.style.background=p?'#0F6E56':'#1D9E75';}
async function speakEL(s,cb){
  const clean=s.replace(/\bMr\./g,'Mister').replace(/\bDr\./g,'Doctor').replace(/(\d+)%/g,'$1 percent').trim();
  const ck=EL.apiKey.slice(-8)+'|'+clean;
  if(_audioCache.has(ck)){const a=new Audio(_audioCache.get(ck));a.onended=cb;a.play();return true;}
  try{
    const res=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL.voices.default}/stream`,
      {method:'POST',headers:{'xi-api-key':EL.apiKey,'Content-Type':'application/json'},
       body:JSON.stringify({text:clean,model_id:EL.model,voice_settings:{stability:0.45,similarity_boost:0.80,style:0.25,use_speaker_boost:true}})});
    if(!res.ok)throw new Error(res.status);
    const url=URL.createObjectURL(await res.blob());
    _audioCache.set(ck,url);
    const a=new Audio(url);a.onended=cb;a.onerror=()=>cb();a.play();
    return true;
  }catch(e){console.warn('EL TTS fail:',e.message);return false;}
}
function speakBrowser(s,cb){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(s);
  u.lang='en-US';u.rate=0.84;u.pitch=1.05;
  const voices=window.speechSynthesis.getVoices();
  const good=voices.find(v=>['Google US English','Microsoft Aria Online (Natural) - English (United States)','Samantha'].includes(v.name));
  if(good)u.voice=good;
  const ri=setInterval(()=>{if(window.speechSynthesis.paused)window.speechSynthesis.resume();},8000);
  u.onend=u.onerror=()=>{clearInterval(ri);if(cb)cb();};
  window.speechSynthesis.speak(u);
}
let _curAudio=null;
function speak(s){
  if(!s)return;
  if(_curAudio&&!_curAudio.paused){_curAudio.pause();_curAudio=null;setPlayBtn(false);return;}
  if(window.speechSynthesis&&window.speechSynthesis.speaking){window.speechSynthesis.cancel();setPlayBtn(false);return;}
  const atxt=document.getElementById('atxt');
  if(atxt)atxt.innerHTML='<span style="color:#1D9E75;font-size:12px">⏳ Loading...</span>';
  setPlayBtn(true);
  const done=()=>{setPlayBtn(false);if(atxt)atxt.innerHTML='<span style="font-size:11px;color:var(--color-text-secondary)">✓ Done · press ▶ to replay</span>';};
  if(EL.apiKey){speakEL(s,done).then(ok=>{if(!ok)speakBrowser(s,done);});}
  else speakBrowser(s,done);
}

function pickOpt(idx,chosen,ans,exp,sec,q){
  if(answered)return; answered=true;
  const ok=chosen.trim()===ans.trim();
  rec(sec,ok,q,ans,chosen);
  document.querySelectorAll('.opt').forEach((o,i)=>{
    o.classList.add('lk');
    if(o.textContent.trim()===ans.trim())o.classList.add('ok');
    else if(i===idx&&!ok)o.classList.add('bad');
  });
  showCtx();
  showFb(ok,exp);
  const nb=document.getElementById('nb');
  if(nb)nb.classList.remove('hidden');
}

function subFill(ans,exp,sec,q){
  if(answered)return; answered=true;
  const el=document.getElementById('fi');
  const val=(el.value||'').trim().toLowerCase();
  const correct=ans.replace(/^[A-Da-d]\)\s*/,'').trim().toLowerCase();
  const ok=val===correct||(correct.length>2&&val.length>2&&correct.includes(val));
  el.className='fi '+(ok?'ok':'bad');
  el.disabled=true;
  rec(sec,ok,q,ans,el.value.trim());
  showFb(ok,exp);
  const ab=document.getElementById('ab')||document.querySelector('.btn-p');
  if(ab){ab.textContent=L.nq; ab.onclick=nextQ;}
}

function rec(sec,ok,q,ans,mine){
  if(ok){scores[sec]++;diff=Math.min(10,diff+1);}
  else{diff=Math.max(1,diff-1);}
  allA.push({sec,ok,q,ans,mine,num:cq+1});
}

function showFb(ok,exp){
  const fb=document.getElementById('fb');
  if(!fb)return;
  fb.className='fb '+(ok?'ok':'bad');
  fb.textContent=(ok?'✓ '+L.ok:'✗ '+L.bad)+' '+exp;
  fb.classList.remove('hidden');
}

function showCtx(){const cover=document.getElementById('ctx-cover');if(cover)cover.remove();const ctx=document.getElementById('qctx-hidden');if(ctx){ctx.classList.remove('hidden');ctx.style.opacity='0';ctx.style.transition='opacity .4s';setTimeout(()=>{ctx.style.opacity='1';},30);}}

function buildSum(time){
  const isESL = selType==='esl';
  const isTOEIC = selType==='toeic';
  const isIELTS = selType==='ielts';
  const totalQ = (isTOEIC||isIELTS) ? 20 : 40;
  const lv=detectedLevel; const meta=LV_META[lv];
  const eslLv=ESL_FROM_DIFF(diff); const eslM=ESL_META[eslLv]||ESL_META['A1'];
  const toeicBand=TOEIC_FROM_DIFF(diff); const toeicM=TOEIC_META[toeicBand]||TOEIC_META['600'];
  const ieltsBand=IELTS_FROM_DIFF(diff); const ieltsM=IELTS_META[ieltsBand]||IELTS_META['6.0'];
  const tot=Object.values(scores).reduce((a,b)=>a+b,0);
  const pct=Math.round((tot/totalQ)*100);
  const rank=Math.max(5,100-pct);
  const sub=pct>=80?'H':pct>=50?'M':'L';
  const estTOEIC=isTOEIC?`~${toeicBand} pts (est.)`:`~${eslM?.toeic||'—'}`;
  const estIELTS=isIELTS?`Band ~${ieltsBand}`:`~${eslM?.ielts||'—'}`;
  const lvLabel=isESL?eslLv:isTOEIC?`~${toeicBand}`:isIELTS?`Band ${ieltsBand}`:`${meta.label}${sub}`;
  const displayColor=isESL?eslM.color:isTOEIC?toeicM.color:isIELTS?ieltsM.color:meta.color;
  const descLabel=isESL?eslM.score_label:isTOEIC?`TOEIC ${toeicM.desc}`:isIELTS?`IELTS ${ieltsM.desc}`:meta.desc;
  const equivLabel=isESL?`IELTS ~${eslM.ielts} · TOEIC ~${eslM.toeic}`:isTOEIC?`TOEIC score band`:isIELTS?`IELTS band`:meta.equiv;
  const ageLabel=(isESL||isTOEIC||isIELTS)?'Adults 18+':meta.age;
  const date=new Date().toLocaleDateString();
  const gLabel=info.gender==='M'?L.m:info.gender==='F'?L.f:L.o;

  const sRows=SECS.map(sec=>{
    const items=allA.filter(a=>a.sec===sec);
    const raw=items.length?Math.round((scores[sec]/items.length)*100):0;
    const avg=AVG[sec];
    const col=raw>=avg?'#1D9E75':'#E07B20';
    return `<div class="br-row">
      <div class="br-lbl"><span style="font-weight:500">${L.sc[sec]}</span><span>${scores[sec]}/${items.length||10} · <b>${raw}%</b></span></div>
      <div class="br-track">
        <div class="br-fill" data-w="${raw}" style="width:0%;background:${col}"></div>
        <div class="br-avg" style="left:${avg}%"></div>
      </div>
      <div class="br-score" style="color:${col}">${raw>=avg?'▲ Above':'▼ Below'} avg (${avg}%)</div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="rh">
      <div style="font-size:11px;color:var(--muted)">${date}</div>
      <div style="font-size:18px;font-weight:700;color:var(--text);margin:4px 0">${info.name}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${gLabel} · Age ${info.age} · ${info.email}</div>
      <div class="lvbadge" style="background:${displayColor}">${lvLabel}</div>
      <div style="font-size:12px;color:${displayColor};font-weight:600;margin-top:3px">${descLabel}</div>
      <div style="font-size:11px;color:var(--muted)">${equivLabel} · ${ageLabel}</div>
    </div>
    <div class="sg">
      <div class="sc"><div class="sl">${L.ol}</div><div class="sv">${tot}/40</div><div class="ss">${pct}%</div></div>
      <div class="sc"><div class="sl">${L.ts}</div><div class="sv" style="font-size:14px">${time}</div></div>
      <div class="sc"><div class="sl">${L.rk}</div><div class="sv">Top ${rank}%</div></div>
      <div class="sc"><div class="sl">${L.rc}</div><div class="sv" style="font-size:11px;line-height:1.4">${meta.desc}</div></div>
    </div>
    ${isESL?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.1rem">
      <div class="sc"><div class="sl">CEFR Level</div><div class="sv" style="font-size:14px">${eslLv}</div></div>
      <div class="sc"><div class="sl">IELTS Est.</div><div class="sv" style="font-size:14px">${eslM.ielts}</div></div>
      <div class="sc"><div class="sl">TOEIC Est.</div><div class="sv" style="font-size:14px">${eslM.toeic}</div></div>
    </div>`:isTOEIC?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.1rem">
      <div class="sc"><div class="sl">Score Band</div><div class="sv" style="font-size:14px">~${toeicBand}</div></div>
      <div class="sc"><div class="sl">Section: L</div><div class="sv" style="font-size:14px">~${toeicM&&QB_TOEIC[toeicBand]?QB_TOEIC[toeicBand]._meta.listening:'—'}</div></div>
      <div class="sc"><div class="sl">Section: R</div><div class="sv" style="font-size:14px">~${toeicM&&QB_TOEIC[toeicBand]?QB_TOEIC[toeicBand]._meta.reading:'—'}</div></div>
    </div>`:isIELTS?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.1rem">
      <div class="sc"><div class="sl">Band Score</div><div class="sv" style="font-size:14px">${ieltsBand}</div></div>
      <div class="sc"><div class="sl">Listening</div><div class="sv" style="font-size:14px">~${ieltsBand}</div></div>
      <div class="sc"><div class="sl">Reading</div><div class="sv" style="font-size:14px">~${ieltsBand}</div></div>
    </div>`:`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.1rem">
      <div class="sc"><div class="sl">Lexile Est.</div><div class="sv" style="font-size:13px">${meta.lexile}</div></div>
      <div class="sc"><div class="sl">TOEFL Jr. Est.</div><div class="sv" style="font-size:13px">${600+lv*15}–${620+lv*15}</div></div>
      <div class="sc"><div class="sl">AR Index</div><div class="sv" style="font-size:13px">${(lv*0.4).toFixed(1)}–${(lv*0.5).toFixed(1)}</div></div>
    </div>`}
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">${L.br}</div>
    ${sRows}
    <div class="leg"><span><span class="ld" style="background:#1D9E75"></span>Your score</span><span><span class="ld" style="background:#E24B4A"></span>Average</span></div>
    <div class="cta">
      <div class="cta-t">Ready to improve your English at HANA Academy?</div>
      <div class="cta-s">Clark, Philippines · clarkhana.com · Expert Filipino ESL teachers</div>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" onclick="selType==='korean'?dlKoreanPDF():selType==='ketpet'?dlKetPetPDF():dlPDF()">⬇ ${L.dp}</button>
        <button class="btn btn-sm" onclick="window.open('https://clarkhana.com','_blank')">${L.bt}</button>
      </div>
    </div>
  </div>`;
}

function buildAS(){
  let h='<div class="card">';
  SECS.forEach(sec=>{
    const items=allA.filter(a=>a.sec===sec);
    if(!items.length)return;
    h+=`<div class="as-sec">
      <div class="as-st"><span>${L.sc[sec]}</span><span>${scores[sec]}/${items.length} correct</span></div>`;
    items.forEach(a=>{
      h+=`<div class="as-item">
        <div class="as-num ${a.ok?'ok':'bad'}">${a.num}</div>
        <div class="as-body">
          <div class="as-q">${a.q}</div>
          <div class="as-r">
            <span class="as-c">✓ ${a.ans}</span>
            <span class="as-m ${a.ok?'ok':'bad'}">${a.ok?'✓':'✗'} ${a.mine}</span>
          </div>
        </div>
      </div>`;
    });
    h+='</div>';
  });
  return h+'</div>';
}

const KETPET_META = {

  2: {label:'A1',      ket_grade:'Below KET',   pet_grade:'—',            cefr:'A1',     color:'#6EE7B7'},

};

const KP_SECS = ['vocab','reading','listening','writing'];
let kpState = {diff:5, si:0, sq:0, scores:{vocab:0,reading:0,listening:0,writing:0}, used:{vocab:[],reading:[],listening:[],writing:[]}, allA:[], total:40};

function ketpetReset(){
  kpState = {diff:5, si:0, sq:0, scores:{vocab:0,reading:0,listening:0,writing:0}, used:{vocab:[],reading:[],listening:[],writing:[]}, allA:[], total:40};
}

function getKetPetQ(sec, diff){
  const bank = QB_KETPET[sec] || [];
  const avail = bank.filter((_,i) => !kpState.used[sec].includes(i) && Math.abs(bank[i].diff - diff) <= 2);
  const pool  = avail.length ? avail : bank.filter((_,i) => !kpState.used[sec].includes(i));
  if(!pool.length) return null;
  // Pick closest difficulty
  pool.sort((a,b) => Math.abs(a.diff-diff) - Math.abs(b.diff-diff));
  const q = pool[0];
  const idx = bank.indexOf(q);
  kpState.used[sec].push(idx);
  return normalizeQ({...q, _src:'bank', _sec:sec});
}

async function loadKetPetQ(){
  const totalPerSec = 10;
  if(kpState.sq >= totalPerSec){
    kpState.si++;
    kpState.sq = 0;
    if(kpState.si >= KP_SECS.length){ showKetPetResults(); return; }
  }
  const sec = KP_SECS[kpState.si];
  const q = getKetPetQ(sec, kpState.diff) || await genKetPetQ(sec, kpState.diff);
  if(!q){ kpState.sq=10; return loadKetPetQ(); }

  const total = kpState.total;
  const done  = kpState.si*10 + kpState.sq;
  const pct   = Math.round((done/total)*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pbl').textContent = `Q${done+1} of ${total}`;
  document.getElementById('pbr').textContent = sec.charAt(0).toUpperCase()+sec.slice(1);
  document.getElementById('ldr').classList.add('hidden');
  document.getElementById('qc').classList.remove('hidden');
  renderKetPetQ(q, sec);
}

async function genKetPetQ(sec, diff){
  const level = diff<=4?'KET (A2)':'PET (B1)';
  const sLabel = {vocab:'vocabulary multiple choice',reading:'reading comprehension with short text',listening:'listening dialogue comprehension',writing:'grammar fill-in-the-blank'}[sec];
  const langInst = lang==='ko'?'Question in Korean; English words stay in English.':
    lang==='ja'?'Question in Japanese; English words stay in English.':'All in English.';
  const isListenSec = sec==='listening';
  const jsonTemplate = isListenSec
    ? `{"audio":"(dialogue or announcement script to be read aloud, 2-4 sentences)","question":"(the comprehension question)","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A) ...","explanation":"..."}`
    : `{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A) ...","explanation":"...","context":"(short passage for reading, empty for others)"}`;
  const prompt = `Generate a ${level} Cambridge exam ${sLabel} question at difficulty ${diff}/10.
Return ONLY valid JSON:
${jsonTemplate}
${langInst}`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const d = await res.json();
    const txt = d.content[0].text.replace(/```json|```/g,'').trim();
    return normalizeQ({...JSON.parse(txt), _src:'ai', _sec:sec});
  }catch(e){ return null; }
}

function renderKetPetQ(q, sec){
  const L_label = (L.sc&&L.sc[sec]) || sec;
  const isListen = sec === 'listening';
  const audioScript = q.audioScript || q.audio || '';
  const displayQ = q.question || q.q || '';

  let h = `<div class="qmeta">
    <span class="sec-badge">${L_label} · ${kpState.sq+1}/10</span>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="background:${KETPET_META[Math.ceil(kpState.diff/1.25)]?.color||'#1D9E75'};color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600">
        ${kpState.diff<=5?'KET':'PET'}
      </span>
    </div>
  </div>`;

  if(isListen && audioScript){
    // 🎧 듣기: 재생 버튼 표시, 스크립트는 답변 후 공개
    h += `<div class="ab" style="margin-bottom:12px">
      <button class="play" onclick="speak('${esc(audioScript)}')" style="background:#1D9E75;color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">▶</button>
      <div class="at" id="atxt" style="font-size:12px;color:var(--color-text-secondary)">Press ▶ to listen — then answer the question</div>
    </div>
    <div class="qctx hidden" id="qctx-hidden" style="position:relative;margin-bottom:10px">
      ${audioScript}
      <div id="ctx-cover" style="position:absolute;inset:0;background:var(--color-background-secondary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-text-secondary);gap:6px;cursor:default">
        <span>🎧</span><span>Script revealed after answering</span>
      </div>
    </div>`;
  } else if(q.context){
    h += `<div class="qctx">${q.context}</div>`;
  }

  h += `<div class="qtext">${displayQ}</div>`;
  h += `<div class="opts" id="ob">
    ${(q.options||[]).map((o,i)=>`<div class="opt" id="op${i}" onclick="pickKetPetOpt(${i},'${esc(o)}','${esc(q.answer)}','${esc(q.explanation)}','${sec}')">${o}</div>`).join('')}
  </div>
  <div id="fb" class="hidden fb"></div>
  <div class="navrow">
    <div class="dots">${mkKetPetDots()}</div>
    <button class="btn btn-p hidden" id="nb" onclick="nextKetPetQ()">${L.nq||'Next →'}</button>
  </div>`;
  document.getElementById('qc').innerHTML = h;
}

function mkKetPetDots(){
  const done = kpState.si*10 + kpState.sq;
  return Array.from({length:40},(_,i)=>{
    const a = kpState.allA[i];
    const cls = i<done?(a&&!a.ok?'wr':'done'):i===done?'active':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');
}

function pickKetPetOpt(idx, chosen, ans, exp, sec){
  if(answered) return; answered=true;
  const ok = chosen.trim()===ans.trim();
  if(ok){ kpState.scores[sec]++; kpState.diff=Math.min(10,kpState.diff+1); }
  else   { kpState.diff=Math.max(1,kpState.diff-1); }
  showCtx();
  kpState.allA[kpState.si*10+kpState.sq] = {ok,chosen,ans,sec};
  document.querySelectorAll('.opt').forEach((o,i)=>{
    o.classList.add('lk');
    if(o.textContent.trim()===ans.trim()) o.classList.add('ok');
    else if(i===idx&&!ok) o.classList.add('bad');
  });
  const fb=document.getElementById('fb');
  fb.className='fb '+(ok?'ok':'bad');
  fb.textContent=(ok?'✓ '+(L.ok||'Correct!'):'✗ '+(L.bad||'Incorrect.'))+' '+exp;
  fb.classList.remove('hidden');
  const nb=document.getElementById('nb'); if(nb)nb.classList.remove('hidden');
}

function nextKetPetQ(){
  answered=false; kpState.sq++;
  document.getElementById('ldr').classList.remove('hidden');
  document.getElementById('qc').classList.add('hidden');
  setTimeout(loadKetPetQ, 100);
}

function getKetPetLevel(){
  const tot = Object.values(kpState.scores).reduce((s,n)=>s+n,0);

  if(pct>=0.875) return 8;

  if(pct>=0.625) return 6;
  if(pct>=0.500) return 5;
  if(pct>=0.375) return 4;
  if(pct>=0.250) return 3;
  if(pct>=0.125) return 2;
  return 1;
}

  listening: [
    {audio:"The epistemological implications of artificial intelligence challenge long-held assumptions about human cognition. If machines can replicate reasoning processes, we must reconsider what distinguishes genuinely intelligent thought from sophisticated pattern recognition.",q:"What fundamental question does the speaker raise about AI?",opts:["A) whether AI can replace all human jobs","B) what truly distinguishes intelligence from pattern recognition","C) how quickly AI will develop","D) whether AI is safe to use"],ans:"B) what truly distinguishes intelligence from pattern recognition",exp:"What distinguishes genuinely intelligent thought from sophisticated pattern recognition.",diff:8},
    {audio:"The phenomenon of confirmation bias — our tendency to seek information that supports existing beliefs while disregarding contradictory evidence — represents one of the most pervasive impediments to rational decision-making in both individuals and institutions.",q:"What is the speaker's main argument about confirmation bias?",opts:["A) it only affects individuals not institutions","B) it is a minor inconvenience in decision-making","C) it is one of the most widespread obstacles to rational thinking","D) it can be easily overcome with education"],ans:"C) it is one of the most widespread obstacles to rational thinking",exp:"Most pervasive impediments to rational decision-making.",diff:8},
    {audio:"The concept of vicarious trauma has gained increasing recognition in clinical psychology. Professionals who regularly engage with traumatic narratives — therapists, journalists, emergency workers — may internalise distress without having experienced the originating events directly.",q:"What does vicarious trauma refer to in this context?",opts:["A) trauma caused by physical injury","B) distress internalised through exposure to others traumatic experiences","C) trauma that only affects children","D) emotional exhaustion from overwork"],ans:"B) distress internalised through exposure to others traumatic experiences",exp:"Internalise distress without having experienced the originating events directly.",diff:8},
    {audio:"Rhetorical analysis requires examining not only what a text argues, but how it constructs authority, selects evidence, and positions its audience. The same factual claims can be deployed to vastly different persuasive ends depending on the rhetorical frame employed.",q:"What determines the persuasive effect of factual claims?",opts:["A) the length of the argument","B) the credentials of the author","C) the rhetorical frame in which they are presented","D) the vocabulary used"],ans:"C) the rhetorical frame in which they are presented",exp:"Depending on the rhetorical frame employed.",diff:8},
    {audio:"Epigenetics reveals that environmental factors can modify gene expression without altering the underlying DNA sequence. Significantly, some of these modifications appear to be heritable, suggesting that acquired characteristics may in certain cases influence subsequent generations.",q:"What significant implication of epigenetics does the speaker highlight?",opts:["A) DNA sequences can be permanently altered by environment","B) genes have no influence on behaviour","C) some environmentally-acquired traits may be passed to future generations","D) epigenetics disproves evolutionary theory"],ans:"C) some environmentally-acquired traits may be passed to future generations",exp:"Some modifications appear to be heritable.",diff:9},
    {audio:"The specious argument that economic growth invariably translates into improved human welfare ignores the distributional effects of that growth and the non-monetary dimensions of wellbeing that metrics such as GDP entirely fail to capture.",q:"What is the speaker criticising?",opts:["A) the use of GDP as a measure of economic growth","B) the claim that economic growth always improves human welfare","C) policies that reduce economic growth","D) the concept of welfare itself"],ans:"B) the claim that economic growth always improves human welfare",exp:"Specious argument that economic growth invariably translates into improved human welfare.",diff:9},
    {audio:"The inexorable march of algorithmic decision-making into domains previously governed by human judgement raises profound questions about accountability. When an autonomous system causes harm, the attribution of moral and legal responsibility becomes deeply problematic.",q:"What concern does the speaker raise about algorithmic decision-making?",opts:["A) algorithms are too slow for real-time decisions","B) it is difficult to hold autonomous systems morally and legally accountable","C) humans should never trust computers","D) algorithms always produce biased results"],ans:"B) it is difficult to hold autonomous systems morally and legally accountable",exp:"Attribution of moral and legal responsibility becomes deeply problematic.",diff:9},
    {audio:"The Sapir-Whorf hypothesis posits that the language one speaks shapes the way one perceives and conceptualises reality. In its strong form, it suggests that certain thoughts may be literally unthinkable without the corresponding linguistic structures to encode them.",q:"What does the strong form of the Sapir-Whorf hypothesis suggest?",opts:["A) all languages are equally expressive","B) language has no effect on thought","C) some thoughts may be impossible without the right linguistic structures","D) learning multiple languages reduces intelligence"],ans:"C) some thoughts may be impossible without the right linguistic structures",exp:"Certain thoughts may be literally unthinkable without the corresponding linguistic structures.",diff:9},
    {audio:"Ethical relativism holds that moral judgements are culturally contingent rather than universally applicable. Critics argue however that this position renders it impossible to condemn practices that cause demonstrable harm even across cultures.",q:"What criticism of ethical relativism does the speaker present?",opts:["A) it is too strict about moral rules","B) it makes condemning harmful practices across cultures impossible","C) it ignores individual rights","D) it is based on flawed science"],ans:"B) it makes condemning harmful practices across cultures impossible",exp:"Renders it impossible to condemn practices that cause demonstrable harm.",diff:9},
    {audio:"The paradox of tolerance, formulated by Karl Popper, argues that a society committed to tolerance must ultimately be intolerant of intolerance itself, lest unlimited tolerance lead to the destruction of the very conditions that make tolerance possible.",q:"What is the core of Popper's paradox of tolerance?",opts:["A) tolerance should apply to all views without exception","B) intolerant views should always be welcomed","C) tolerance must limit itself by being intolerant of intolerance","D) political freedom requires no restrictions"],ans:"C) tolerance must limit itself by being intolerant of intolerance",exp:"Must ultimately be intolerant of intolerance itself.",diff:9}

// Helper: 현재 언어로 학년 레이블 반환
function getGradeLabel(grade){
  const g=KR_GRADES[grade];
  if(!g) return grade;
  return (g.labels&&(g.labels[lang]||g.labels.en))||grade;
}
function getFeedback(lv, sec){
  const m = KR_LEVEL_META[lv];
  if(!m || !m.feedback) return '';
  const langFb = m.feedback[lang] || m.feedback['en'] || {};
  return langFb[sec] || m.desc || '';
}

       th:{vocab:'อยู่ในขั้นเรียนตัวอักษรและคำศัพท์พื้นฐาน (สี ตัวเลข สัตว์) ฝึกคำศัพท์ประจำวันพร้อมรูปภาพซ้ำๆ',listening:'ต้องฝึกฟังและเข้าใจประโยคง่ายๆ เริ่มจากเพลงภาษาอังกฤษหรือการ์ตูนที่พูดช้าๆ',reading:'ต้องฝึกจดจำตัวอักษรและอ่านคำสั้นๆ ใช้ phonics เพื่อเชื่อมโยงเสียงและตัวสะกด',writing:'เรียนเขียนคำพื้นฐานและโครงสร้างประโยคง่ายๆ เริ่มจากรูปแบบประธาน + กริยา'},
       ar:{vocab:'مرحلة تعلم الحروف الأبجدية والمفردات الأساسية (الألوان والأرقام والحيوانات). تدرب على الكلمات اليومية مع الصور بشكل متكرر.',listening:'تحتاج إلى التدرب على سماع وفهم الجمل البسيطة جداً. ابدأ بالأغاني الإنجليزية البطيئة أو الرسوم المتحركة.',reading:'تحتاج إلى التدرب على التعرف على الأحرف وقراءة الكلمات القصيرة. استخدم الفونيكس لتعلم الصوت والهجاء.',writing:'تعلم كتابة الكلمات الأساسية وهياكل الجمل البسيطة. ابدأ بنمط الفاعل + الفعل.'},
       ru:{vocab:'Этап изучения алфавита и базовых слов (цвета, числа, животные). Повторяйте ежедневные слова с картинками.',listening:'Нужно практиковать восприятие очень простых предложений. Начните с медленных английских песен или мультфильмов.',reading:'Нужно практиковать распознавание букв и чтение коротких слов. Используйте фоникс для связи звуков и букв.',writing:'Учитесь писать базовые слова и простые структуры предложений. Начните с паттерна Подлежащее + Сказуемое.'},
       es:{vocab:'Etapa de aprendizaje del alfabeto y vocabulario básico (colores, números, animales). Practica palabras cotidianas con imágenes repetidamente.',listening:'Necesitas practicar escuchar y entender oraciones muy simples. Empieza con canciones inglesas lentas o dibujos animados.',reading:'Necesitas practicar reconocer letras y leer palabras cortas. Usa phonics para conectar sonidos y ortografía.',writing:'Aprende a escribir palabras básicas y estructuras de oraciones simples. Empieza con el patrón Sujeto + Verbo.'}
     }},
  2:{label:'Lv.2',sub:'L',desc:'Elementary Beginner',
     feedback:{
       en:{vocab:'At the stage of understanding basic daily vocabulary. Expand vocabulary focusing on family, food, and school-related words.',listening:'Can understand simple instructions and daily conversations. Practice listening to short English storybooks.',reading:'Can read short sentences and simple texts. Learning sight words will help.',writing:'Can write simple sentences. Practice writing short sentences daily to build fundamentals.'},
       ko:{vocab:'기본적인 생활 어휘를 이해하는 단계입니다. 가족, 음식, 학교 관련 단어를 중심으로 어휘를 확장하세요.',listening:'간단한 지시문과 일상 대화를 이해할 수 있습니다. 짧은 영어 동화 듣기 연습을 권장합니다.',reading:'짧은 문장과 간단한 텍스트를 읽을 수 있습니다. 사이트워드(sight words) 학습이 도움이 됩니다.',writing:'간단한 문장을 쓸 수 있습니다. 매일 짧은 문장 쓰기 연습으로 기초를 다지세요.'},
       ja:{vocab:'基本的な日常語彙を理解する段階です。家族・食べ物・学校に関する単語を中心に語彙を広げましょう。',listening:'簡単な指示文や日常会話を理解できます。短い英語の絵本を聞く練習をお勧めします。',reading:'短い文や簡単なテキストを読めます。サイトワードの学習が役立ちます。',writing:'簡単な文を書けます。毎日短い文を書く練習で基礎を固めましょう。'},
       'zh-tw':{vocab:'能理解基本日常詞彙的階段。以家庭、食物、學校相關單詞為中心擴充詞彙量吧。',listening:'能理解簡單的指示語和日常對話。建議練習聽短篇英文童話。',reading:'能閱讀短句和簡單文章。學習常見詞（sight words）很有幫助。',writing:'能寫簡單句子。每天練習寫短句以打好基礎。'},
       'zh-cn':{vocab:'能理解基本日常词汇的阶段。以家庭、食物、学校相关单词为中心扩充词汇量吧。',listening:'能理解简单的指示语和日常对话。建议练习听短篇英文童话。',reading:'能阅读短句和简单文章。学习常见词（sight words）很有帮助。',writing:'能写简单句子。每天练习写短句以打好基础。'},
       vi:{vocab:'Giai đoạn hiểu từ vựng sinh hoạt cơ bản. Mở rộng vốn từ tập trung vào gia đình, thức ăn và trường học.',listening:'Có thể hiểu hướng dẫn đơn giản và hội thoại hàng ngày. Luyện nghe truyện tranh tiếng Anh ngắn.',reading:'Có thể đọc câu ngắn và văn bản đơn giản. Học sight words sẽ rất hữu ích.',writing:'Có thể viết câu đơn giản. Luyện viết câu ngắn hàng ngày để xây nền tảng.'},
       mn:{vocab:'Үндсэн өдөр тутмын үгсийг ойлгодог шат юм. Гэр бүл, хоол, сургуультай холбоотой үгс дээр анхаарч үгийн сан бүрдүүл.',listening:'Энгийн зааврыг болон өдөр тутмын яриаг ойлгодог. Богино англи үлгэрүүдийг сонсох дасгал хий.',reading:'Богино өгүүлбэр болон энгийн текстийг уншиж чадна. Харц үгс (sight words) сурах нь тустай.',writing:'Энгийн өгүүлбэр бичиж чадна. Өдөр бүр богино өгүүлбэр бичиж суурь дэвс.'},
       th:{vocab:'ขั้นเข้าใจคำศัพท์ชีวิตประจำวันพื้นฐาน ขยายคำศัพท์โดยเน้นคำที่เกี่ยวกับครอบครัว อาหาร และโรงเรียน',listening:'สามารถเข้าใจคำสั่งง่ายๆ และบทสนทนาประจำวัน ฝึกฟังนิทานภาษาอังกฤษสั้นๆ',reading:'สามารถอ่านประโยคสั้นและข้อความง่ายๆ การเรียน sight words จะช่วยได้มาก',writing:'สามารถเขียนประโยคง่ายๆ ฝึกเขียนประโยคสั้นทุกวันเพื่อเสริมพื้นฐาน'},
       ar:{vocab:'مرحلة فهم المفردات الأساسية اليومية. قم بتوسيع مفرداتك مع التركيز على الكلمات المتعلقة بالأسرة والطعام والمدرسة.',listening:'يمكنك فهم التعليمات البسيطة والمحادثات اليومية. يُنصح بممارسة الاستماع إلى قصص إنجليزية قصيرة.',reading:'يمكنك قراءة الجمل القصيرة والنصوص البسيطة. تعلم الكلمات المتكررة (sight words) مفيد.',writing:'يمكنك كتابة جمل بسيطة. تدرب على كتابة جمل قصيرة يومياً لتعزيز الأساس.'},
       ru:{vocab:'Этап понимания базовой повседневной лексики. Расширяйте словарный запас, фокусируясь на словах о семье, еде и школе.',listening:'Можете понимать простые инструкции и повседневные разговоры. Рекомендуется практика прослушивания коротких английских сказок.',reading:'Можете читать короткие предложения и простые тексты. Изучение sight words будет полезным.',writing:'Можете писать простые предложения. Практикуйте написание коротких предложений ежедневно.'},
       es:{vocab:'Etapa de comprensión del vocabulario cotidiano básico. Amplía el vocabulario centrándote en palabras de familia, comida y escuela.',listening:'Puedes entender instrucciones simples y conversaciones diarias. Se recomienda practicar escuchar cuentos cortos en inglés.',reading:'Puedes leer oraciones cortas y textos simples. Aprender sight words será útil.',writing:'Puedes escribir oraciones simples. Practica escribir oraciones cortas diariamente para construir la base.'}
     }},
  3:{label:'Lv.3',sub:'M',desc:'Lower Elementary',
     feedback:{
       en:{vocab:'You have lower elementary level vocabulary. Expand by focusing on verbs and adjectives.',listening:'Can understand most daily conversations. Practice with diverse listening materials.',reading:'Can grasp main topics in short paragraphs. Practice reading various short texts.',writing:'Can use basic sentence structures. Practice writing paragraphs for logical expression.'},
       ko:{vocab:'초등 저학년 수준의 어휘를 갖추고 있습니다. 동사와 형용사를 중심으로 어휘를 확장하면 좋습니다.',listening:'일상적인 대화를 대부분 이해할 수 있습니다. 더 다양한 주제의 듣기 자료로 연습하세요.',reading:'짧은 단락을 읽고 주요 내용을 파악합니다. 독해력 향상을 위해 다양한 짧은 글을 읽으세요.',writing:'기본 문장 구조를 사용할 수 있습니다. 현재시제와 과거시제 활용 연습을 권장합니다.'},
       ja:{vocab:'小学校低学年レベルの語彙を持っています。動詞と形容詞を中心に語彙を広げましょう。',listening:'日常的な会話をほとんど理解できます。より多様なテーマのリスニング教材で練習しましょう。',reading:'短い段落を読んで主な内容を把握できます。読解力向上のため様々な短い文を読みましょう。',writing:'基本的な文構造を使えます。現在形と過去形の活用練習をお勧めします。'},
       'zh-tw':{vocab:'具備小學低年級水平的詞彙。以動詞和形容詞為中心擴充詞彙效果更好。',listening:'能理解大部分日常對話。用更多樣主題的聽力材料練習吧。',reading:'能閱讀短段落並把握主要內容。為提升閱讀能力請多讀各種短文。',writing:'能使用基本句子結構。建議練習現在式和過去式的應用。'},
       'zh-cn':{vocab:'具备小学低年级水平的词汇。以动词和形容词为中心扩充词汇效果更好。',listening:'能理解大部分日常对话。用更多样主题的听力材料练习吧。',reading:'能阅读短段落并把握主要内容。为提升阅读能力请多读各种短文。',writing:'能使用基本句子结构。建议练习现在式和过去式的应用。'},
       vi:{vocab:'Bạn có vốn từ cấp tiểu học thấp. Mở rộng bằng cách tập trung vào động từ và tính từ.',listening:'Có thể hiểu hầu hết các hội thoại hàng ngày. Luyện tập với tài liệu nghe đa dạng hơn.',reading:'Có thể nắm bắt nội dung chính trong đoạn văn ngắn. Đọc nhiều bài viết ngắn để cải thiện.',writing:'Có thể sử dụng cấu trúc câu cơ bản. Luyện viết đoạn văn để diễn đạt logic.'},
       mn:{vocab:'Бага ангийн доод түвшний үгийн санг эзэмшсэн байна. Үйл үг болон тэмдэг нэрд анхаарч үгийн санг дэлгэгтүн.',listening:'Өдөр тутмын яриаг ихэнхийг нь ойлгодог. Илүү олон янзын сэдвийн сонсох материалаар дасгал хий.',reading:'Богино параграф уншиж үндсэн агуулгыг олж авдаг. Уншлагын чадварыг дээшлүүлэхийн тулд олон төрлийн богино текст ун.',writing:'Үндсэн өгүүлбэрийн бүтцийг ашиглаж чадна. Одоогийн болон өнгөрсөн цагийн дасгал хийхийг зөвлөж байна.'},
       th:{vocab:'มีคำศัพท์ระดับประถมต้น ขยายโดยเน้นคำกริยาและคำคุณศัพท์',listening:'สามารถเข้าใจบทสนทนาประจำวันส่วนใหญ่ ฝึกด้วยสื่อฟังหลากหลายหัวข้อ',reading:'อ่านย่อหน้าสั้นและจับใจความหลักได้ อ่านบทความสั้นๆ หลากหลายเพื่อพัฒนาการอ่าน',writing:'ใช้โครงสร้างประโยคพื้นฐานได้ ฝึกเขียนย่อหน้าเพื่อการแสดงออกเชิงตรรกะ'},
       ar:{vocab:'لديك مفردات المرحلة الابتدائية الدنيا. قم بالتوسع مع التركيز على الأفعال والصفات.',listening:'يمكنك فهم معظم المحادثات اليومية. تدرب بمواد استماع متنوعة المواضيع.',reading:'يمكنك قراءة الفقرات القصيرة وفهم المحتوى الرئيسي. اقرأ نصوصاً قصيرة متنوعة لتحسين الفهم.',writing:'يمكنك استخدام هياكل الجمل الأساسية. يُنصح بالتدرب على استخدام المضارع والماضي.'},
       ru:{vocab:'Словарный запас уровня младшей начальной школы. Расширяйте, фокусируясь на глаголах и прилагательных.',listening:'Можете понимать большинство повседневных разговоров. Практикуйтесь с разнообразными материалами для аудирования.',reading:'Можете читать короткие абзацы и выделять основное содержание. Читайте разнообразные короткие тексты.',writing:'Можете использовать базовые структуры предложений. Рекомендуется практика настоящего и прошедшего времён.'},
       es:{vocab:'Tienes vocabulario de nivel elemental bajo. Amplía centrándote en verbos y adjetivos.',listening:'Puedes entender la mayoría de las conversaciones cotidianas. Practica con materiales de escucha de temas variados.',reading:'Puedes leer párrafos cortos y captar el contenido principal. Lee textos cortos variados para mejorar la comprensión.',writing:'Puedes usar estructuras básicas de oraciones. Se recomienda practicar los tiempos presente y pasado.'}
     }},
  4:{label:'Lv.4',sub:'M',desc:'Mid Elementary',
     feedback:{
       en:{vocab:'You have mid-elementary level vocabulary. Learning compound words and derivatives will rapidly improve your vocabulary.',listening:'Partially understand listening passages. Build vocabulary and diverse expressions to grasp full context.',reading:'Understand content of short texts and can infer context. Study the precise use of vocabulary and expressions.',writing:'Can write basic sentences. Practice various tenses and conjunctions to enrich your writing.'},
       ko:{vocab:'초등 중학년 수준의 어휘력을 갖추고 있습니다. 합성어와 파생어를 함께 익히면 어휘력이 빠르게 향상됩니다.',listening:'듣기 지문의 내용을 부분적으로 이해하고 있습니다. 어휘력을 키우고 다양한 표현을 익혀 전체 문맥을 이해하는 능력을 길러야 합니다.',reading:'짧은 글의 내용을 이해하고 어느 정도 문맥을 파악합니다. 어휘와 표현의 정확한 사용법 학습이 필요합니다.',writing:'기본 문장을 작성할 수 있습니다. 다양한 시제와 접속사 활용 연습을 통해 문장을 풍부하게 만드세요.'},
       ja:{vocab:'小学校中学年レベルの語彙力があります。複合語や派生語を一緒に覚えると語彙力が早く向上します。',listening:'リスニング本文の内容を部分的に理解しています。語彙力を高め、様々な表現を身につけ文脈全体の理解力を養いましょう。',reading:'短い文の内容を理解し、ある程度文脈を把握します。語彙と表現の正確な使い方の学習が必要です。',writing:'基本的な文を書けます。様々な時制と接続詞の活用練習で文章を豊かにしましょう。'},
       'zh-tw':{vocab:'具備小學中年級水平的詞彙量。一起學習複合詞和派生詞，詞彙量會快速提升。',listening:'部分理解聽力文章的內容。需要提升詞彙量、學習多樣表達方式，培養理解全文脈絡的能力。',reading:'理解短文內容，能一定程度地把握脈絡。需要學習詞彙和表達的準確用法。',writing:'能撰寫基本句子。透過練習各種時態和連接詞使句子更豐富。'},
       'zh-cn':{vocab:'具备小学中年级水平的词汇量。一起学习复合词和派生词，词汇量会快速提升。',listening:'部分理解听力文章的内容。需要提升词汇量、学习多样表达方式，培养理解全文脉络的能力。',reading:'理解短文内容，能一定程度地把握脉络。需要学习词汇和表达的准确用法。',writing:'能撰写基本句子。通过练习各种时态和连接词使句子更丰富。'},
       vi:{vocab:'Bạn có vốn từ cấp tiểu học giữa. Học từ ghép và từ phái sinh sẽ nhanh chóng cải thiện vốn từ.',listening:'Hiểu được một phần nội dung bài nghe. Cần xây dựng vốn từ và học nhiều cách diễn đạt để hiểu toàn bộ ngữ cảnh.',reading:'Hiểu nội dung văn bản ngắn và có thể suy luận ngữ cảnh ở mức độ nhất định. Cần học cách sử dụng chính xác từ vựng và cách diễn đạt.',writing:'Có thể viết câu cơ bản. Luyện nhiều thì và liên từ để làm phong phú câu văn.'},
       mn:{vocab:'Бага дунд ангийн дунд түвшний үгийн санг эзэмшсэн байна. Нийлмэл болон уламжлалт үгсийг хамт сурвал үгийн сан хурдан нэмэгдэнэ.',listening:'Сонсох бичвэрийн агуулгыг хэсэгчлэн ойлгодог. Үгийн санг нэмэгдүүлж олон янзын хэллэг сурч нийт агуулгыг ойлгох чадвараа дэлгэ.',reading:'Богино текстийн агуулгыг ойлгодог. Үгийн сан болон хэллэгийн зөв хэрэглээг судлах хэрэгтэй.',writing:'Үндсэн өгүүлбэр бичиж чадна. Олон янзын цаг болон холбох үгийн дасгалаар өгүүлбэрийг баяжуул.'},
       th:{vocab:'มีคำศัพท์ระดับประถมกลาง การเรียนคำประสมและคำอนุพันธ์จะพัฒนาคำศัพท์อย่างรวดเร็ว',listening:'เข้าใจเนื้อหาบทฟังบางส่วน ต้องสร้างคำศัพท์และเรียนรู้สำนวนหลากหลายเพื่อเข้าใจบริบทโดยรวม',reading:'เข้าใจเนื้อหาข้อความสั้นและจับบริบทได้บ้าง ต้องศึกษาการใช้คำศัพท์และสำนวนอย่างถูกต้อง',writing:'เขียนประโยคพื้นฐานได้ ฝึกใช้กาลต่างๆ และคำเชื่อมเพื่อทำให้ประโยคสมบูรณ์'},
       ar:{vocab:'لديك مفردات المرحلة الابتدائية المتوسطة. تعلم الكلمات المركبة والمشتقات معاً سيحسن مفرداتك بسرعة.',listening:'تفهم محتوى نصوص الاستماع جزئياً. احرص على تطوير المفردات وتعلم تعبيرات متنوعة لفهم السياق الكامل.',reading:'تفهم محتوى النصوص القصيرة وتستطيع استنتاج السياق. تحتاج إلى تعلم الاستخدام الدقيق للمفردات والتعبيرات.',writing:'يمكنك كتابة جمل أساسية. تدرب على استخدام أزمنة وروابط متنوعة لإثراء جملك.'},
       ru:{vocab:'Словарный запас среднего уровня начальной школы. Изучение сложных слов и производных быстро улучшит ваш словарный запас.',listening:'Частично понимаете содержание аудио-текстов. Развивайте словарный запас и изучайте разнообразные выражения для понимания полного контекста.',reading:'Понимаете содержание коротких текстов и можете в определённой мере воспринимать контекст. Нужно изучить точное использование словаря и выражений.',writing:'Можете писать базовые предложения. Практикуйте разные времена и союзы, чтобы обогатить текст.'},
       es:{vocab:'Tienes vocabulario de nivel elemental medio. Aprender palabras compuestas y derivadas mejorará rápidamente tu vocabulario.',listening:'Entiendes parcialmente el contenido de los textos de escucha. Necesitas desarrollar vocabulario y aprender expresiones variadas para entender el contexto completo.',reading:'Entiendes el contenido de textos cortos y puedes inferir el contexto en cierta medida. Necesitas estudiar el uso preciso del vocabulario y las expresiones.',writing:'Puedes escribir oraciones básicas. Practica tiempos verbales y conjunciones variadas para enriquecer tus oraciones.'}
     }},
  5:{label:'Lv.5',sub:'M',desc:'Upper Elementary',
     feedback:{
       en:{vocab:'Upper elementary level vocabulary. Systematically study compound and derivative words.',listening:'Can grasp main points and details. Practice diverse topics to improve inference.',reading:'Can identify topic and details. Inference and vocabulary-in-context exercises are effective.',writing:'Can use various sentence structures. Practice paragraph writing to develop logical expression.'},
       ko:{vocab:'초등 고학년 수준의 어휘를 갖추고 있습니다. return, without 같은 합성어와 파생어를 체계적으로 학습하세요.',listening:'주요 내용을 파악하고 세부 사항도 이해합니다. 추론 능력 향상을 위해 다양한 주제의 듣기를 연습하세요.',reading:'글의 주제와 세부 내용을 파악합니다. 추론 문제와 어휘 문맥 파악 연습이 효과적입니다.',writing:'다양한 문장 구조를 활용할 수 있습니다. 단락 쓰기 연습을 통해 논리적 글쓰기를 익히세요.'},
       ja:{vocab:'小学校高学年レベルの語彙があります。複合語や派生語を体系的に学習しましょう。',listening:'主な内容を把握し細部も理解できます。推論能力向上のため多様なテーマのリスニングを練習しましょう。',reading:'文章のテーマと詳細を把握できます。推論問題と語彙の文脈把握練習が効果的です。',writing:'様々な文構造を活用できます。段落を書く練習を通じて論理的な文章作成を習得しましょう。'},
       'zh-tw':{vocab:'具備小學高年級水平的詞彙。系統性地學習複合詞和派生詞吧。',listening:'能掌握主要內容並理解細節。練習多種主題的聽力以提升推理能力。',reading:'能掌握文章主題和細節。推理題和詞彙語境練習最為有效。',writing:'能靈活運用多種句子結構。通過練習段落寫作來學習邏輯寫作。'},
       'zh-cn':{vocab:'具备小学高年级水平的词汇。系统性地学习复合词和派生词吧。',listening:'能掌握主要内容并理解细节。练习多种主题的听力以提升推理能力。',reading:'能掌握文章主题和细节。推理题和词汇语境练习最为有效。',writing:'能灵活运用多种句子结构。通过练习段落写作来学习逻辑写作。'},
       vi:{vocab:'Vốn từ cấp tiểu học cao. Học từ ghép và từ phái sinh một cách có hệ thống.',listening:'Có thể nắm bắt điểm chính và hiểu chi tiết. Luyện đa dạng chủ đề để cải thiện suy luận.',reading:'Có thể xác định chủ đề và chi tiết. Luyện bài suy luận và đoán từ theo ngữ cảnh rất hiệu quả.',writing:'Có thể sử dụng nhiều cấu trúc câu. Luyện viết đoạn văn để phát triển diễn đạt logic.'},
       mn:{vocab:'Дунд ангийн дээд түвшний үгийн санг эзэмшсэн байна. Нийлмэл болон уламжлалт үгсийг системтэйгээр суралц.',listening:'Үндсэн агуулга болон дэлгэрэнгүй зүйлсийг ойлгодог. Дүгнэх чадварыг дэлгэхийн тулд олон сэдвийн сонсох дасгал хий.',reading:'Текстийн сэдэв болон дэлгэрэнгүй зүйлсийг ойлгодог. Дүгнэх болон үгийн агуулгаас утга гаргах дасгал хамгийн үр дүнтэй.',writing:'Олон янзын өгүүлбэрийн бүтцийг ашиглаж чадна. Параграф бичих дасгалаар логик бичих аргыг эзэм.'},
       th:{vocab:'มีคำศัพท์ระดับประถมสูง เรียนคำประสมและคำอนุพันธ์อย่างเป็นระบบ',listening:'สามารถจับประเด็นหลักและเข้าใจรายละเอียด ฝึกหลากหลายหัวข้อเพื่อพัฒนาการอนุมาน',reading:'สามารถระบุหัวข้อและรายละเอียด การฝึกอนุมานและจับความหมายจากบริบทมีประสิทธิภาพ',writing:'ใช้โครงสร้างประโยคหลากหลายได้ ฝึกเขียนย่อหน้าเพื่อพัฒนาการแสดงออกเชิงตรรกะ'},
       ar:{vocab:'لديك مفردات المرحلة الابتدائية العليا. تعلم الكلمات المركبة والمشتقات بشكل منهجي.',listening:'يمكنك استيعاب النقاط الرئيسية وفهم التفاصيل. تدرب على مواضيع متنوعة لتحسين الاستدلال.',reading:'يمكنك تحديد موضوع النص وتفاصيله. تمارين الاستنتاج وفهم المفردات في السياق فعالة.',writing:'يمكنك استخدام هياكل جملية متنوعة. تدرب على كتابة الفقرات لتطوير التعبير المنطقي.'},
       ru:{vocab:'Словарный запас уровня старшей начальной школы. Систематически изучайте сложные слова и производные.',listening:'Можете улавливать основные моменты и понимать детали. Практикуйтесь с разнообразными темами для улучшения логического вывода.',reading:'Можете определять тему и детали текста. Эффективны упражнения на логический вывод и восприятие слова в контексте.',writing:'Можете использовать различные структуры предложений. Практикуйте написание абзацев для развития логического изложения.'},
       es:{vocab:'Tienes vocabulario de nivel elemental superior. Estudia sistemáticamente palabras compuestas y derivadas.',listening:'Puedes captar los puntos principales y entender los detalles. Practica temas variados para mejorar la inferencia.',reading:'Puedes identificar el tema y los detalles del texto. Los ejercicios de inferencia y comprensión del vocabulario en contexto son efectivos.',writing:'Puedes usar diversas estructuras de oraciones. Practica la escritura de párrafos para desarrollar la expresión lógica.'}
     }},
  6:{label:'Lv.6',sub:'H',desc:'Middle School Level',
     feedback:{
       en:{vocab:'Middle school level vocabulary. Focus on academic vocabulary and idioms.',listening:'Can understand complex conversations and lectures. Practice with English news or TED talks.',reading:'Can read and analyze various genres. Improve through critical reading and inference practice.',writing:'Can construct complex sentences and paragraphs. Practice essay writing to develop logical expression.'},
       ko:{vocab:'중학교 수준의 어휘를 이해합니다. 학술 어휘와 관용표현을 중점적으로 학습하면 좋습니다.',listening:'복잡한 대화와 강의를 이해합니다. 영어 뉴스나 TED 강연으로 심화 연습을 권장합니다.',reading:'다양한 장르의 글을 읽고 분석합니다. 비판적 읽기와 추론 연습을 통해 실력을 향상시키세요.',writing:'복잡한 문장과 단락을 구성합니다. 에세이 쓰기 연습을 통해 논리적 표현력을 키우세요.'},
       ja:{vocab:'中学校レベルの語彙を理解しています。学術語彙と慣用表現を重点的に学習しましょう。',listening:'複雑な会話や講義を理解できます。英語ニュースやTED講演での深化練習をお勧めします。',reading:'様々なジャンルの文を読んで分析します。批判的読み方と推論練習で実力を上げましょう。',writing:'複雑な文と段落を構成できます。エッセイ練習を通じて論理的表現力を養いましょう。'},
       'zh-tw':{vocab:'理解中學水平的詞彙。重點學習學術詞彙和慣用語效果更好。',listening:'能理解複雜對話和講座。建議通過英文新聞或TED演講進行深化練習。',reading:'能閱讀分析各種體裁的文章。通過批判性閱讀和推理練習提升實力。',writing:'能構建複雜句子和段落。通過練習essay寫作培養邏輯表達能力。'},
       'zh-cn':{vocab:'理解中学水平的词汇。重点学习学术词汇和惯用语效果更好。',listening:'能理解复杂对话和讲座。建议通过英文新闻或TED演讲进行深化练习。',reading:'能阅读分析各种体裁的文章。通过批判性阅读和推理练习提升实力。',writing:'能构建复杂句子和段落。通过练习essay写作培养逻辑表达能力。'},
       vi:{vocab:'Hiểu từ vựng cấp trung học. Tập trung học từ vựng học thuật và thành ngữ.',listening:'Có thể hiểu các cuộc hội thoại và bài giảng phức tạp. Luyện chuyên sâu với tin tức hoặc TED talks.',reading:'Đọc và phân tích nhiều thể loại văn bản. Nâng cao qua luyện đọc phản biện và suy luận.',writing:'Có thể xây dựng câu và đoạn văn phức tạp. Luyện viết essay để phát triển diễn đạt logic.'},
       mn:{vocab:'Дунд сургуулийн түвшний үгийн санг ойлгодог. Эрдэм шинжилгээний үгс болон идиомуудыг голлон суралц.',listening:'Нарийн ярилцлага болон лекцийг ойлгодог. Англи мэдээ эсвэл TED илтгэлээр гүнзгийрүүлсэн дасгал хий.',reading:'Олон жанрын текстийг уншиж дүн шинжилгээ хийдэг. Шүүмжлэлт унших болон дүгнэх дасгалаар чадвараа нэмэгдүүл.',writing:'Нарийн өгүүлбэр болон параграф зохиодог. Эссе бичих дасгалаар логик илэрхийллийг хөгжүүл.'},
       th:{vocab:'เข้าใจคำศัพท์ระดับมัธยม เน้นเรียนคำศัพท์เชิงวิชาการและสำนวน',listening:'เข้าใจบทสนทนาและการบรรยายที่ซับซ้อน ฝึกเชิงลึกด้วยข่าวภาษาอังกฤษหรือ TED Talks',reading:'อ่านและวิเคราะห์งานเขียนหลากหลายแนว พัฒนาผ่านการอ่านเชิงวิพากษ์และฝึกอนุมาน',writing:'สร้างประโยคและย่อหน้าที่ซับซ้อนได้ ฝึกเขียน essay เพื่อพัฒนาการแสดงออกเชิงตรรกะ'},
       ar:{vocab:'تفهم المفردات على مستوى المدرسة المتوسطة. التركيز على المفردات الأكاديمية والتعابير الاصطلاحية سيفيدك.',listening:'يمكنك فهم المحادثات المعقدة والمحاضرات. يُنصح بالتدريب المكثف مع الأخبار الإنجليزية أو محاضرات TED.',reading:'يمكنك قراءة وتحليل نصوص من أجناس أدبية متنوعة. طوّر مهاراتك من خلال القراءة النقدية وتمارين الاستنتاج.',writing:'يمكنك بناء جمل وفقرات معقدة. تدرب على كتابة المقالات لتطوير القدرة على التعبير المنطقي.'},
       ru:{vocab:'Понимаете словарный запас уровня средней школы. Сфокусируйтесь на академической лексике и идиоматических выражениях.',listening:'Можете понимать сложные разговоры и лекции. Рекомендуется углублённая практика с английскими новостями или TED-лекциями.',reading:'Читаете и анализируете тексты различных жанров. Улучшайтесь через критическое чтение и упражнения на логический вывод.',writing:'Можете строить сложные предложения и абзацы. Практикуйте написание эссе для развития логического самовыражения.'},
       es:{vocab:'Comprendes el vocabulario de nivel secundaria. Centrarse en vocabulario académico y expresiones idiomáticas será beneficioso.',listening:'Puedes entender conversaciones complejas y conferencias. Se recomienda práctica intensiva con noticias en inglés o charlas TED.',reading:'Puedes leer y analizar textos de géneros variados. Mejora a través de la lectura crítica y ejercicios de inferencia.',writing:'Puedes construir oraciones y párrafos complejos. Practica la escritura de ensayos para desarrollar la capacidad de expresión lógica.'}
     }},
  7:{label:'Lv.7',sub:'H',desc:'Pre-Advanced',
     feedback:{
       en:{vocab:'Understand most advanced vocabulary. Studying professional terminology and nuances will further improve.',listening:'Understand almost all content including fast-paced English. Use English media to learn natural expressions.',reading:'Understand and analyze complex texts. Practice reading original books and academic texts.',writing:'Can write fluently in various styles. Focus on persuasive writing and refining style.'},
       ko:{vocab:'고급 어휘를 대부분 이해합니다. 전문 분야 어휘와 뉘앙스 차이를 학습하면 더욱 향상됩니다.',listening:'거의 모든 내용을 이해하며 빠른 속도의 영어도 이해합니다. 영어권 미디어로 자연스러운 표현을 익히세요.',reading:'복잡한 텍스트도 이해하고 분석합니다. 원서 독해와 학술 텍스트 읽기 연습을 권장합니다.',writing:'유창하게 다양한 글쓰기가 가능합니다. 설득력 있는 글쓰기와 문체 다듬기에 집중하세요.'},
       ja:{vocab:'高度な語彙をほとんど理解しています。専門分野の語彙とニュアンスの違いを学ぶとさらに上達します。',listening:'ほぼすべての内容を理解し、速い英語も分かります。英語圏のメディアで自然な表現を身につけましょう。',reading:'複雑なテキストも理解して分析できます。原書の読解と学術テキスト読解の練習をお勧めします。',writing:'流暢に様々な文章を書けます。説得力のある文章と文体の洗練に集中しましょう。'},

let krState = {diff:4, si:0, sq:0, scores:{vocab:0,listening:0,reading:0,writing:0}, used:{vocab:[],listening:[],reading:[],writing:[]}, allA:[], grade:'elem12'};

function koreanReset(){
  // 학년별 초기 diff 범위 (매 시험마다 랜덤)
  const gradeInitDiff = {
    elem12: [1,3],   // 초등1-2: diff 1~3 중 랜덤 시작
    elem34: [2,4],   // 초등3-4: diff 2~4
    elem56: [3,5],   // 초등5-6: diff 3~5
    mid12:  [4,6],   // 중1-2: diff 4~6
    mid3hi1:[5,7],   // 중3-고1: diff 5~7
    hi23:   [6,8],   // 고2-3: diff 6~8
  };
  const g = koreanGrade||'elem12';
  const [dMin, dMax] = gradeInitDiff[g] || [3,5];
  const initDiff = Math.floor(Math.random()*(dMax-dMin+1)) + dMin;
  krState = {diff:initDiff, si:0, sq:0, _streak:0, scores:{vocab:0,listening:0,reading:0,writing:0}, used:{vocab:[],listening:[],reading:[],writing:[]}, allA:[], grade:g};
}

const KR_SECS = ['vocab','listening','reading','writing'];

function getKoreanQ(sec, diff){
  // 기본 + EXTRA 문제 합치기
  const gradeData = QB_KOREAN[krState.grade] || {};
  const extraData = (typeof QB_KOREAN_EXTRA !== 'undefined' && QB_KOREAN_EXTRA[krState.grade]) ? QB_KOREAN_EXTRA[krState.grade] : {};
  const baseBank = gradeData[sec] || [];
  const extraBank = extraData[sec] || [];
  // 인덱스 충돌 방지: extra 인덱스는 baseBank.length + i
  const bank = [...baseBank, ...extraBank];
  if(!bank.length) return null;
  const usedIds = krState.used[sec] || [];
  // diff 허용 범위: 처음엔 ±3, 없으면 ±5, 그래도 없으면 전체
  let avail = bank.filter((q,i)=>!usedIds.includes(i) && Math.abs((q.diff||5)-diff)<=3);
  if(!avail.length) avail = bank.filter((q,i)=>!usedIds.includes(i) && Math.abs((q.diff||5)-diff)<=5);
  if(!avail.length) avail = bank.filter((_,i)=>!usedIds.includes(i));
  if(!avail.length) return null;
  // diff에 가장 가까운 문제 선택 (같은 diff면 랜덤)
  avail.sort((a,b)=>Math.abs((a.diff||5)-diff)-Math.abs((b.diff||5)-diff));
  const topCandidates = avail.filter(q=>Math.abs((q.diff||5)-diff)===Math.abs((avail[0].diff||5)-diff));
  const chosen = topCandidates[Math.floor(Math.random()*topCandidates.length)];
  const idx = bank.indexOf(chosen);
  if(!krState.used[sec]) krState.used[sec]=[];
  krState.used[sec].push(idx);
  return normalizeQ({...chosen, _src:'bank'});
}


function mkKoreanDots(){
  const totalPerSec=10;
  const total=KR_SECS.length*totalPerSec;
  const done=krState.si*totalPerSec+krState.sq;
  return Array.from({length:total},(_,i)=>{
    const a=krState.allA[i];
    const cls=i<done?(a&&!a.ok?'wr':'done'):i===done?'active':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');
}

async function loadKoreanQ(){
  const totalPerSec=10; // 40 total: 4 secs × 10 questions
  if(krState.sq>=totalPerSec){
    krState.si++;krState.sq=0;
    if(krState.si>=KR_SECS.length){showKoreanResults();return;}
  }
  const sec=KR_SECS[krState.si];
  let q=getKoreanQ(sec,krState.diff);
  if(!q) q=await genKoreanQ(sec,krState.diff);
  if(!q){krState.sq=totalPerSec;return loadKoreanQ();}

  const total=KR_SECS.length*totalPerSec;
  const done=krState.si*totalPerSec+krState.sq;
  document.getElementById('pf').style.width=Math.round((done/total)*100)+'%';
  document.getElementById('pbl').textContent=`Q${done+1} of ${total}`;
  document.getElementById('pbr').textContent=getGradeLabel(krState.grade);
  renderLvRow(); // Korean Lv.1-8 표시
  document.getElementById('ldr').classList.add('hidden');
  document.getElementById('qc').classList.remove('hidden');
  try {
    renderKoreanQ(q,sec);
  } catch(e) {
    console.error('renderKoreanQ error:', e.message, e.stack);
    document.getElementById('qc').innerHTML = '<div style="color:red;padding:20px">Error: '+e.message+'</div>';
  }
}

function renderKoreanQ(q, sec){
  // 안전하게 필드 추출
  const lv = Math.max(1, Math.min(8, Math.round((krState.diff||4)/1.25)));
  const lvMeta = KR_LEVEL_META[lv] || {label:'Lv.3', desc:'초급'};
  const isListen = sec === 'listening';
  const secLabel = ({vocab:'Vocabulary', listening:'Listening', reading:'Reading', writing:'Grammar'})[sec] || sec;
  const audioScript = q.audioScript || q.audio || '';
  const displayQ = q.question || q.q || '';
  const opts = q.options || q.opts || [];
  const ans = q.answer || q.ans || '';
  const exp = q.explanation || q.exp || '';

  let h = '<div class="qmeta">'
    + '<span class="sec-badge">🏫 ' + secLabel + ' · ' + (krState.sq+1) + '/10</span>'
    + '<span style="background:#1D9E75;color:#fff;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600">' + lvMeta.label + '</span>'
    + '</div>';

  if(isListen && audioScript){
    h += '<div class="ab" style="margin-bottom:12px">'
      + '<button class="play" onclick="speak(\'' + esc(audioScript) + '\')" style="background:#1D9E75;color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">▶</button>'
      + '<div class="at" id="atxt" style="font-size:12px;color:var(--color-text-secondary)">Press ▶ to listen — then answer</div>'
      + '</div>'
      + '<div class="qctx hidden" id="qctx-hidden" style="position:relative;margin-bottom:10px">'
      + audioScript
      + '<div id="ctx-cover" style="position:absolute;inset:0;background:var(--color-background-secondary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-text-secondary);gap:6px;cursor:default">'
      + '<span>🎧</span><span>Script revealed after answering</span></div></div>';
  } else if(q.context){
    h += '<div class="qctx">' + q.context + '</div>';
  }

  // vocab만 질문 번역 (reading/listening/writing은 영어 원문 유지)
  var dQ = sec === 'vocab' ? translateQuestion(displayQ, lang) : displayQ;
  h += '<div class="qtext">' + dQ + '</div>';

  h += '<div class="opts" id="ob">';
  for(var i=0; i<opts.length; i++){
    h += '<div class="opt" id="op'+i+'" onclick="pickKoreanOpt('+i+',\''+esc(opts[i])+'\',\''+esc(ans)+'\',\''+esc(exp)+'\',\''+sec+'\')">' + opts[i] + '</div>';
  }
  h += '</div>';
  h += '<div id="fb" class="hidden fb"></div>';
  h += '<div class="navrow"><div class="dots">' + mkKoreanDots() + '</div>';
  h += '<button class="btn btn-p hidden" id="nb" onclick="nextKoreanQ()">' + (L.nq||'Next →') + '</button></div>';

  document.getElementById('qc').innerHTML = h;
}

function pickKoreanOpt(idx,chosen,ans,exp,sec){
  if(answered)return;answered=true;
  const ok=chosen.trim()===ans.trim();
  if(ok){
    krState.scores[sec]++;
    // 연속 정답이면 더 빠르게 올라감
    krState._streak=(krState._streak||0)+1;
    const boost=krState._streak>=2?2:1;
    krState.diff=Math.min(10,krState.diff+boost);
  } else {
    krState._streak=0;
    krState.diff=Math.max(1,krState.diff-1);
  }
  krState.allA[krState.si*10+krState.sq]={ok,chosen,ans,sec};
  showCtx();
  document.querySelectorAll('.opt').forEach((o,i)=>{
    o.classList.add('lk');
    if(o.textContent.trim()===ans.trim())o.classList.add('ok');
    else if(i===idx&&!ok)o.classList.add('bad');
  });
  const fb=document.getElementById('fb');
  fb.className='fb '+(ok?'ok':'bad');
  fb.textContent=(ok?'✓ '+(L.ok||'Correct!'):'✗ '+(L.bad||'Incorrect.'))+' '+exp;
  fb.classList.remove('hidden');
  const nb=document.getElementById('nb');if(nb)nb.classList.remove('hidden');
}

function getKoreanFinalLevel(){
  const tot=Object.values(krState.scores).reduce((s,n)=>s+n,0);
  const pct=tot/40;
  return Math.max(1,Math.min(8,Math.round(pct*8)));
}

function buildKoreanAS(){
  let h='<div class="card">'; let qNum=0;
  KR_SECS.forEach((sec,si)=>{
    h+=`<div class="as-sec"><div class="as-st"><span>${{vocab:'Vocabulary',listening:'Listening',reading:'Reading',writing:'Grammar'}[sec]||sec}</span><span>${krState.scores[sec]||0}/10</span></div>`;
    for(let qi=0;qi<10;qi++){
      const a=krState.allA[qNum];qNum++;
      const bank=QB_KOREAN[krState.grade]?.[sec]||[];
      const q=bank[krState.used[sec][qi]];
      const qText=q?(q.question||q.q||'').slice(0,70):(a?.q||'').slice(0,70);
      h+=`<div class="as-item"><div class="as-num ${a?.ok?'ok':'bad'}">${qNum}</div>
        <div class="as-body"><div class="as-q">${qText}</div>
        <div class="as-r"><span class="as-c">✓ ${a?.ans||''}</span><span class="as-m ${a?.ok?'ok':'bad'}">${a?.ok?'✓':'✗'} ${a?.chosen||''}</span></div></div></div>`;
    }
    h+='</div>';
  });
  return h+'</div>';
}

  const opts=[...(q.opts||q.options||[])];
  const correctContent=(q.ans||q.answer||'').replace(/^[A-D]\)\s*/,'');
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  const labels=['A','B','C','D'];
  const newOpts=opts.map((o,i)=>`${labels[i]}) ${o.replace(/^[A-D]\)\s*/,'')}`);
  const newAnsIdx=newOpts.findIndex(o=>o.replace(/^[A-D]\)\s*/,'')===correctContent);
  return {question:localQ,options:newOpts,answer:newAnsIdx>=0?newOpts[newAnsIdx]:(q.ans||q.answer||''),explanation:q.exp||q.explanation||'',type:'mcq',_topic:topic,_topicIdx:seniorState.topicIdx,_qIdx:seniorState.qIdx};
}
async function loadSeniorQ(){
  const q=getSeniorQ();
  if(!q){
    if(seniorState.topicIdx<SENIOR_TOPICS.length-1){seniorState.topicIdx++;seniorState.qIdx=0;return loadSeniorQ();}
    showSeniorResults();return;
  }
  const prog=getSeniorProgress();
  const pct=Math.round((prog.current/prog.total)*100);
  document.getElementById('pf').style.width=pct+'%';
  const topicMeta=QB_SENIOR_V2[q._topic]._meta;
  document.getElementById('pbl').textContent=`Q${prog.current+1} of ${prog.total}`;
  document.getElementById('pbr').textContent=`${topicMeta.icon} ${topicMeta.label}`;
  document.getElementById('ldr').classList.add('hidden');
  document.getElementById('qc').classList.remove('hidden');
  renderSeniorQ(q);
}
function renderSeniorQ(q){
  const topicMeta=QB_SENIOR_V2[q._topic]._meta;
  const qpt=getSeniorQsPerTopic();
  const h=`<div class="qmeta"><span class="sec-badge">${topicMeta.icon} ${topicMeta.label} · Q${q._qIdx+1}/${qpt[q._topic]}</span><span class="src-badge src-bank">📚 Real-life</span></div>
  <div class="qtext">${q.question}</div>
  <div class="opts" id="ob">${q.options.map((o,i)=>`<div class="opt" id="op${i}" onclick="pickSeniorOpt(${i},'${esc(o)}','${esc(q.answer)}','${esc(q.explanation)}','${q._topic}')">${o}</div>`).join('')}</div>
  <div id="fb" class="hidden fb"></div>
  <div class="navrow"><div class="dots">${mkSeniorDots()}</div><button class="btn btn-p hidden" id="nb" onclick="nextSeniorQ()">${L.nq||'Next →'}</button></div>`;
  document.getElementById('qc').innerHTML=h;
}
function mkSeniorDots(){
  const prog=getSeniorProgress();
  return Array.from({length:prog.total},(_,i)=>{
    const a=seniorState.allAnswers[i];
    const cls=i<prog.current?(a&&!a.ok?'wr':'done'):i===prog.current?'active':'';
    return `<div class="dot ${cls}"></div>`;
  }).join('');
}
function pickSeniorOpt(idx,chosen,ans,exp,topic){
  if(answered)return;answered=true;
  const ok=chosen.trim()===ans.trim();
  seniorState.topicScores[topic].correct+=ok?1:0;
  seniorState.topicScores[topic].total+=1;
  seniorState.allAnswers[getSeniorProgress().current]={ok,chosen,ans,topic};
  document.querySelectorAll('.opt').forEach((o,i)=>{o.classList.add('lk');if(o.textContent.trim()===ans.trim())o.classList.add('ok');else if(i===idx&&!ok)o.classList.add('bad');});
  const fb=document.getElementById('fb');
  fb.className='fb '+(ok?'ok':'bad');
  fb.textContent=(ok?'✓ '+(L.ok||'Correct!'):'✗ '+(L.bad||'Incorrect.'))+' '+exp;
  fb.classList.remove('hidden');
  const nb=document.getElementById('nb');if(nb)nb.classList.remove('hidden');
}
function nextSeniorQ(){
  answered=false;seniorState.qIdx++;
  const qpt=getSeniorQsPerTopic();
  if(seniorState.qIdx>=(qpt[SENIOR_TOPICS[seniorState.topicIdx]]||3)){
    if(seniorState.topicIdx<SENIOR_TOPICS.length-1){seniorState.topicIdx++;seniorState.qIdx=0;}
    else{showSeniorResults();return;}
  }
  document.getElementById('ldr').classList.remove('hidden');
  document.getElementById('qc').classList.add('hidden');
  setTimeout(loadSeniorQ,100);
}
function showSeniorResults(){
  show('sc-result');
  const el=Math.round((Date.now()-t0)/1000);
  document.getElementById('res-s').innerHTML=buildSeniorSum(`${Math.floor(el/60)}m ${el%60}s`);
  document.getElementById('res-a').innerHTML=buildSeniorAnswers();
  setTimeout(()=>{document.querySelectorAll('.br-fill').forEach(b=>{b.style.width=b.dataset.w+'%';});},300);
}
function buildSeniorSum(time){
  const qpt=getSeniorQsPerTopic();
  const totalQ=Object.values(qpt).reduce((s,n)=>s+n,0);
  let totalCorrect=0;SENIOR_TOPICS.forEach(t=>{totalCorrect+=seniorState.topicScores[t].correct||0;});
  const pct=Math.round((totalCorrect/totalQ)*100);
  const rows=SENIOR_TOPICS.map(t=>{const meta=QB_SENIOR_V2[t]._meta;const sc=seniorState.topicScores[t];const tpct=sc.total>0?Math.round((sc.correct/sc.total)*100):0;const col=tpct>=60?'#1D9E75':'#E07B20';return `<div class="br-row"><div class="br-lbl"><span>${meta.icon} ${meta.label}</span><span>${sc.correct}/${sc.total} · <b>${tpct}%</b></span></div><div class="br-track"><div class="br-fill" data-w="${tpct}" style="width:0%;background:${col}"></div></div><div class="br-score" style="color:${col}">${tpct>=60?'▲ Good':'▼ Practice'}</div></div>`;}).join('');
  return `<div class="card"><div class="rh"><div style="font-size:11px;color:var(--muted)">${new Date().toLocaleDateString()}</div><div style="font-size:18px;font-weight:700;color:var(--text);margin:4px 0">${info.name}</div><div class="lvbadge" style="background:#1D9E75">Senior Course</div><div style="font-size:12px;color:#1D9E75;font-weight:600;margin-top:3px">Real-life English</div></div><div class="sg"><div class="sc"><div class="sl">Score</div><div class="sv">${totalCorrect}/${totalQ}</div><div class="ss">${pct}%</div></div><div class="sc"><div class="sl">Time</div><div class="sv" style="font-size:14px">${time}</div></div></div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Topic Breakdown</div>${rows}<div class="cta"><div class="cta-t">Ready to improve your English at HANA Academy?</div><div class="cta-s">Clark, Philippines · clarkhana.com · Expert Filipino ESL teachers</div><div class="btn-row"><button class="btn btn-p btn-sm" onclick="dlSeniorPDF()">⬇ ${L.dp||'Download PDF'}</button><button class="btn btn-sm" onclick="window.open('https://clarkhana.com','_blank')">${L.bt||'Book Free Trial ↗'}</button></div></div></div>`;
}
function buildSeniorAnswers(){
  const qpt=getSeniorQsPerTopic();let h='<div class="card">';let qNum=0;
  SENIOR_TOPICS.forEach(topic=>{
    const meta=QB_SENIOR_V2[topic]._meta;const sc=seniorState.topicScores[topic];
    const qs=QB_SENIOR_V2[topic].questions.slice(0,qpt[topic]||3);
    h+=`<div class="as-sec"><div class="as-st"><span>${meta.icon} ${meta.label}</span><span>${sc.correct}/${sc.total} correct</span></div>`;
    qs.forEach((q,i)=>{
      const a=seniorState.allAnswers[qNum++];
      const langMap={'ko':'q_ko','ja':'q_ja','zh-tw':'q_zhtw','zh-cn':'q_zhcn','vi':'q_vi','mn':'q_mn','th':'q_th','ar':'q_ar','ru':'q_ru','es':'q_es'};
      const qText=(q[langMap[lang]||'q_en']||q.q_en||'').slice(0,80);
      h+=`<div class="as-item"><div class="as-num ${a?.ok?'ok':'bad'}">${qNum}</div><div class="as-body"><div class="as-q">${qText}</div><div class="as-r"><span class="as-c">✓ ${a?.ans||''}</span><span class="as-m ${a?.ok?'ok':'bad'}">${a?.ok?'✓':'✗'} ${a?.chosen||''}</span></div></div></div>`;
    });
    h+='</div>';
  });
  return h+'</div>';
}

    doc.setFillColor(220,220,220);doc.rect(110,y-3.5,80,5,'F');doc.setFillColor(tpct>=60?29:220,tpct>=60?158:100,tpct>=60?117:20);doc.rect(110,y-3.5,tpct*0.8,5,'F');y+=9;

function dlPDF(){
  if(typeof window.jspdf==='undefined'){
    const btn=event?.target;if(btn){btn.textContent='⏳';btn.disabled=true;}
    const CDNS=['https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js','https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js','https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js'];
    function tryLoad(i){if(i>=CDNS.length){if(btn){btn.textContent='⬇ '+(L.dp||'PDF');btn.disabled=false;}alert('PDF 로드 실패');return;}
      const s=document.createElement('script');s.src=CDNS[i];
      s.onload=()=>{if(btn){btn.textContent='⬇ '+(L.dp||'PDF');btn.disabled=false;}setTimeout(dlPDF,100);};
      s.onerror=()=>tryLoad(i+1);document.head.appendChild(s);}
    tryLoad(0);return;
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const _pIsESL=selType==='esl',_pIsTOEIC=selType==='toeic',_pIsIELTS=selType==='ielts';
  const _pTq=(_pIsTOEIC||_pIsIELTS)?20:40;
  const lv=detectedLevel; const meta=LV_META[lv]||LV_META[1];
  const _pEslLv=ESL_FROM_DIFF(diff); const _pEslM=ESL_META[_pEslLv]||ESL_META['A1'];
  const _pTBand=TOEIC_FROM_DIFF(diff); const _pTM=TOEIC_META[_pTBand]||TOEIC_META['600'];
  const _pIBand=IELTS_FROM_DIFF(diff); const _pIM=IELTS_META[_pIBand]||IELTS_META['6.0'];
  const tot=Object.values(scores).reduce((a,b)=>a+b,0);
  const pct=Math.round((tot/_pTq)*100);
  const sub=pct>=80?'H':pct>=50?'M':'L';
  const lvLabel=_pIsESL?_pEslLv:_pIsTOEIC?`~${_pTBand}`:_pIsIELTS?`Band ${_pIBand}`:`${meta.label}${sub}`;
  const descLabel=_pIsESL?_pEslM.score_label:_pIsTOEIC?`TOEIC ${_pTM.desc}`:_pIsIELTS?`IELTS ${_pIM.desc}`:meta.desc;
  const equivLabel=_pIsESL?`IELTS ~${_pEslM.ielts} · TOEIC ~${_pEslM.toeic}`:_pIsTOEIC?`Est. ~${_pTBand}`:_pIsIELTS?`Est. band ${_pIBand}`:meta.equiv;
  const el=Math.round((Date.now()-t0)/1000);
  const date=new Date().toLocaleDateString();

  // Header band
  doc.setFillColor(29,158,117); doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(`HANA Academy — ${_pIsESL?'ESL':_pIsTOEIC?'TOEIC Prep':_pIsIELTS?'IELTS Prep':'Junior'} Level Test Results`,14,12);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('clarkhana.com · Clark, Philippines · Filipino Expert ESL Teachers',14,20);
  doc.text(date,180,20,'right');

  // Student info
  doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(`Student: ${info.name}  |  Age: ${info.age}  |  Gender: ${info.gender}  |  Email: ${info.email}`,14,35);

  // Level badge box
  doc.setFillColor(225,245,238); doc.rect(14,40,75,22,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(15,110,86);
  doc.text('Detected Level',18,49);
  doc.setFontSize(22); doc.text(lvLabel,18,61);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80,80,80);
  doc.text(`${descLabel}  |  ${equivLabel}`,42,61);

  // Stats box
  doc.setFillColor(247,249,248); doc.rect(95,40,105,22,'F');
  doc.setFontSize(8); doc.setTextColor(60,60,60);
  doc.text(`Total Score: ${tot}/${_pTq}  (${pct}%)       Time: ${Math.floor(el/60)}m ${el%60}s`,99,49);
  doc.text(_pIsESL?`CEFR: ${_pEslLv}  |  IELTS ~${_pEslM.ielts}  |  TOEIC ~${_pEslM.toeic}`:_pIsTOEIC?`Score: ~${_pTBand}  |  L: ~${_pTM.listening}  |  R: ~${_pTM.reading}`:_pIsIELTS?`Band: ${_pIBand}  |  L ~${_pIBand}  |  R ~${_pIBand}`:`Lexile: ${meta.lexile}  |  TOEFL Jr: ~${600+lv*15}–${620+lv*15}  |  AR: ${(lv*0.4).toFixed(1)}`,99,55);
  doc.text(`Top ${Math.max(5,100-pct)}% Rank  |  Recommended: ${meta.desc} English`,99,61);

  // Breakdown
  let y=72;
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(29,29,29);
  doc.text('Score Breakdown by Section',14,y); y+=7;
  SECS.forEach(sec=>{
    const items=allA.filter(a=>a.sec===sec);

    doc.setFont('helvetica','normal'); doc.setFontSize(8);

    doc.text(I.en.sc[sec],14,y);

    doc.setFillColor(220,220,220); doc.rect(110,y-3.5,80,5,'F');

    doc.rect(110,y-3.5,raw*0.8,5,'F');
    doc.setFillColor(226,75,74); doc.rect(110+avg*0.8,y-4.5,1.5,7,'F');
    y+=9;
  });

  // Answer sheet
  y+=4;
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(29,29,29);
  doc.text('Complete Answer Sheet',14,y); y+=6;

  SECS.forEach(sec=>{
    const items=allA.filter(a=>a.sec===sec);
    if(!items.length)return;
    if(y>265){doc.addPage(); y=20;}
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(29,158,117);
    doc.text(`${I.en.sc[sec]}  (${scores[sec]}/${items.length} correct)`,14,y); y+=5;
    items.forEach(a=>{
      if(y>270){doc.addPage(); y=20;}
      const ok=a.ok;
      doc.setFillColor(ok?230:253, ok?245:232, ok?238:232);
      doc.rect(14,y-3.5,182,8,'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
      doc.setTextColor(ok?15:160, ok?110:40, ok?86:40);
      const qTxt=`Q${a.num}: ${(a.q||'').slice(0,70)}`;
      doc.text(qTxt,17,y);
      doc.setTextColor(60,60,60);
      doc.text(`Correct: ${(a.ans||'').slice(0,40)}   |   Your answer: ${(a.mine||'').slice(0,35)}   ${ok?'✓':'✗'}`,17,y+4);
      y+=11;
    });
    y+=3;
  });

  // Footer
  const lastY=doc.internal.pageSize.getHeight();
  doc.setFillColor(29,158,117); doc.rect(0,lastY-14,210,14,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('HANA Academy · Clark, Philippines · clarkhana.com · Results valid for 6 months',14,lastY-5);

  doc.save(`HANA_Junior_${info.name.replace(/\s+/g,'_')}_${lvLabel}_${new Date().toISOString().slice(0,10)}.pdf`);
}
