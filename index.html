    {ctx:"Psychoanalyst: Lacan's mirror stage marks the infant's first identification with an external image — instilling a split between the self-as-experienced and self-as-represented.",q:"What does the mirror stage install?",opts:["A) a unified self","B) a split between self-as-experienced and self-as-represented","C) omnipotence","D) attachment to the mother"],ans:"B) a split between self-as-experienced and self-as-represented",exp:"'fundamental split between the self as experienced and as represented'.",audio:"Psychoanalyst: Lacan's mirror stage marks first identification with an external image, instilling a split between self-as-experienced and self-as-represented."},
    {ctx:"Philosopher: In Plato's cave allegory, prisoners mistake shadows for reality. The philosopher who escapes and sees the sun represents the ascent from opinion to knowledge.",q:"What does the escape represent?",opts:["A) rejection of society","B) the ascent from opinion to knowledge","C) the danger of education","D) political leadership"],ans:"B) the ascent from opinion to knowledge",exp:"'ascent from opinion to knowledge'.",audio:"Philosopher: In Plato's cave, prisoners mistake shadows for reality. The philosopher's escape represents ascent from opinion to knowledge."},
    {ctx:"Theorist: Bourdieu's habitus is a system of durable dispositions — ways of perceiving, thinking, and acting — acquired through socialization, shaping behavior unconsciously.",q:"What is the habitus?",opts:["A) a social class","B) a political ideology","C) durable dispositions acquired through socialization","D) a legal framework"],ans:"C) durable dispositions acquired through socialization",exp:"'durable dispositions...acquired through socialization'.",audio:"Theorist: Bourdieu's habitus is a system of durable dispositions — ways of perceiving and acting — acquired through socialization and shaping behavior unconsciously."},
    {ctx:"Neuroscientist: The binding problem asks how the brain integrates separately processed information — color, shape, motion — into a unified perceptual experience.",q:"What is the binding problem?",opts:["A) memory formation","B) how the brain unifies separately processed info","C) emotion affecting perception","D) attention allocation"],ans:"B) how the brain unifies separately processed info",exp:"'integrates information...into a unified perceptual experience'.",audio:"Neuroscientist: The binding problem asks how the brain integrates separately processed information into a unified perceptual experience."},
    {ctx:"Philosopher: Rawls's difference principle: inequalities are just only if they benefit the least advantaged members of society.",q:"What does it state?",opts:["A) eliminate all inequalities","B) inequalities just only if they benefit the least advantaged","C) inequality is morally neutral","D) the veil of ignorance eliminates inequality"],ans:"B) inequalities just only if they benefit the least advantaged",exp:"'inequalities are just only if they benefit the least advantaged'.",audio:"Philosopher: Rawls's difference principle holds inequalities are just only if they benefit the least advantaged members of society."},
    {ctx:"Critic: Žižek argues ideology is most powerful when it structures practices — 'they know very well, but still act as if they don't know.'",q:"When is ideology most powerful?",opts:["A) when consciously believed","B) when openly stated","C) when it structures practice despite known falsity","D) when enforced by the state"],ans:"C) when it structures practice despite known falsity",exp:"'they know very well but act as if they don't know'.",audio:"Critic: Žižek argues ideology is most powerful when it structures practice — they know very well but act as if they don't."},
    {ctx:"Theorist: Anderson defined nations as 'imagined communities' — members never know most fellow members, yet each imagines their communion.",q:"What makes a nation 'imagined'?",opts:["A) it doesn't really exist","B) invented recently","C) members imagine communion with those they'll never know","D) based on myth only"],ans:"C) members imagine communion with those they'll never know",exp:"'never know most fellow members, yet...image of their communion'.",audio:"Theorist: Anderson defined nations as imagined communities — members never know most others, yet each imagines their communion."},
    {ctx:"Mathematician: Gödel's incompleteness theorems prove that in any sufficiently complex formal system, there will always be true statements that cannot be proved within it.",q:"What do the theorems prove?",opts:["A) mathematics is subjective","B) all truths are provable","C) some true statements cannot be proved within a system","D) complex systems are inconsistent"],ans:"C) some true statements cannot be proved within a system",exp:"'true statements that cannot be proved within that system'.",audio:"Mathematician: Gödel proved that in any sufficiently complex formal system, there are always true statements that cannot be proved within it."},
    {ctx:"Literary critic: Barthes's death of the author liberates the text from the creator's intention — meaning is produced by the reader, not deposited by the writer.",q:"What does it liberate?",opts:["A) writers from criticism","B) texts from authorial intention","C) readers from analysis","D) meaning from context"],ans:"B) texts from authorial intention",exp:"'liberates the text from the intention of its creator'.",audio:"Literary critic: Barthes's death of the author liberates the text from the creator's intention — meaning is produced by the reader."},
    {ctx:"Ethicist: Gilligan's care ethics prioritizes relationships and responsibilities over abstract principles, arguing moral reasoning is fundamentally relational and contextual.",q:"What does care ethics prioritize?",opts:["A) universal rules","B) individual rights","C) relationships and responsibilities","D) legal obligations"],ans:"C) relationships and responsibilities",exp:"'prioritizes relationships and responsibilities'.",audio:"Ethicist: Gilligan's care ethics prioritizes relationships and responsibilities over abstract principles — moral reasoning is relational and contextual."},
    {ctx:"Philosopher: Wittgenstein's later philosophy argues meaning is use — words mean what they do in the context of particular 'language games.'",q:"What does it argue about meaning?",opts:["A) words picture facts","B) meaning is innate","C) meaning is use in language games","D) language mirrors reality"],ans:"C) meaning is use in language games",exp:"'meaning is use...in language games'.",audio:"Philosopher: Wittgenstein's later philosophy argues meaning is use — words mean what they do in particular language games."}
  ],
  reading: [
    {ctx:"The Sapir-Whorf hypothesis proposes that language shapes perception. Strong versions say language determines thought; weak versions say it merely influences it. Recent evidence supports moderate versions.",q:"What do recent findings support?",opts:["A) the strong version","B) the weak version","C) a moderate version","D) rejecting the hypothesis"],ans:"C) a moderate version",exp:"'recent evidence supports moderate versions'."},
    {ctx:"The sublime in Romantic aesthetics describes the experience of confronting something so vast or powerful it exceeds rational comprehension. Kant distinguished the mathematical (immeasurably large) and dynamical (overwhelmingly powerful) sublime.",q:"What two forms did Kant distinguish?",opts:["A) rational and irrational","B) natural and artificial","C) mathematical and dynamical","D) temporal and spatial"],ans:"C) mathematical and dynamical",exp:"'mathematical sublime...dynamical sublime'."},
    {ctx:"Panopticism (Foucault): when people believe they may be watched at any moment, they regulate their own behavior, making continuous observation unnecessary.",q:"Why is continuous observation unnecessary?",opts:["A) people resist surveillance","B) technology automates it","C) people self-regulate under potential observation","D) guards become unnecessary"],ans:"C) people self-regulate under potential observation",exp:"'they regulate their own behavior'."},
    {ctx:"Emergence: properties arising in complex systems that cannot be predicted from components. Consciousness from neurons, life from chemistry — the whole is more than the sum of its parts.",q:"What defines an emergent property?",opts:["A) predicted from components","B) always physical","C) cannot be reduced to components' properties","D) exists independently"],ans:"C) cannot be reduced to components' properties",exp:"'cannot be predicted from or reduced to the properties of their components'."},
    {ctx:"Habermas's colonization of the life-world: instrumental rationality of markets invades domains — family, culture, education — that properly belong to communicative rationality.",q:"What does it involve?",opts:["A) physical territory occupied","B) instrumental rationality invading communicative domains","C) educational expansion","D) cultural homogenization"],ans:"B) instrumental rationality invading communicative domains",exp:"'instrumental rationality...colonizes communicative domains'."},
    {ctx:"The moral arc metaphor implies a teleological view of history — progress is directional. Critics argue this underestimates reversals and the contingency of moral progress.",q:"What do critics argue?",opts:["A) progress is guaranteed","B) it overestimates reversals","C) it underestimates contingency and reversibility","D) it is scientifically accurate"],ans:"C) it underestimates contingency and reversibility",exp:"'underestimates reversals, regression, and the contingency'."},
    {ctx:"Intersectionality (Crenshaw): identity categories don't function independently but interact to produce qualitatively different experiences. A Black woman's experience cannot be understood by simply adding racism to sexism.",q:"What is the key insight?",opts:["A) identities can be analyzed separately","B) racial discrimination is more severe","C) intersecting identities create qualitatively distinct experiences","D) class overrides other identity forms"],ans:"C) intersecting identities create qualitatively distinct experiences",exp:"'intersection creates something distinct'."},
    {ctx:"Representationalism: the mind accesses representations, not the world itself. Enactivism argues cognition is constituted by active engagement with the environment — the mind is not inside the head but extends into the world.",q:"How does enactivism differ?",opts:["A) denies the mind exists","B) claims cognition is active engagement with environment","C) focuses on brain structures","D) accepts mental representations"],ans:"B) claims cognition is active engagement with environment",exp:"'cognition is constituted by active engagement'."},
    {ctx:"Taylor's politics of recognition: identities require social acknowledgment to flourish. Misrecognition — being seen through a distorting mirror — constitutes genuine harm, limiting self-development.",q:"What does misrecognition cause?",opts:["A) mere disrespect","B) genuine harm limiting self-development","C) political disenfranchisement","D) economic inequality"],ans:"B) genuine harm limiting self-development",exp:"'constitutes genuine harm, limiting self-development'."},
    {ctx:"Prisoner's dilemma: rational self-interest leads both prisoners to betray, leaving both worse off than mutual silence — a collectively irrational outcome.",q:"What does it illustrate?",opts:["A) cooperation is irrational","B) communication prevents crime","C) rational self-interest can produce collective irrationality","D) betrayal always leads to better outcomes"],ans:"C) rational self-interest can produce collective irrationality",exp:"'rational self-interest can lead to collectively irrational outcomes'."},
    {ctx:"Commodity fetishism (Marx): social relations between people become disguised as relations between commodities, obscuring the human labor that produced them.",q:"What does it obscure?",opts:["A) exchange value","B) market prices","C) human labor behind commodities","D) trade relations"],ans:"C) human labor behind commodities",exp:"'obscuring the human labor'."},
    {ctx:"Epistemic injustice (Fricker): testimonial injustice deflates a speaker's credibility due to identity prejudice; hermeneutical injustice gaps in collective interpretive resources disadvantage groups.",q:"What distinguishes them?",opts:["A) one affects individuals, one institutions","B) one involves credibility, one interpretive resources","C) one intentional, one accidental","D) one legal, one social"],ans:"B) one involves credibility, one interpretive resources",exp:"'credibility is deflated' vs. 'gaps in interpretive resources'."},
    {ctx:"Post-secular society (Habermas): liberal democracies need a translation requirement — religious arguments translated into publicly accessible terms without marginalizing or privileging religion.",q:"What is the translation requirement?",opts:["A) ban religious texts","B) religious arguments in publicly accessible terms","C) all citizens learn theology","D) secular adopts religious language"],ans:"B) religious arguments in publicly accessible terms",exp:"'religious arguments translated into publicly accessible terms'."},
    {ctx:"The strong programme (sociology of science): both true and false scientific beliefs should be explained equally. Successful science is not exempt from social explanation simply because it is true.",q:"What does it argue?",opts:["A) science is always true","B) only false science needs social explanation","C) true and false science equally subject to social explanation","D) sociologists should not study science"],ans:"C) true and false science equally subject to social explanation",exp:"'both true and false scientific beliefs equally'."},
    {ctx:"Orientalism (Said): Western scholarship on the 'East' is not neutral description but discourse constructing the Orient as exotic, static, and inferior — serving imperial domination.",q:"What does Said argue?",opts:["A) mostly accurate","B) neutral description","C) constructs the Orient to serve imperial interests","D) no political implications"],ans:"C) constructs the Orient to serve imperial interests",exp:"'constructs the Orient...serving imperial domination'."},
    {ctx:"Apophatic theology (via negativa): God cannot be described positively, only through negation — God is not finite, not temporal, not material — acknowledging language's limits.",q:"What does it hold?",opts:["A) God described through attributes","B) God only described through negation","C) theology rejects metaphysics","D) language captures divine reality"],ans:"B) God only described through negation",exp:"'only through negation'."},
    {ctx:"Internalists: rational requirements motivate only if connected to existing desires. Externalists: rational requirements bind regardless of desire.",q:"How do they differ?",opts:["A) internalists accept external reasons","B) internalists link motivation to desires; externalists don't","C) agree on motivation but differ on logic","D) externalists accept psychological evidence"],ans:"B) internalists link motivation to desires; externalists don't",exp:"'can only motivate if they connect to existing desires' vs. 'bind regardless of desire'."},
    {ctx:"Bhabha's mimicry: the colonized who adopts colonizer culture is 'almost the same, but not quite' — producing unease in both colonizer and colonized.",q:"What does mimicry produce?",opts:["A) perfect assimilation","B) complete resistance","C) unease from imperfect resemblance","D) cultural exchange"],ans:"C) unease from imperfect resemblance",exp:"'almost the same, but not quite...producing unease'."},
    {ctx:"The Frankfurt School's culture industry: mass-produced culture creates false needs, pacifies critical consciousness, and commodifies art into entertainment.",q:"What does it argue?",opts:["A) mass culture promotes freedom","B) culture industry creates false needs and suppresses critique","C) art should be commercial","D) entertainment is inherently political"],ans:"B) culture industry creates false needs and suppresses critique",exp:"'creates false needs, pacifies critical consciousness'."},
    {ctx:"Frege's sense and reference: 'morning star' and 'evening star' have the same reference (Venus) but different senses — the way they present their object differs.",q:"How do they differ?",opts:["A) refer to different objects","B) same sense and reference","C) same reference but different senses","D) no reference"],ans:"C) same reference but different senses",exp:"'same reference (Venus) but different senses'."},
    {ctx:"Restorative justice asks: 'what needs have been created and how can they be met?' — unlike retributive justice's 'what law was broken and who must be punished?'",q:"What question defines it?",opts:["A) what law was broken?","B) who deserves punishment?","C) what needs were created and how to meet them?","D) what sentence is proportionate?"],ans:"C) what needs were created and how to meet them?",exp:"'what needs have been created and how can they be met?'"},
    {ctx:"Logical truths are true by virtue of meaning alone; empirical truths require evidence. Hume argued claims fitting neither should be committed to the flames.",q:"What did Hume recommend for claims in neither category?",opts:["A) further analysis","B) empirical investigation","C) they should be discarded","D) logical formalization"],ans:"C) they should be discarded",exp:"'committed to the flames'."},
    {ctx:"Habermas's discourse ethics: norms are valid only if all affected could agree in an ideal speech situation — free from coercion, power differentials, and strategic action.",q:"What characterizes ideal speech?",opts:["A) majority agreement","B) expert authority","C) freedom from coercion and power differentials","D) written rules"],ans:"C) freedom from coercion and power differentials",exp:"'free from coercion, power differentials'."},
    {ctx:"The secularization thesis predicted modernity would lead to religion's decline. Evidence is mixed: declining in Western Europe but surging in the Global South.",q:"What complicates the thesis?",opts:["A) all nations more secular","B) religion declined globally","C) religion surged in some regions while declining in others","D) secularization was always a myth"],ans:"C) religion surged in some regions while declining in others",exp:"'declined in Western Europe but surged in the Global South'."},
    {ctx:"Double effect requires: harm foreseen not intended; action not morally evil in itself; good effect proportionate — distinguishing a doctor managing pain from euthanasia.",q:"What distinguishes the doctor case from euthanasia?",opts:["A) the outcome is different","B) pain relief is the goal; death is not","C) patient consents in one case","D) euthanasia is legal"],ans:"B) pain relief is the goal; death is not",exp:"Death is a foreseen side effect, not the intended goal."},
    {ctx:"Neurodiversity advocates argue conditions like autism and ADHD are natural cognitive variations — the medical model treating them as disorders is challenged by a social model focusing on environmental misfit.",q:"What does the neurodiversity framework challenge?",opts:["A) brain research","B) all medical interventions","C) the medical model's treatment of variation as disorder","D) education funding"],ans:"C) the medical model's treatment of variation as disorder",exp:"'medical model...disorders...challenged by social model'."},
    {ctx:"The problem of the criterion: identifying knowledge requires a criterion, but selecting the right criterion requires knowing what knowledge is. Particularists start with instances; methodists with criteria.",q:"How do they differ?",opts:["A) particularists with criteria; methodists with instances","B) both start with instances","C) particularists with instances; methodists with criteria","D) both reject the problem"],ans:"C) particularists with instances; methodists with criteria",exp:"'Particularists start with instances; methodists start with criteria'."},
    {ctx:"Aesthetic distance allows viewers to appreciate art formally without being overwhelmed. Too little leads to unreflective emotional response; too much to cold formalism.",q:"What does too little cause?",opts:["A) cold formalism","B) boredom","C) unreflective emotional response","D) critical distance"],ans:"C) unreflective emotional response",exp:"'Too little distance leads to unreflective emotional response'."},
    {ctx:"Negative capability (Keats): the capacity to remain in uncertainty, mystery, and doubt without reaching for fact and reason — essential to creative achievement.",q:"What is it?",opts:["A) inability to create","B) comfort with uncertainty and mystery","C) critical analysis of art","D) rejection of all emotion"],ans:"B) comfort with uncertainty and mystery",exp:"'remain in uncertainty, mystery, and doubt'."},
    {ctx:"Game theory's prisoner's dilemma: rational self-interest leads to betrayal, leaving both worse off than mutual cooperation — collective irrationality from individual rationality.",q:"What's the key insight?",opts:["A) cooperation is irrational","B) communication prevents defection","C) rational self-interest can produce collective irrationality","D) betrayal always wins"],ans:"C) rational self-interest can produce collective irrationality",exp:"'rational self-interest can lead to collectively irrational outcomes'."},
    {ctx:"The Flynn effect: average IQ scores rose over the 20th century. Attributed to better nutrition, education, and increased abstract thinking demands.",q:"What explains it?",opts:["A) genetic evolution","B) better test design","C) improved nutrition and education","D) population growth"],ans:"C) improved nutrition and education",exp:"'improvements in nutrition, education'."}

  writing: [
    {q:"Fill in: 'The argument, ___ at first glance, conceals deep inconsistencies.'",opts:["A) plausibly","B) plausible","C) being plausible","D) to be plausible"],ans:"B) plausible",exp:"Reduced appositive: 'plausible at first glance'."},
    {q:"Fill in: 'The evidence points to ___ a systemic failure.'",opts:["A) there being","B) there is","C) it being","D) there be"],ans:"A) there being",exp:"Points to + gerund phrase: there being."},
    {q:"Fill in: 'Little ___ she realize the implications of her discovery.'",opts:["A) does","B) did","C) had","D) was"],ans:"B) did",exp:"Inversion after fronted 'Little'."},
    {q:"Fill in: 'The reforms failed ___ to structural resistance.'",opts:["A) owing","B) because","C) since","D) for"],ans:"A) owing",exp:"'Owing to' = because of."},
    {q:"Fill in: 'What remains unclear is ___ the policy was intended to achieve.'",opts:["A) that","B) whether","C) what","D) which"],ans:"C) what",exp:"'What the policy intended' — nominal wh-clause."},
    {q:"Fill in: 'It is only ___ examining the contradictions that understanding deepens.'",opts:["A) in","B) by","C) through","D) while"],ans:"C) through",exp:"'Only through...that' — cleft with prepositional phrase."},
    {q:"Fill in: 'The speaker's assumptions go largely ___.'",opts:["A) unquestioned","B) without questioning","C) to be questioned","D) as unquestioned"],ans:"A) unquestioned",exp:"'Go unquestioned' = remain without being questioned."},
    {q:"Fill in: 'She was at pains to ___ that the findings were preliminary.'",opts:["A) emphasizing","B) emphasized","C) emphasize","D) have emphasized"],ans:"C) emphasize",exp:"'At pains to' + infinitive."},
    {q:"Fill in: 'Whether or not the claim is true, it ___ attention.'",opts:["A) deserves","B) deserving","C) to deserve","D) is deserving of"],ans:"A) deserves",exp:"Main clause: finite verb required."},
    {q:"Fill in: 'The paradox ___ that rationality itself can produce irrational outcomes.'",opts:["A) is","B) consists in","C) relies on","D) depends with"],ans:"B) consists in",exp:"'Consists in' = is defined by."},
    {q:"Fill in: 'This raises the question ___ agency is possible within structural constraints.'",opts:["A) that","B) whether","C) if","D) what"],ans:"B) whether",exp:"'Raises the question whether' — formal nominal clause."},
    {q:"Fill in: 'His position is ___ nuanced to be captured in a slogan.'",opts:["A) very","B) so","C) too","D) enough"],ans:"C) too",exp:"Too + adjective + to-infinitive."},
    {q:"Fill in: 'The problem cannot be wished ___.'",opts:["A) off","B) away","C) out","D) aside"],ans:"B) away",exp:"'Wish away' = make disappear by wishing."},
    {q:"Fill in: 'She approached the text ___ a deconstructive lens.'",opts:["A) by","B) with","C) through","D) using"],ans:"C) through",exp:"'Through a lens' = using a framework."},
    {q:"Fill in: 'The argument, once ___ to its essentials, is straightforward.'",opts:["A) stripped","B) stripping","C) being stripped","D) strip"],ans:"A) stripped",exp:"Reduced temporal clause: 'once stripped'."},
    {q:"Fill in: 'It would be ___ to dismiss this without investigation.'",opts:["A) premature","B) prematurely","C) too premature","D) most premature"],ans:"A) premature",exp:"It would be + adjective + to-infinitive."},
    {q:"Fill in: 'The analysis ___ on what the data does not show, as much as on what it does.'",opts:["A) relies","B) insists","C) turns","D) focuses"],ans:"C) turns",exp:"'Turns on' = depends critically on."},
    {q:"Fill in: 'Rather ___ resolving the contradiction, the revision deepened it.'",opts:["A) than","B) then","C) as","D) that"],ans:"A) than",exp:"'Rather than' + gerund."},
    {q:"Fill in: 'The distinction ___ in practice even where it holds in theory.'",opts:["A) collapses","B) collapse","C) collapsing","D) having collapsed"],ans:"A) collapses",exp:"Present simple for general truths; 'distinction' is singular."},
    {q:"Fill in: 'The concept has been put to uses its originator ___ have anticipated.'",opts:["A) might never","B) would","C) could not","D) should never"],ans:"A) might never",exp:"'Might never have anticipated' — modal perfect."},
    {q:"Fill in: '___ one accepts the premise, the conclusion follows necessarily.'",opts:["A) Once","B) Only if","C) Granted that","D) Providing"],ans:"C) Granted that",exp:"'Granted that' = assuming or accepting that."},
    {q:"Fill in: 'The text ___ read on multiple levels simultaneously.'",opts:["A) admits to be","B) admits being","C) admits of being","D) admits to being read"],ans:"C) admits of being",exp:"'Admit of' = allow or permit."},
    {q:"Fill in: 'Much ink ___ spilled on this question without resolution.'",opts:["A) was","B) has been","C) is being","D) had"],ans:"B) has been",exp:"Present perfect: ongoing relevance."},
    {q:"Fill in: 'Her critique cuts to the ___ of the issue.'",opts:["A) core","B) heart","C) quick","D) center"],ans:"C) quick",exp:"'Cut to the quick' = reach the most sensitive point."},
    {q:"Fill in: 'The implications ___ beyond the immediate context.'",opts:["A) extend","B) extends","C) are extended","D) extended"],ans:"A) extend",exp:"'Implications' is plural → extend."},
    {q:"Fill in: 'The problem ___ a way of resisting straightforward solutions.'",opts:["A) is having","B) has","C) has of","D) is of"],ans:"B) has",exp:"'Has a way of' = tends to."},
    {q:"Fill in: 'What is ___ is not whether it works, but why it works when it does.'",opts:["A) at stake","B) in question","C) most intriguing","D) often overlooked"],ans:"C) most intriguing",exp:"What makes this intellectually compelling."},
    {q:"Fill in: 'The claim does not so much ___ a position as dissolve the question.'",opts:["A) stake out","B) make out","C) hold up","D) carry out"],ans:"A) stake out",exp:"'Stake out a position' = establish a clear view."},
    {q:"Fill in: 'The passage between theory and practice is fraught ___ difficulty.'",opts:["A) by","B) in","C) with","D) of"],ans:"C) with",exp:"'Fraught with' = full of."},
    {q:"Fill in: 'Each reading generates new questions rather than ___ existing ones.'",opts:["A) resolve","B) resolves","C) resolving","D) having resolved"],ans:"C) resolving",exp:"'rather than resolving' — parallel gerund."}
  ]

    {q:"'Iterability' (Derrida) means:",opts:["A) exact repetition","B) repeatability in new contexts that transforms meaning","C) narrative sequence","D) logical consistency"],ans:"B) repeatability in new contexts that transforms meaning",exp:"Iterability = repeatability that always alters."},
    {q:"'Apotropaic' means:",opts:["A) historically accurate","B) intended to ward off evil","C) philosophically rigorous","D) grammatically complex"],ans:"B) intended to ward off evil",exp:"Apotropaic = having power to avert evil."},
    {q:"'Aporetic' describes something:",opts:["A) fully resolved","B) containing unresolved difficulties","C) logically sound","D) historically verifiable"],ans:"B) containing unresolved difficulties",exp:"Aporetic = characterized by irresolvable perplexity."},
    {q:"'Chthonic' refers to:",opts:["A) celestial and divine","B) relating to the underworld or earth","C) oceanic and vast","D) rational and ordered"],ans:"B) relating to the underworld or earth",exp:"Chthonic = of or relating to the underworld."},
    {q:"'Interstitial' means:",opts:["A) fully integrated","B) existing in the spaces between things","C) universally applicable","D) historically continuous"],ans:"B) existing in the spaces between things",exp:"Interstitial = relating to interstices."},
    {q:"'Apatheia' in Stoic philosophy means:",opts:["A) complete indifference","B) freedom from destructive passions while retaining rational emotions","C) philosophical paralysis","D) absence of all feeling"],ans:"B) freedom from destructive passions while retaining rational emotions",exp:"Apatheia = freedom from irrational passions, not all emotion."},
    {q:"'Enantodromia' in Jungian psychology means:",opts:["A) a circular argument","B) the tendency of things to transform into their opposites","C) repression of shadow","D) individuation"],ans:"B) the tendency of things to transform into their opposites",exp:"Enantodromia = conversion into opposite."},
    {q:"'Palimpsest' refers to:",opts:["A) a circular argument","B) something altered but bearing traces of an earlier form","C) a type of allegory","D) a perfect copy"],ans:"B) something altered but bearing traces of an earlier form",exp:"Palimpsest = overwritten but earlier text still visible; used metaphorically."},
    {q:"'Apocatastasis' in theology means:",opts:["A) final judgment","B) the restoration of all things to their original state","C) divine punishment","D) prophetic vision"],ans:"B) the restoration of all things to their original state",exp:"Apocatastasis = universal restoration."},
    {q:"'Synderesis' means:",opts:["A) a logical contradiction","B) the innate sense of moral principles","C) a literary technique","D) a form of reasoning"],ans:"B) the innate sense of moral principles",exp:"Synderesis = innate habit of first moral principles."},
    {q:"'Antinomianism' holds:",opts:["A) moral laws must be followed strictly","B) faith liberates believers from moral law","C) religious and secular law are identical","D) tradition determines ethics"],ans:"B) faith liberates believers from moral law",exp:"Antinomianism = salvation by faith makes law non-binding."},
    {q:"'Diegesis' refers to:",opts:["A) the narrated story world","B) the author's biography","C) the reader's interpretation","D) the thematic content"],ans:"A) the narrated story world",exp:"Diegesis = the internal world of the narrative."},
    {q:"'Ekphrasis' refers to:",opts:["A) a logical argument","B) the literary description of a work of visual art","C) a type of simile","D) an extended metaphor"],ans:"B) the literary description of a work of visual art",exp:"Ekphrasis = literary representation of visual art."},
    {q:"'Abduction' in logic means:",opts:["A) deduction from premises","B) inference to the best explanation","C) induction from data","D) refutation by counterexample"],ans:"B) inference to the best explanation",exp:"Abduction (Peirce) = reasoning to the most plausible explanation."},
    {q:"'Haecceity' refers to:",opts:["A) a universal property","B) the 'thisness' making a particular thing this individual","C) a necessary truth","D) a possible world"],ans:"B) the 'thisness' making a particular thing this individual",exp:"Haecceity (Duns Scotus) = the individuating property."},
    {q:"'Aseity' in theology means:",opts:["A) divine goodness","B) existence from and through oneself","C) divine justice","D) providential action"],ans:"B) existence from and through oneself",exp:"Aseity = self-existence, self-causation."},
    {q:"'Apophthegm' is:",opts:["A) a long philosophical treatise","B) a terse, pointed saying","C) a type of logical proof","D) a religious prohibition"],ans:"B) a terse, pointed saying",exp:"Apophthegm = a concise, witty saying."},
    {q:"'Adumbrate' means to:",opts:["A) describe in full detail","B) give a sketchy outline or foreshadow","C) deny completely","D) prove rigorously"],ans:"B) give a sketchy outline or foreshadow",exp:"Adumbrate = sketch out, prefigure."},
    {q:"'Catachresis' is:",opts:["A) a correct metaphor","B) the misuse or strained use of words","C) a type of allegory","D) an exact comparison"],ans:"B) the misuse or strained use of words",exp:"Catachresis = incorrect or far-fetched word use."},
    {q:"'Exegesis' means:",opts:["A) personal opinion","B) critical explanation or interpretation of a text","C) revision of history","D) philosophical refutation"],ans:"B) critical explanation or interpretation of a text",exp:"Exegesis = scholarly interpretation."},
    {q:"'Pleroma' means:",opts:["A) emptiness","B) darkness","C) fullness or totality of divine powers","D) suffering"],ans:"C) fullness or totality of divine powers",exp:"Pleroma = fullness — opposite of kenosis."},
    {q:"'Keneme' in linguistics means:",opts:["A) the smallest meaningful unit","B) a minimal distinctive unit without meaning","C) a sentence structure","D) a pragmatic function"],ans:"B) a minimal distinctive unit without meaning",exp:"Keneme = minimal unit without inherent meaning."}
  ],
  listening: [
    {ctx:"Philosopher: Wittgenstein's private language argument contends that a language intelligible only to its creator is impossible, undermining Cartesian notions of inner mental states.",q:"What does it undermine?",opts:["A) public language","B) mathematical logic","C) Cartesian inner mental states","D) empirical science"],ans:"C) Cartesian inner mental states",exp:"'undermining Cartesian notions of inner mental states'.",audio:"Philosopher: Wittgenstein's private language argument holds a language only its creator understands is logically impossible, undermining Cartesian inner mental states."},
    {ctx:"Theorist: Derrida's différance — combining 'to differ' and 'to defer' — holds that meaning is never fully present but always deferred through an endless chain of signifiers.",q:"What does différance hold?",opts:["A) meaning is immediately present","B) meaning is always deferred","C) meaning is determined by grammar","D) meaning is culturally fixed"],ans:"B) meaning is always deferred",exp:"'meaning is never fully present but always deferred'.",audio:"Theorist: Derrida's différance combines to differ and to defer — meaning is never fully present but always deferred through an endless chain of signifiers."},
    {ctx:"Philosopher: The problem of other minds: we cannot access others' inner states directly, yet solipsism seems equally unacceptable.",q:"What makes it difficult?",opts:["A) inner states are too complex","B) cannot directly access others' subjective experience","C) language is insufficient","D) science has not advanced enough"],ans:"B) cannot directly access others' subjective experience",exp:"'cannot access their inner states directly'.",audio:"Philosopher: The problem of other minds asks how we know others have inner experience — we cannot access their inner states directly, yet solipsism is unacceptable."},
    {ctx:"Neurophilosopher: Chalmers's hard problem asks why physical processes give rise to subjective experience — why there is 'something it is like' to see red rather than mere neural processing.",q:"What is the hard problem?",opts:["A) memory formation","B) why physical processes give rise to subjective experience","C) how the brain processes vision","D) language and thought"],ans:"B) why physical processes give rise to subjective experience",exp:"'why physical processes give rise to subjective experience'.",audio:"Neurophilosopher: Chalmers's hard problem asks why physical processes give rise to subjective experience — why is there something it is like to see red rather than mere neural processing?"},
    {ctx:"Ethicist: Levinas argues ethics precedes ontology — the face of the other commands responsibility before any theoretical framework, making encounter with otherness the foundation of morality.",q:"What precedes ontology?",opts:["A) epistemology","B) metaphysics","C) ethics grounded in encounter with the other","D) political philosophy"],ans:"C) ethics grounded in encounter with the other",exp:"'ethics precedes ontology — the face commands responsibility'.",audio:"Ethicist: Levinas argues ethics precedes ontology — the face of the other commands responsibility before any theoretical framework."},
    {ctx:"Mathematician: Cantor's diagonal argument proves there are more real numbers than natural numbers — infinities come in different sizes — by constructing a number differing from every list entry.",q:"What does it prove?",opts:["A) all infinities are equal","B) reals are fewer than naturals","C) infinities come in different sizes","D) there is a largest infinity"],ans:"C) infinities come in different sizes",exp:"'infinities come in different sizes'.",audio:"Mathematician: Cantor's diagonal argument proves there are more real numbers than natural numbers — infinities come in different sizes."},
    {ctx:"Theorist: Benjamin's dialectical image: a moment when past and present flash together — a constellation of then and now that illuminates both.",q:"What is a dialectical image?",opts:["A) a historical photograph","B) a moment when past and present illuminate each other","C) a political symbol","D) historical evidence"],ans:"B) a moment when past and present illuminate each other",exp:"'past and present flash together...illuminates both'.",audio:"Theorist: Benjamin's dialectical image is a moment when past and present flash together — illuminating both, making the past suddenly legible."},
    {ctx:"Phenomenologist: Heidegger's ready-to-hand: equipment we use without noticing. Present-at-hand: objects we observe when they break down.",q:"What reveals the 'present-at-hand' mode?",opts:["A) everyday use","B) aesthetic appreciation","C) breakdown of equipment","D) scientific analysis"],ans:"C) breakdown of equipment",exp:"'objects we observe when they break down'.",audio:"Phenomenologist: Heidegger distinguishes ready-to-hand equipment used unthinkingly from present-at-hand objects that appear when equipment breaks down."},
    {ctx:"Philosopher: Quine's indeterminacy of translation: multiple incompatible translation manuals can be consistent with all possible evidence.",q:"What does it claim?",opts:["A) translation is always possible","B) some languages can't be translated","C) multiple incompatible translations fit all evidence","D) meaning is determined by use"],ans:"C) multiple incompatible translations fit all evidence",exp:"'multiple incompatible translation manuals consistent with all evidence'.",audio:"Philosopher: Quine's indeterminacy of translation holds there is no fact about correct translation — multiple incompatible manuals fit all possible evidence."},
    {ctx:"Psychoanalyst: In Lacan's schema, the Real resists symbolization — the traumatic kernel language cannot capture, returning as symptom and anxiety.",q:"What is the Real?",opts:["A) objective reality","B) the imaginary order","C) that which resists symbolization","D) conscious experience"],ans:"C) that which resists symbolization",exp:"'resists symbolization — traumatic kernel language cannot capture'.",audio:"Psychoanalyst: In Lacan's schema, the Real resists symbolization — the traumatic kernel that language cannot capture, returning as symptom and anxiety."},
    {ctx:"Philosopher: Moore's paradox: 'It is raining but I don't believe it' — consistent as a description of another person but pragmatically incoherent as first-person assertion.",q:"Why is it peculiar?",opts:["A) logically contradictory","B) grammatically incorrect","C) consistent third-person but incoherent first-person","D) involves uncertain weather data"],ans:"C) consistent third-person but incoherent first-person",exp:"'consistent as description of another but incoherent as first-person assertion'.",audio:"Philosopher: Moore's paradox — it is raining but I don't believe it — is consistent in third person but pragmatically incoherent as a first-person assertion."},
    {ctx:"Sociologist: Bourdieu's symbolic violence: imposing systems of meaning serving ruling class interests, experienced by the dominated as legitimate — misrecognition makes domination invisible.",q:"What makes it effective?",opts:["A) relies on physical force","B) recognized and resisted by victims","C) the dominated experience it as legitimate","D) operates through legal systems"],ans:"C) the dominated experience it as legitimate",exp:"'experienced by the dominated as legitimate'.",audio:"Sociologist: Bourdieu's symbolic violence imposes meaning serving the ruling class but experienced as legitimate by the dominated — misrecognition makes domination invisible."},
    {ctx:"Political philosopher: Schmitt: the sovereign is he who decides on the state of exception — when law is suspended and bare power becomes visible.",q:"What does the sovereign decide?",opts:["A) economic power","B) the state of exception — when law is suspended","C) constitutional interpretation","D) taxation limits"],ans:"B) the state of exception — when law is suspended",exp:"'the sovereign decides the state of exception'.",audio:"Political philosopher: Schmitt's sovereign is he who decides the state of exception — when law is suspended and bare power becomes visible."},
    {ctx:"Theorist: Agamben's homo sacer can be killed but not sacrificed — excluded from both human and divine law, reduced to bare life.",q:"What characterizes homo sacer?",opts:["A) divine protection","B) full legal rights","C) exclusion from both human and divine law","D) religious authority"],ans:"C) exclusion from both human and divine law",exp:"'excluded from both human and divine law, reduced to bare life'.",audio:"Theorist: Agamben's homo sacer can be killed but not sacrificed — excluded from human and divine law, reduced to bare life."},
    {ctx:"Philosopher: Parfit holds what matters in survival is not identity per se but psychological continuity — and identity can be indeterminate in cases of fission.",q:"What does Parfit argue?",opts:["A) identity is what matters","B) identity is immaterial","C) psychological continuity matters, not identity per se","D) physical continuity defines identity"],ans:"C) psychological continuity matters, not identity per se",exp:"'what we care about is psychological continuity, not identity per se'.",audio:"Philosopher: Parfit holds what matters in survival is psychological continuity, not identity per se — identity can be indeterminate in fission cases."},
    {ctx:"Literary theorist: In Kristeva's theory, poetry disrupts the symbolic by allowing semiotic drives to erupt into language.",q:"How does poetry function?",opts:["A) reinforces symbolic order","B) excludes the semiotic","C) allows semiotic drives to disrupt symbolic language","D) creates new grammar"],ans:"C) allows semiotic drives to disrupt symbolic language",exp:"'Poetry disrupts the symbolic by allowing the semiotic to erupt'.",audio:"Literary theorist: In Kristeva's theory, poetry disrupts the symbolic order by allowing semiotic drives to erupt into language."},
    {ctx:"Philosopher: Strawson distinguishes reactive attitudes — holding people responsible — from objective attitudes — treating them as objects to be managed or cured.",q:"What characterizes the objective stance?",opts:["A) holding morally responsible","B) emotional engagement","C) treating people as objects to be managed","D) fully respecting autonomy"],ans:"C) treating people as objects to be managed",exp:"'treats them as objects to be managed or cured'.",audio:"Philosopher: Strawson distinguishes reactive attitudes holding people responsible from objective attitudes treating them as objects to be managed."},
    {ctx:"Theorist: Deleuze and Guattari's rhizome spreads laterally without hierarchy or fixed center — contrasting with the tree's root-to-branch structure.",q:"How does the rhizome differ?",opts:["A) more organized","B) spreads laterally without hierarchy","C) has a fixed center","D) moves in one direction"],ans:"B) spreads laterally without hierarchy",exp:"'spreads laterally, without center or fixed beginning'.",audio:"Theorist: Deleuze and Guattari contrast the hierarchical tree with the rhizome, which spreads laterally without center or fixed beginning."},
    {ctx:"Philosopher: MacIntyre argues moral philosophy cannot be detached from traditions and communities — the Enlightenment project of tradition-independent morality failed.",q:"What does he argue?",opts:["A) purely rational morality","B) cultural diversity required","C) morality cannot be detached from tradition","D) focus on individual rights"],ans:"C) morality cannot be detached from tradition",exp:"'cannot be detached from traditions and communities'.",audio:"Philosopher: MacIntyre argues moral philosophy cannot be detached from traditions and communities — the Enlightenment project of tradition-independent morality failed."},
    {ctx:"Physicist: The measurement problem asks what constitutes a 'measurement' collapsing the wave function. Copenhagen, many-worlds, and pilot wave interpretations offer different answers with identical empirical predictions.",q:"What makes adjudication difficult?",opts:["A) different predictions","B) too mathematically complex","C) identical empirical predictions","D) insufficient data"],ans:"C) identical empirical predictions",exp:"'radically different answers with identical empirical predictions'.",audio:"Physicist: The measurement problem has different interpretations — Copenhagen, many-worlds, pilot wave — with radically different answers but identical empirical predictions."},
    {ctx:"Philosopher: Sellars critiques the myth of the given — the empiricist assumption that foundational sense data justify beliefs without themselves requiring justification.",q:"What is the 'myth of the given'?",opts:["A) innate concepts","B) infinite justification regress","C) foundational unconceptualized sense data","D) direct perception"],ans:"C) foundational unconceptualized sense data",exp:"'foundational sense data...without themselves requiring justification'.",audio:"Philosopher: Sellars critiques the myth of the given — the empiricist assumption that sense data justify beliefs without themselves needing justification."},
    {ctx:"Theorist: Baudrillard's simulacra: in hyperreality the simulation precedes the real it was supposed to represent — the distinction between real and simulation collapses.",q:"What happens in hyperreality?",opts:["A) reality becomes more vivid","B) signs accurately represent reality","C) simulation precedes and replaces the real","D) media becomes transparent"],ans:"C) simulation precedes and replaces the real",exp:"'simulation precedes the real...distinction collapses'.",audio:"Theorist: Baudrillard's hyperreality: the simulation precedes the real it was supposed to represent, and the distinction between real and simulation collapses."},
    {ctx:"Legal philosopher: Hart's rule of recognition identifies which norms count as valid law — grounding legal validity without itself being grounded in another legal rule.",q:"What makes it distinctive?",opts:["A) most frequently applied","B) grounded in a higher rule","C) grounds validity without itself requiring legal grounding","D) created by parliament"],ans:"C) grounds validity without itself requiring legal grounding",exp:"'grounds legal validity without being itself grounded'.",audio:"Legal philosopher: Hart's rule of recognition identifies which norms are valid law, grounding validity without itself being grounded in another legal rule."},
    {ctx:"Philosopher: Nagel's bat argument: a bat's echolocation creates an experience we cannot imagine, demonstrating objective science cannot capture the subjective 'what it is like.'",q:"What does it demonstrate?",opts:["A) bats are conscious","B) science explains all experience","C) objective science cannot capture subjective experience","D) imagination is limited by experience"],ans:"C) objective science cannot capture subjective experience",exp:"'objective science cannot capture the subjective first-person what it is like'.",audio:"Philosopher: Nagel's bat argument demonstrates objective science cannot capture subjective experience — a bat's echolocation creates an experience we cannot imagine."},
    {ctx:"Philosopher: In Hegel's master-slave dialectic, the master achieves only empty recognition; the slave, through transformative labor, achieves genuine self-consciousness.",q:"How does the slave achieve self-consciousness?",opts:["A) through obedience","B) by overthrowing the master","C) through transformative labor","D) by seeking recognition"],ans:"C) through transformative labor",exp:"'the slave, through labor, achieves genuine self-consciousness'.",audio:"Philosopher: In Hegel's master-slave dialectic, the master achieves only empty recognition while the slave achieves genuine self-consciousness through transformative labor."},
    {ctx:"Theorist: Fanon argues colonialism is also psychological — producing a colonized mind in which the colonized internalize the values and self-image of the colonizer.",q:"What does colonialism produce psychologically?",opts:["A) cultural pride","B) economic liberation","C) internalization of colonizer values","D) political resistance"],ans:"C) internalization of colonizer values",exp:"'the colonized internalize the values and self-image of the colonizer'.",audio:"Theorist: Fanon argues colonialism is psychological — producing a colonized mind in which the colonized internalize the colonizer's values and self-image."},
    {ctx:"Philosopher: Merleau-Ponty argues perception is structured by embodied engagement — the body is the subject of experience, not its instrument.",q:"What is his view of the body?",opts:["A) merely instrumental","B) the subject, not instrument, of experience","C) perception is purely mental","D) the body limits experience"],ans:"B) the subject, not instrument, of experience",exp:"'the body is the subject of experience, not its instrument'.",audio:"Philosopher: Merleau-Ponty argues the body is the subject of experience, not its instrument — perception is structured by embodied engagement."},
    {ctx:"Mathematician: Non-Euclidean geometries showed Euclid's parallel postulate was not a necessary truth but a contingent assumption — consistent geometries can be built on its negation.",q:"What did they demonstrate?",opts:["A) self-evidently true","B) necessary logical truth","C) a contingent assumption, not a necessity","D) cannot be negated"],ans:"C) a contingent assumption, not a necessity",exp:"'not a necessary truth but a contingent assumption'.",audio:"Mathematician: Non-Euclidean geometries showed Euclid's parallel postulate was a contingent assumption, not a necessity — consistent geometries can be built on its negation."},
    {ctx:"Philosopher: Putnam's twin earth shows meanings ain't in the head — identical beings in different environments mean different things by the same word.",q:"What does it show?",opts:["A) mental content is entirely internal","B) language is culturally relative","C) meaning is partly determined by external environment","D) two people cannot share a language"],ans:"C) meaning is partly determined by external environment",exp:"'mental content is partly determined by external factors'.",audio:"Philosopher: Putnam's twin earth shows meanings ain't in the head — identical beings in different environments mean different things, so content is partly externally determined."},
    {ctx:"Philosopher: Russell's paradox: the set of all sets that don't contain themselves — does it contain itself? If yes, it doesn't; if no, it does — exposing a contradiction in naive set theory.",q:"What does it expose?",opts:["A) a mathematical error","B) a contradiction in naive set theory","C) a logic notation problem","D) a flaw in arithmetic"],ans:"B) a contradiction in naive set theory",exp:"'contradiction at the heart of naive set theory'.",audio:"Philosopher: Russell's paradox asks whether the set of all sets that don't contain themselves contains itself — exposing a contradiction in naive set theory."}

  reading: [
    {ctx:"Wittgenstein's therapeutic philosophy: philosophical problems are not deep puzzles but symptoms of conceptual confusion — the task is to dissolve them by returning words to ordinary use.",q:"What is philosophy's task?",opts:["A) building systematic theories","B) discovering new truths","C) dissolving conceptual confusions","D) formalizing language"],ans:"C) dissolving conceptual confusions",exp:"'not to solve but to dissolve them by returning words to their ordinary use'."},
    {ctx:"Hauntology (Derrida): the present is haunted by specters — futures promised but never arrived, pasts that refuse to die — disrupting linear temporality.",q:"What disrupts linear temporality?",opts:["A) rapid technological change","B) unrealized futures and persisting pasts","C) political revolution","D) generational conflict"],ans:"B) unrealized futures and persisting pasts",exp:"'futures that were promised but never arrived, and pasts that refuse to die'."},
    {ctx:"Underdetermination of theory by evidence: multiple incompatible theories are always equally consistent with any evidence. Values — simplicity, coherence — must supplement empirical criteria.",q:"What must supplement empirical criteria?",opts:["A) authority","B) tradition","C) epistemic values like simplicity and coherence","D) mathematical proof"],ans:"C) epistemic values like simplicity and coherence",exp:"'Values — simplicity, coherence — must supplement empirical criteria'."},
    {ctx:"Butler's performativity: gender is constituted through repeated performances, not an expression of pre-existing identity. Subversion is possible through parodic performance exposing its constructed nature.",q:"How can gender norms be subverted?",opts:["A) denial of gender","B) medical intervention","C) legal reform","D) parodic performance exposing its constructed nature"],ans:"D) parodic performance exposing its constructed nature",exp:"'parodic performance that exposes gender's constructed nature'."},
    {ctx:"Functionalism: mental states are defined by functional roles, not physical substrate. This allows multiple realizability: the same mental state can be implemented in different physical systems.",q:"What is the key implication?",opts:["A) all minds are identical","B) same mental state can exist in different physical systems","C) human minds are unique","D) computers cannot think"],ans:"B) same mental state can exist in different physical systems",exp:"'same mental state can be implemented in different physical systems'."},
    {ctx:"Koselleck: the space of experience (accumulated past) and horizon of expectation (anticipated future) define historical experience. Modernity is characterized by a widening gap between them.",q:"What characterizes modernity?",opts:["A) stability","B) merging of past and future","C) a widening gap between experience and expectation","D) declining interest in history"],ans:"C) a widening gap between experience and expectation",exp:"'ever-widening gap between them'."},
    {ctx:"Negative dialectics (Adorno): refuses Hegelian synthesis — concepts never fully capture objects, non-identity is irreducible, the aspiration to totality is a form of violence against particularity.",q:"What does it refuse?",opts:["A) historical thinking","B) logical analysis","C) Hegelian synthesis and totalizing thought","D) empirical investigation"],ans:"C) Hegelian synthesis and totalizing thought",exp:"'refuses the Hegelian synthesis...totality is violence'."},
    {ctx:"Rawls's public reason: in democratic debates on fundamental questions, citizens should appeal only to reasons all can accept. Religious and comprehensive doctrines must be translated into public terms.",q:"What does it exclude?",opts:["A) scientific evidence","B) historical arguments","C) arguments based solely on religious doctrines","D) appeals to majority"],ans:"C) arguments based solely on religious doctrines",exp:"'Religious and comprehensive doctrines must be translated'."},
    {ctx:"Hume's problem of induction: no finite observations logically justify a universal claim. The inference that the sun will rise depends on an assumption of nature's uniformity — unjustifiable by experience.",q:"Why is the inference problematic?",opts:["A) too few observations","B) depends on unjustifiable assumption of uniform nature","C) the sun is not regular","D) deduction is insufficient"],ans:"B) depends on unjustifiable assumption of uniform nature",exp:"'depends on an assumption of uniformity unjustifiable by experience'."},
    {ctx:"Simondon's individuation: rather than starting from formed individuals, it begins with a pre-individual field from which individuals emerge through resolution — individuals result from, not precede, individuation.",q:"What does it challenge?",opts:["A) process philosophy","B) the primacy of individuals in substance ontology","C) evolutionary biology","D) social constructivism"],ans:"B) the primacy of individuals in substance ontology",exp:"'individuals are not prior to but the result of individuating processes'."},
    {ctx:"Internalism: meaning entirely determined by the speaker's mental states. Externalism: meaning partly constituted by the world or social context. The debate affects accounts of communication and mind.",q:"How do they differ?",opts:["A) one concerns grammar, one semantics","B) one locates meaning in mind, one in world or social context","C) one for written, one for speech","D) they differ only in scope"],ans:"B) one locates meaning in mind, one in world or social context",exp:"'mental states' vs. 'external world or social context'."},
    {ctx:"Reification (Frankfurt School/Lukács): social relations and human capacities appear as objective, natural things — obscuring their historical and social construction.",q:"What does it obscure?",opts:["A) market prices","B) individual psychology","C) historical and social construction of relations","D) physical processes"],ans:"C) historical and social construction of relations",exp:"'obscuring their historical and social construction'."},
    {ctx:"Augustine's theodicy: evil is not a substance but a privation of good — a lack or corruption of being. God created only good; evil is a turning away from the divine.",q:"What is evil?",opts:["A) a substance God permitted","B) a rival divine force","C) a privation or absence of good","D) a necessary part of creation"],ans:"C) a privation or absence of good",exp:"'evil is not a substance but a privation of good'."},
    {ctx:"Speculative realism challenges the 'correlationist' assumption — shared by idealism and phenomenology — that reality can only be accessed in relation to human thought.",q:"What does it challenge?",opts:["A) scientific realism","B) the assumption reality requires human thought","C) mathematical formalism","D) empirical methodology"],ans:"B) the assumption reality requires human thought",exp:"'challenges the correlationist assumption'."},
    {ctx:"In poststructuralism, the subject is a position within discourse — constituted by language, ideology, and power relations rather than preceding them. Decentering the subject is central.",q:"How does poststructuralism view the subject?",opts:["A) as origin of meaning","B) as stable, autonomous","C) as a position constituted by discourse and power","D) as biologically determined"],ans:"C) as a position constituted by discourse and power",exp:"'a position within discourse — constituted by language, ideology, and power'."},
    {ctx:"Genealogy (Nietzsche, Foucault): traces the historical emergence of concepts to expose their contingent, often violent origins — showing that what seems natural is historically constructed.",q:"What does genealogy reveal?",opts:["A) rational foundations","B) universal applicability","C) contingent and often violent origins","D) scientific basis"],ans:"C) contingent and often violent origins",exp:"'expose their contingent, often violent origins'."},
    {ctx:"Modal realism (David Lewis): possible worlds are concrete, causally isolated realities as real as the actual world — allowing rigorous analysis of modality but considered ontologically extravagant.",q:"Why do critics object?",opts:["A) internally inconsistent","B) lacks logical rigor","C) ontologically extravagant in positing concrete worlds","D) cannot account for necessary truths"],ans:"C) ontologically extravagant in positing concrete worlds",exp:"'ontologically extravagant'."},
    {ctx:"Double bind (Bateson): contradictory injunctions at different levels make compliance with one violate the other — and the bind cannot be commented upon without violating the meta-level injunction.",q:"What makes it inescapable?",opts:["A) injunctions in different languages","B) the bind cannot be commented upon without violating meta-level injunction","C) both injunctions are false","D) only one can be followed"],ans:"B) the bind cannot be commented upon without violating meta-level injunction",exp:"'cannot be commented upon without violating the meta-level injunction'."},
    {ctx:"Agamben's state of exception: the exception is not suspension of the normal order but its hidden foundation — sovereign power is constituted by the ability to decide what falls outside law.",q:"What is the exception?",opts:["A) suspension of the normal order","B) rules always precede exceptions","C) the exception is the hidden foundation","D) exceptions are increasingly rare"],ans:"C) the exception is the hidden foundation",exp:"'not the suspension of the normal order but its hidden foundation'."},
    {ctx:"Philosophy of science: the context of discovery (how theories are created) vs. context of justification (how they are validated). Sociologists argue discovery and justification cannot be fully separated.",q:"What do sociologists argue?",opts:["A) justification is more important","B) discovery should replace justification","C) they cannot be fully separated","D) the distinction is useful"],ans:"C) they cannot be fully separated",exp:"'discovery and justification cannot be fully separated'."},
    {ctx:"Capability approach (Sen and Nussbaum): evaluates social arrangements by what people are actually able to do and be — capabilities like health, imagination, and practical reason.",q:"What does it evaluate?",opts:["A) GDP and income","B) welfare utility","C) what people are able to do and be","D) legal rights only"],ans:"C) what people are able to do and be",exp:"'what people are actually able to do and be'."},
    {ctx:"Jouissance (Lacan): enjoyment that goes beyond pleasure — excessive, often painful satisfaction associated with the death drive and the Real, not need satisfaction.",q:"How does jouissance differ from pleasure?",opts:["A) a milder form","B) excessive and often painful, associated with the drive","C) pleasure involves the Real","D) they are equivalent"],ans:"B) excessive and often painful, associated with the drive",exp:"'goes beyond pleasure — excessive, often painful'."},
    {ctx:"SCOT (social construction of technology): technology is shaped by social groups that struggle over meaning and design until closure is reached.",q:"When is closure reached?",opts:["A) when patented","B) when groups agree on the artifact's meaning","C) when commercially successful","D) when government approves"],ans:"B) when groups agree on the artifact's meaning",exp:"'struggle over meaning and design until closure is reached'."},
    {ctx:"Kantian deontology: morality depends on conforming to a rule or duty, not consequences. The categorical imperative — act only on maxims that could be universalized — provides the standard.",q:"What determines morality?",opts:["A) consequences","B) social approval","C) conformity to universal duty regardless of outcome","D) expert consensus"],ans:"C) conformity to universal duty regardless of outcome",exp:"'depends on whether it conforms to a rule or duty, not consequences'."},
    {ctx:"Hysteresis (Bourdieu): a mismatch between a habitus formed in one context and a field that has changed — producing an agent 'out of time,' whose dispositions are no longer adapted.",q:"What is hysteresis?",opts:["A) rapid social adaptation","B) a mismatch between habitus and changed conditions","C) formation of habitus in childhood","D) resistance to change"],ans:"B) a mismatch between habitus and changed conditions",exp:"'mismatch between habitus formed in one set of conditions and a changed field'."},
    {ctx:"Popper's paradox of tolerance: unlimited tolerance must lead to the disappearance of tolerance — if tolerance extends to the intolerant, the tolerant will be destroyed.",q:"What does it conclude?",opts:["A) no limits on tolerance","B) all intolerant views must be banned","C) unlimited tolerance destroys tolerance","D) democracy is intolerant"],ans:"C) unlimited tolerance destroys tolerance",exp:"'unlimited tolerance must lead to the disappearance of tolerance'."},
    {ctx:"Paraconsistency allows a system to contain contradictions without exploding into triviality — unlike classical logic where a contradiction implies everything.",q:"What does it allow?",opts:["A) contradictions imply all statements","B) contradictions without the system becoming trivial","C) logic without contradiction","D) multiple true conclusions from one premise"],ans:"B) contradictions without the system becoming trivial",exp:"'contain contradictions without exploding into triviality'."},
    {ctx:"Arendt's natality: each birth introduces irreducible novelty — the capacity to begin something genuinely new, which is the ontological ground of political action.",q:"What does natality ground?",opts:["A) biological reproduction","B) the capacity for political action and new beginnings","C) historical continuity","D) preservation of tradition"],ans:"B) the capacity for political action and new beginnings",exp:"'ontological ground of political action...capacity to begin'."},
