  reading: [
    {ctx:"Wetlands are areas of land covered by water for all or part of the year. They include swamps, marshes, and bogs. Wetlands provide important benefits: they filter water, prevent flooding, and support diverse wildlife. Despite this, many wetlands have been drained for agriculture or urban development.",q:"What is one reason wetlands have been destroyed?",opts:["A) pollution","B) climate change","C) agriculture and urban development","D) tourism"],ans:"C) agriculture and urban development",exp:"'drained for agriculture or urban development'."},
    {ctx:"Sleep plays a vital role in physical and mental health. During sleep, the body repairs tissues, strengthens the immune system, and consolidates memories. Adults typically need seven to nine hours per night. Chronic sleep deprivation has been linked to obesity, heart disease, and depression.",q:"What does sleep help consolidate?",opts:["A) muscles","B) memories","C) hormones","D) immunity"],ans:"B) memories",exp:"'consolidates memories'."},
    {ctx:"The Silk Road was an ancient network of trade routes connecting China to the Mediterranean. Merchants traded silk, spices, and precious metals. The routes were active from around 130 BCE to 1453 CE. Along with goods, ideas, religions, and diseases were also exchanged.",q:"What else was exchanged along the Silk Road besides goods?",opts:["A) soldiers and armies","B) only silk","C) ideas, religions, and diseases","D) artwork only"],ans:"C) ideas, religions, and diseases",exp:"'Along with goods, ideas, religions, and diseases were also exchanged'."},
    {ctx:"Organic farming avoids the use of synthetic fertilisers and pesticides. Instead, farmers use natural methods such as crop rotation and composting. Organic products are often more expensive but are perceived as healthier by many consumers. However, organic yields are typically lower than conventional farming.",q:"Why are organic products more expensive?",opts:["A) they taste better","B) yields are typically lower","C) they require more packaging","D) they are imported"],ans:"B) yields are typically lower",exp:"'organic yields are typically lower'."},
    {ctx:"Many cities are investing in bicycle infrastructure to reduce traffic congestion and carbon emissions. Dedicated cycling lanes, bike-sharing schemes, and secure parking facilities encourage more residents to cycle. Copenhagen and Amsterdam are often cited as models for cycling-friendly urban planning.",q:"What is the main reason cities are investing in cycling?",opts:["A) to promote tourism","B) to improve public health","C) to reduce congestion and emissions","D) to save money on roads"],ans:"C) to reduce congestion and emissions",exp:"'reduce traffic congestion and carbon emissions'."},
    {ctx:"The greenhouse effect is a natural process that warms the Earth's surface. When the Sun's energy reaches Earth, some is reflected back to space and some is absorbed. Greenhouse gases in the atmosphere trap some of this heat. Human activities have increased the concentration of these gases, intensifying the effect.",q:"What have human activities done to the greenhouse effect?",opts:["A) reduced it","B) stopped it","C) intensified it","D) reversed it"],ans:"C) intensified it",exp:"'Human activities have increased...intensifying the effect'."},
    {ctx:"Volunteering abroad can provide valuable experience and personal growth. However, critics argue that short-term volunteers may do more harm than good if they lack relevant skills. Well-designed programmes match volunteers' skills to genuine community needs and ensure long-term impact.",q:"What is a concern about short-term volunteering?",opts:["A) it costs too much","B) unskilled volunteers may cause harm","C) it is not legal","D) communities dislike volunteers"],ans:"B) unskilled volunteers may cause harm",exp:"'short-term volunteers may do more harm than good if they lack relevant skills'."},
    {ctx:"Noise pollution is a growing problem in urban areas. Prolonged exposure to loud noise can cause hearing loss, sleep disturbance, and cardiovascular problems. Cities are implementing measures such as sound barriers, noise ordinances, and quieter road surfaces to address the issue.",q:"What health problem is NOT mentioned?",opts:["A) hearing loss","B) sleep disturbance","C) vision problems","D) cardiovascular problems"],ans:"C) vision problems",exp:"Vision problems are not mentioned."},
    {ctx:"Desertification is the process by which fertile land becomes desert. It is caused by drought, deforestation, and poor farming practices. Around 12 million hectares of productive land are lost each year. Planting trees, sustainable farming, and water management can help reverse the process.",q:"What is one cause of desertification?",opts:["A) flooding","B) deforestation","C) pollution","D) urbanisation"],ans:"B) deforestation",exp:"'caused by drought, deforestation, and poor farming practices'."},
    {ctx:"E-learning has become increasingly popular, offering flexibility and access to education for people who cannot attend traditional classes. However, studies suggest that students in online programmes often show lower completion rates than those in face-to-face settings. Social isolation and lack of direct support are cited as contributing factors.",q:"What is a disadvantage of e-learning mentioned?",opts:["A) high cost","B) limited course options","C) lower completion rates","D) poor internet access"],ans:"C) lower completion rates",exp:"'lower completion rates than...face-to-face settings'."}
  ]
},

"5.0": {
  _meta: { band:"5.0–5.5", desc:"Modest User", toeic_equiv:"~600" },
  listening: [
    {ctx:"Tutor: For your research proposal, you'll need to identify a clear research question, justify your methodology, and provide a literature review of at least twelve sources. The proposal should be no longer than 2,500 words.",q:"What is the maximum length of the proposal?",opts:["A) 1,500 words","B) 2,000 words","C) 2,500 words","D) 3,000 words"],ans:"C) 2,500 words",exp:"'no longer than 2,500 words'.",audio:"Research proposal: clear question, methodology, 12-source literature review, max 2,500 words."},
    {ctx:"Interviewer: Why did you choose this university? Student: I was attracted by the research facilities and the faculty's publication record. Also, the proximity to the city means good industry connections. Interviewer: What are your career goals? Student: I hope to work in environmental policy after graduating.",q:"What does the student hope to do after graduating?",opts:["A) become a researcher","B) work in environmental policy","C) start a business","D) study further"],ans:"B) work in environmental policy",exp:"'work in environmental policy after graduating'.",audio:"Student: attracted by research facilities and city proximity. Career goal: environmental policy."},
    {ctx:"Lecturer: The Industrial Revolution transformed not only manufacturing but also social structures. The shift from agrarian to urban life created new class divisions and labour movements. Today we'll focus on three key outcomes: urbanisation, changing family structures, and the rise of the working class.",q:"How many key outcomes will be discussed?",opts:["A) 2","B) 3","C) 4","D) 5"],ans:"B) 3",exp:"'three key outcomes'.",audio:"Industrial Revolution: three key outcomes today — urbanisation, changing families, rise of working class."},
    {ctx:"Manager: We've had several complaints about the new booking system. The main issues are that the confirmation emails aren't sending automatically, and users are finding the calendar integration confusing. IT says the email issue will be fixed by tomorrow, but the calendar problem needs a more significant update.",q:"Which problem will take longer to fix?",opts:["A) confirmation emails","B) calendar integration","C) both equally","D) neither — both fixed tomorrow"],ans:"B) calendar integration",exp:"'calendar problem needs a more significant update'.",audio:"Two booking system issues: email fix by tomorrow; calendar integration needs a bigger update."},
    {ctx:"Radio presenter: A new study from the University of Bristol suggests that city residents who live near green spaces report significantly higher wellbeing scores than those without access to parks or gardens. The effect was strongest for people aged 65 and over.",q:"For which group was the benefit strongest?",opts:["A) children under 10","B) working-age adults","C) people aged 65 and over","D) all groups equally"],ans:"C) people aged 65 and over",exp:"'strongest for people aged 65 and over'.",audio:"Bristol study: green space access boosts wellbeing, effect strongest for people 65 and over."},
    {ctx:"Woman: I'm reviewing your housing application. You've listed your current rent as £950 a month. Is that correct? Man: Yes, but that includes bills. The rent itself is £800. Woman: I'll need to note that separately as utility costs.",q:"What is the rent without bills?",opts:["A) £750","B) £800","C) £850","D) £950"],ans:"B) £800",exp:"'rent itself is £800'.",audio:"Rent £800, plus bills brings it to £950. Need rent and utilities noted separately."},
    {ctx:"Scientist: Our fieldwork in the Amazon found that deforestation rates have slowed in protected areas but continue unchecked in buffer zones. In some buffer zones, we recorded canopy loss of up to 30% over five years. This is alarming given the biodiversity these areas support.",q:"What was found in buffer zones?",opts:["A) deforestation has stopped","B) canopy loss of up to 30%","C) reforestation is occurring","D) deforestation slowed significantly"],ans:"B) canopy loss of up to 30%",exp:"'canopy loss of up to 30% over five years'.",audio:"Protected areas: deforestation slowed. Buffer zones: up to 30% canopy loss over five years."},
    {ctx:"Advisor: For the investment portfolio, you have three options. Option one is low-risk government bonds yielding 2.5%. Option two is a balanced fund with projected returns of 5–7% but moderate volatility. Option three is emerging market equities with higher potential returns but significant risk.",q:"What return does the balanced fund project?",opts:["A) 2–3%","B) 3–5%","C) 5–7%","D) 8–10%"],ans:"C) 5–7%",exp:"'balanced fund with projected returns of 5–7%'.",audio:"Option 2: balanced fund, projected 5–7% returns, moderate volatility."},
    {ctx:"Lecturer: There are essentially three schools of thought on this. The first, structural functionalism, sees society as a system of interrelated parts. The second, conflict theory, views society through the lens of power and inequality. The third, symbolic interactionism, focuses on micro-level interactions and meaning.",q:"What does conflict theory focus on?",opts:["A) social systems","B) power and inequality","C) individual behaviour","D) cultural symbols"],ans:"B) power and inequality",exp:"'views society through the lens of power and inequality'.",audio:"Three sociological schools: functionalism, conflict theory (power/inequality), symbolic interactionism."},
    {ctx:"Man: The renovation will require residents to vacate for at least six weeks. We'll provide alternative accommodation at no cost. However, residents must remove all personal belongings before the work begins on April 3rd.",q:"When must residents remove their belongings?",opts:["A) after six weeks","B) when alternative accommodation is provided","C) before April 3rd","D) during the renovation"],ans:"C) before April 3rd",exp:"'must remove all personal belongings before...April 3rd'.",audio:"Renovation starts April 3rd. Remove all belongings before then. Alternative accommodation provided free."}
  ],
  reading: [
    {ctx:"The sharing economy, exemplified by platforms such as Airbnb and Uber, allows individuals to monetise underused assets. While proponents argue this model increases economic efficiency and consumer choice, critics highlight concerns about job security, the erosion of workers' rights, and the impact on local housing markets — particularly in cities where short-term rentals have reduced the availability of long-term housing.",q:"What is a concern raised about Airbnb-style platforms?",opts:["A) they increase housing costs for owners","B) they reduce long-term housing availability","C) they harm economic efficiency","D) they damage tourism"],ans:"B) they reduce long-term housing availability",exp:"'short-term rentals have reduced the availability of long-term housing'."},
    {ctx:"Cognitive load theory, developed by John Sweller in the 1980s, proposes that working memory has limited capacity. Effective instructional design should therefore minimise extraneous cognitive load — mental effort unrelated to learning — while optimising germane load, the effort dedicated to building schemas. Multimedia learning, which combines images with explanatory text, is one approach that aligns with these principles.",q:"What does cognitive load theory suggest about working memory?",opts:["A) it is unlimited","B) it can be trained to be larger","C) it has a limited capacity","D) it declines with age"],ans:"C) it has a limited capacity",exp:"'working memory has limited capacity'."},
    {ctx:"The Mediterranean diet — characterised by high consumption of vegetables, legumes, olive oil, fish, and moderate amounts of red wine — has been extensively studied for its health benefits. Research consistently associates this dietary pattern with reduced risk of cardiovascular disease, type 2 diabetes, and certain cancers. However, researchers caution that lifestyle factors such as physical activity and social eating habits may confound these associations.",q:"What caution do researchers add?",opts:["A) the diet is hard to follow","B) it only works in Mediterranean countries","C) lifestyle factors may affect the results","D) benefits appear only in elderly populations"],ans:"C) lifestyle factors may affect the results",exp:"'lifestyle factors...may confound these associations'."},
    {ctx:"Universal Basic Income (UBI) is a policy proposal in which all citizens receive a regular unconditional cash payment from the government, regardless of employment status. Supporters argue it would reduce poverty, simplify the welfare system, and provide security in an era of increasing automation. Opponents raise concerns about cost, potential reduction in work incentives, and inflationary effects.",q:"What is one argument against UBI?",opts:["A) it would increase inequality","B) it is too popular","C) it may reduce work incentives","D) it only benefits the wealthy"],ans:"C) it may reduce work incentives",exp:"'potential reduction in work incentives'."},
    {ctx:"Coral bleaching occurs when water temperatures rise, causing corals to expel the algae (zooxanthellae) that live in their tissues and provide them with nutrients. Without these algae, corals turn white and become vulnerable to disease and death. Mass bleaching events have increased in frequency and severity due to climate change.",q:"What do corals expel during bleaching?",opts:["A) toxins","B) water","C) zooxanthellae (algae)","D) calcium carbonate"],ans:"C) zooxanthellae (algae)",exp:"'corals to expel the algae (zooxanthellae)'."},
    {ctx:"The concept of food miles — the distance food travels from production to consumer — has become a popular shorthand for measuring the environmental impact of food. However, researchers argue that food miles are a poor proxy for carbon footprint: the mode of transport and production methods often have a far greater environmental impact than distance alone.",q:"What do researchers argue about food miles?",opts:["A) they are the best measure of food sustainability","B) they underestimate the true distance","C) transport mode and production matter more","D) they should be labelled on all products"],ans:"C) transport mode and production matter more",exp:"'mode of transport and production methods often have a far greater impact'."},
    {ctx:"Genetic diversity within a species is critical for its long-term survival. Populations with low genetic diversity are more vulnerable to diseases, environmental changes, and genetic disorders. Conservation programmes increasingly use genetic analysis to identify isolated populations and facilitate managed breeding programmes.",q:"Why is genetic diversity important for species survival?",opts:["A) it improves the species' appearance","B) it reduces competition","C) it helps withstand diseases and changes","D) it increases population size quickly"],ans:"C) it helps withstand diseases and changes",exp:"'more vulnerable to diseases, environmental changes'."},
    {ctx:"Remote sensing — the use of satellites and aircraft to collect data about the Earth's surface — has transformed environmental monitoring. It allows scientists to track deforestation, glacial retreat, urban expansion, and ocean temperature changes over large areas in near real-time. Advances in artificial intelligence are improving the speed and accuracy of data interpretation.",q:"How has AI affected remote sensing?",opts:["A) it has made satellites cheaper","B) it improved data interpretation speed and accuracy","C) it replaced satellite monitoring","D) it increased satellite coverage"],ans:"B) it improved data interpretation speed and accuracy",exp:"'Advances in AI are improving the speed and accuracy of data interpretation'."},
    {ctx:"The Flynn Effect refers to the documented rise in average IQ scores across populations over the twentieth century. Proposed explanations include improved nutrition, better schooling, greater familiarity with abstract thinking, and reduced exposure to environmental toxins. However, recent data suggests the effect may be levelling off or even reversing in some developed countries.",q:"What does recent data suggest about the Flynn Effect?",opts:["A) it is accelerating","B) IQ scores are rising faster","C) it may be slowing or reversing","D) it only affects developing countries"],ans:"C) it may be slowing or reversing",exp:"'effect may be levelling off or even reversing'."},
    {ctx:"Microfinance — the provision of small loans and financial services to low-income individuals — was championed in the 1980s as a tool for poverty reduction. While early results were encouraging, systematic reviews have found that the impact on long-term income is modest and mixed. Critics argue that for-profit microfinance institutions may exploit vulnerable borrowers through high interest rates.",q:"What concern do critics raise about for-profit microfinance?",opts:["A) loans are too small to be useful","B) high interest rates may exploit borrowers","C) governments oppose microfinance","D) it encourages dependency"],ans:"B) high interest rates may exploit borrowers",exp:"'exploit vulnerable borrowers through high interest rates'."}
  ]
},

"6.0": {
  _meta: { band:"6.0–6.5", desc:"Competent User", toeic_equiv:"~750" },
  listening: [
    {ctx:"Professor: The concept of path dependency explains why institutions and technologies often persist long after more efficient alternatives exist. The QWERTY keyboard layout is a classic example. Once a standard becomes sufficiently embedded — through network effects and sunk costs — switching becomes prohibitively expensive even when the standard itself is suboptimal.",q:"What makes it costly to abandon an established standard?",opts:["A) legal restrictions","B) political opposition","C) network effects and sunk costs","D) lack of alternatives"],ans:"C) network effects and sunk costs",exp:"'network effects and sunk costs'.",audio:"Path dependency: once a standard embeds through network effects and sunk costs, switching becomes prohibitively expensive."},
    {ctx:"Economist: The distinction between nominal and real wages is crucial. Nominal wages are the actual monetary amounts paid, whereas real wages adjust for inflation and reflect purchasing power. During the 1970s stagflation, nominal wages rose but real wages fell as inflation outpaced wage growth.",q:"What happened to real wages in the 1970s?",opts:["A) they rose with nominal wages","B) they stayed the same","C) they fell as inflation outpaced wage growth","D) they were not measured"],ans:"C) they fell as inflation outpaced wage growth",exp:"'real wages fell as inflation outpaced wage growth'.",audio:"1970s stagflation: nominal wages rose but inflation outpaced them, so real wages fell."},
    {ctx:"Researcher: Our longitudinal cohort study followed 3,400 participants over 15 years. We found a statistically significant correlation between childhood exposure to green spaces and reduced rates of anxiety and depression in adulthood. Importantly, the association held after controlling for socioeconomic status, suggesting it is not simply a proxy for wealth.",q:"What makes the finding more credible?",opts:["A) large sample size only","B) it held after controlling for socioeconomic status","C) participants were volunteers","D) the study was peer-reviewed"],ans:"B) it held after controlling for socioeconomic status",exp:"'held after controlling for socioeconomic status'.",audio:"Green space correlation with reduced anxiety held after controlling for socioeconomic status — not simply a wealth proxy."},
    {ctx:"Presenter: Three structural barriers prevent women from reaching senior leadership. First, the double bind: women are penalised both for conforming to feminine norms (seen as unassertive) and for deviating from them (seen as aggressive). Second, homosocial reproduction — leaders tend to hire and promote those who resemble them. Third, the maternal wall — assumptions about mothers' commitment to work.",q:"What is 'homosocial reproduction'?",opts:["A) gender-based discrimination in law","B) leaders promoting those similar to themselves","C) maternity leave policies","D) informal networking exclusion"],ans:"B) leaders promoting those similar to themselves",exp:"'leaders tend to hire and promote those who resemble them'.",audio:"Three leadership barriers: double bind, homosocial reproduction (leaders hire those like them), and maternal wall."},
    {ctx:"Seminar leader: The problem with instrumental rationality — the dominant framework in neoclassical economics — is that it treats preferences as given and simply asks how to maximise their satisfaction. It has nothing to say about whether preferences themselves are worth having. Communicative rationality, by contrast, involves reasoning together about what ends are worth pursuing.",q:"What does communicative rationality involve?",opts:["A) maximising individual preferences","B) mathematical modelling of behaviour","C) reasoning together about worthwhile ends","D) government intervention in markets"],ans:"C) reasoning together about worthwhile ends",exp:"'reasoning together about what ends are worth pursuing'.",audio:"Communicative rationality: reasoning together about ends worth pursuing — vs instrumental rationality's preference maximisation."},
    {ctx:"Policy analyst: The carbon price is currently set at $45 per tonne. Economic modelling suggests that to drive the emission reductions required under the Paris Agreement, the price needs to reach $100 to $150 by 2030. Getting there politically is the challenge — industries facing high transition costs are lobbying hard against the increase.",q:"What is the main obstacle to raising the carbon price?",opts:["A) scientific uncertainty","B) lack of international agreement","C) political resistance from high-cost industries","D) the price is already sufficient"],ans:"C) political resistance from high-cost industries",exp:"'industries facing high transition costs are lobbying hard'.",audio:"Carbon price needs to reach $100-150 by 2030. Main obstacle: high-cost industries lobbying against increases."},
    {ctx:"Archaeologist: The Antikythera mechanism, recovered from a shipwreck near Greece, is a remarkable artefact. Dating to around 87 BCE, it's essentially an analogue computer designed to predict astronomical positions and eclipses. Its complexity wasn't matched by any known technology for over a thousand years.",q:"What was the Antikythera mechanism designed to do?",opts:["A) navigate ships","B) calculate trade routes","C) predict astronomical positions and eclipses","D) measure time for farming"],ans:"C) predict astronomical positions and eclipses",exp:"'designed to predict astronomical positions and eclipses'.",audio:"Antikythera mechanism, 87 BCE: analogue computer predicting astronomical positions and eclipses, unmatched for 1,000 years."},
    {ctx:"Manager: The post-merger integration is running behind schedule. The primary bottleneck is cultural alignment — the two companies have fundamentally different management philosophies. The acquired firm operates on flat hierarchies and autonomous teams, while our organisation is structured around vertical reporting lines.",q:"What is the main integration challenge?",opts:["A) technology incompatibility","B) differing management cultures","C) financial reporting discrepancies","D) staff redundancies"],ans:"B) differing management cultures",exp:"'fundamentally different management philosophies'.",audio:"Integration bottleneck: acquired firm has flat hierarchies and autonomous teams; we have vertical reporting — fundamental culture clash."},
    {ctx:"Neuroscientist: Synaptic plasticity — the ability of synapses to strengthen or weaken in response to activity — is widely considered the cellular basis of learning and memory. Long-term potentiation, in which repeated stimulation increases synaptic strength, provides a plausible mechanism for how memories are consolidated.",q:"What is long-term potentiation?",opts:["A) memory loss over time","B) decreased synaptic activity","C) strengthening of synapses through repeated stimulation","D) the formation of new neurons"],ans:"C) strengthening of synapses through repeated stimulation",exp:"'repeated stimulation increases synaptic strength'.",audio:"LTP: repeated stimulation strengthens synapses — plausible mechanism for memory consolidation."},
    {ctx:"Demographer: Urbanisation is projected to continue: by 2050, approximately 68% of the global population will live in cities, up from 55% today. This creates compounding challenges — housing, infrastructure, waste management, and social cohesion — particularly in cities in the Global South where urban growth is fastest.",q:"Where is urban growth projected to be fastest?",opts:["A) North America","B) Europe","C) Global South","D) East Asia"],ans:"C) Global South",exp:"'particularly in cities in the Global South where urban growth is fastest'.",audio:"By 2050, 68% urban. Growth fastest in Global South, creating compounding infrastructure and social challenges."}
  ],
  reading: [
    {ctx:"The precautionary principle holds that where an action raises threats to human health or the environment, precautionary measures should be taken even if some cause-and-effect relationships are not fully established scientifically. The principle shifts the burden of proof: rather than requiring evidence of harm before regulation, it requires evidence of safety before permission. Critics argue this approach can stifle innovation and imposes costs based on speculative risks.",q:"What do critics argue about the precautionary principle?",opts:["A) it is not strict enough","B) it may impede innovation based on speculative risks","C) it ignores scientific evidence","D) it only applies to environmental cases"],ans:"B) it may impede innovation based on speculative risks",exp:"'stifle innovation and imposes costs based on speculative risks'."},
    {ctx:"Transdisciplinarity differs from multidisciplinarity and interdisciplinarity in that it transcends disciplinary boundaries entirely, integrating non-academic knowledge and involving stakeholders outside academia in knowledge production. The aim is not merely to combine disciplines but to generate new frameworks that address problems — particularly wicked problems — that cannot be resolved within any single discipline.",q:"What distinguishes transdisciplinarity from interdisciplinarity?",opts:["A) it combines more disciplines","B) it transcends disciplinary boundaries and includes non-academic knowledge","C) it is used only in the natural sciences","D) it relies on quantitative methods"],ans:"B) it transcends disciplinary boundaries and includes non-academic knowledge",exp:"'transcends disciplinary boundaries entirely, integrating non-academic knowledge'."},
    {ctx:"The Kuznets curve hypothesis suggests that economic inequality first increases as countries develop and then decreases as they reach higher income levels, following an inverted-U pattern. While this pattern was observed in some early industrialising nations, subsequent research — notably Piketty's work on capital — has challenged its generalisability, suggesting that inequality has increased in many wealthy nations over recent decades.",q:"What does Piketty's work suggest about the Kuznets curve?",opts:["A) it confirms the original hypothesis","B) inequality peaks earlier than expected","C) it may not generalise to recent wealthy nations","D) developing nations show no inequality rise"],ans:"C) it may not generalise to recent wealthy nations",exp:"'inequality has increased in many wealthy nations — challenging its generalisability'."},
    {ctx:"The tragedy of antibiotic resistance is partly a classic commons problem. Individual patients and healthcare providers have incentives to use antibiotics even when marginally beneficial, because the cost — accelerating resistance — is borne collectively. Addressing this requires not merely technical solutions but governance frameworks that align individual incentives with collective welfare.",q:"Why is antibiotic resistance described as a commons problem?",opts:["A) antibiotics are expensive","B) individual benefit but collective cost drives overuse","C) governments control antibiotic supply","D) resistance benefits other patients"],ans:"B) individual benefit but collective cost drives overuse",exp:"'individual incentives...cost...borne collectively'."},
    {ctx:"Phenomenology, as developed by Husserl and later Merleau-Ponty, insists that perception is not a passive reception of data but an active, embodied engagement with the world. Merleau-Ponty's concept of the 'body schema' — an implicit, prereflective sense of one's body as a point of orientation — challenges Cartesian dualism by showing that mind and body cannot be cleanly separated in lived experience.",q:"What does the body schema concept challenge?",opts:["A) the importance of perception","B) Cartesian dualism","C) Husserl's original phenomenology","D) the role of language in thought"],ans:"B) Cartesian dualism",exp:"'challenges Cartesian dualism by showing mind and body cannot be separated'."},
    {ctx:"Algorithmic management — the use of automated systems to monitor, evaluate, and direct workers — is increasingly prevalent in logistics, retail, and platform work. Workers report increased surveillance, reduced autonomy, and difficulty contesting algorithmic decisions. Labour scholars argue that algorithmic management represents an intensification of Taylorist control dressed in digital clothing.",q:"What do labour scholars compare algorithmic management to?",opts:["A) traditional craft work","B) post-industrial flexibility","C) Taylorist control","D) professional autonomy"],ans:"C) Taylorist control",exp:"'intensification of Taylorist control dressed in digital clothing'."},
    {ctx:"The distinction between complicated and complex systems has significant implications for governance. Complicated systems — like aeroplanes — have many parts but are fundamentally predictable and can be engineered. Complex systems — like ecosystems or economies — exhibit emergent properties, non-linear dynamics, and sensitivity to initial conditions that make prediction and control inherently limited.",q:"What characterises complex systems?",opts:["A) they have fewer parts than complicated systems","B) they are more predictable","C) they have emergent properties and non-linear dynamics","D) they can be fully engineered"],ans:"C) they have emergent properties and non-linear dynamics",exp:"'emergent properties, non-linear dynamics, and sensitivity to initial conditions'."},
    {ctx:"Water stress — occurring when demand for water exceeds available supply — affects over two billion people globally. Agriculture accounts for roughly 70% of global freshwater withdrawals. Climate change is expected to exacerbate water stress in already arid regions while increasing flood risk in wetter ones — a phenomenon sometimes called the wet-gets-wetter, dry-gets-drier dynamic.",q:"What proportion of freshwater withdrawals does agriculture account for?",opts:["A) 40%","B) 50%","C) 60%","D) 70%"],ans:"D) 70%",exp:"'Agriculture accounts for roughly 70%'."},
    {ctx:"Digital colonialism refers to the concentration of data infrastructure, platform power, and standard-setting capacity in a small number of predominantly American and Chinese technology companies, creating new forms of dependency for smaller economies. Critics argue that data localisation policies and regional technology sovereignty initiatives are inadequate responses to structural asymmetries of this scale.",q:"What do critics argue about data localisation policies?",opts:["A) they are effective solutions","B) they are too expensive","C) they are inadequate given structural asymmetries","D) they are not supported internationally"],ans:"C) they are inadequate given structural asymmetries",exp:"'inadequate responses to structural asymmetries of this scale'."},
    {ctx:"Restorative justice is a philosophy of criminal justice that focuses on repairing harm to victims and communities rather than punishing offenders. It typically involves facilitated dialogue between offenders, victims, and community members. Research suggests restorative processes can achieve higher victim satisfaction and lower reoffending rates than conventional sentencing, though critics caution against applying them in cases involving serious violence.",q:"What potential benefit of restorative justice does research suggest?",opts:["A) lower legal costs","B) faster court processing","C) higher victim satisfaction and lower reoffending","D) elimination of custodial sentences"],ans:"C) higher victim satisfaction and lower reoffending",exp:"'higher victim satisfaction and lower reoffending rates'."}
  ]
},

"7.0": {
  _meta: { band:"7.0–7.5", desc:"Good User", toeic_equiv:"~900" },
  listening: [
    {ctx:"Philosopher: The distinction between 'knowing that' and 'knowing how' — propositional and procedural knowledge — runs through Ryle's critique of the Cartesian intellectualist legend. The legend assumes all intelligent performance is preceded by the execution of an internal theory. Ryle's regress argument shows this generates an infinite regress: to apply a rule, you'd need a rule for applying the rule, and so on.",q:"What does Ryle's regress argument demonstrate?",opts:["A) all knowledge is propositional","B) rules cannot be learned","C) applying rules by prior theory leads to infinite regress","D) procedural knowledge is inferior"],ans:"C) applying rules by prior theory leads to infinite regress",exp:"'to apply a rule, you'd need a rule for applying the rule — and so on'.",audio:"Ryle: applying rules via prior theory leads to infinite regress — undermining Cartesian intellectualism."},
    {ctx:"Economist: There's a fundamental tension in central banking between rules and discretion. Rule-based approaches — like inflation targeting or a Taylor rule — provide credibility and predictability but may perform poorly in unprecedented situations. Discretionary approaches allow flexibility but risk time-inconsistency: the temptation to renege on commitments for short-term gain.",q:"What is the time-inconsistency problem?",opts:["A) rules are applied too slowly","B) the temptation to break commitments for short-term advantage","C) central banks lack data in real time","D) inflation targets are set incorrectly"],ans:"B) the temptation to break commitments for short-term advantage",exp:"'temptation to renege on commitments for short-term gain'.",audio:"Time-inconsistency: discretionary central banks face temptation to renege on commitments for short-term gain."},
    {ctx:"Sociologist: The concept of moral panic, introduced by Stanley Cohen, describes a process in which a group or phenomenon is defined as threatening social values. The media amplifies this, folk devils are constructed, moral guardians respond, and the panic either recedes or leads to social change. Importantly, the threat is typically disproportionate to the perceived danger.",q:"What is characteristic of a moral panic?",opts:["A) the threat is accurately assessed","B) social change always follows","C) the perceived threat is disproportionate to reality","D) only governments generate moral panics"],ans:"C) the perceived threat is disproportionate to reality",exp:"'the threat is typically disproportionate to the perceived danger'.",audio:"Moral panic: threat is amplified beyond proportion; media constructs folk devils and moral guardians respond."},
    {ctx:"Climate scientist: The concept of tipping points in the climate system refers to thresholds at which small changes can trigger self-reinforcing feedbacks leading to large, potentially irreversible transitions. Examples include the collapse of the Greenland ice sheet or dieback of the Amazon rainforest. What makes tipping points particularly alarming is that we may cross them before observing the signals in global average temperature.",q:"What makes tipping points particularly alarming?",opts:["A) they are caused by human activity","B) they are irreversible in all cases","C) they may be crossed before temperature signals appear","D) they occur only in polar regions"],ans:"C) they may be crossed before temperature signals appear",exp:"'we may cross them before observing the signals in global average temperature'.",audio:"Climate tipping points: may be crossed before temperature signals emerge — making them particularly alarming."},
    {ctx:"Legal scholar: The concept of legal pluralism challenges the Westphalian assumption of state legal monopoly. In many contexts, individuals are simultaneously subject to state law, religious law, customary law, and transnational regimes. The challenge for jurisprudence is developing frameworks that can accommodate this plurality without collapsing into relativism.",q:"What challenge does legal pluralism pose?",opts:["A) how to enforce international law","B) how to accommodate plural legal orders without relativism","C) why state law should be supreme","D) how to reduce legal complexity"],ans:"B) how to accommodate plural legal orders without relativism",exp:"'accommodate this plurality without collapsing into relativism'.",audio:"Legal pluralism challenge: accommodate multiple legal orders — state, religious, customary, transnational — without collapsing into relativism."},
    {ctx:"Historian: Historiography — the history of historical writing itself — reveals how radically interpretive frameworks change across generations. The same events can be narrated as triumphalist progress, structural inevitability, or contingent tragedy depending on the theoretical commitments the historian brings. This does not make history arbitrary, but it does make the historian's positionality a subject of inquiry.",q:"What does historiographical analysis reveal?",opts:["A) some historical accounts are factually wrong","B) interpretive frameworks shape historical narratives","C) history is fundamentally subjective","D) earlier historians were less rigorous"],ans:"B) interpretive frameworks shape historical narratives",exp:"'interpretive frameworks change...same events narrated differently by theoretical commitments'.",audio:"Historiography reveals how interpretive frameworks — not just facts — shape historical narratives across generations."},
    {ctx:"Psychoanalyst: Lacan's reformulation of Freud introduces the registers of the Real, Symbolic, and Imaginary. The Real is not reality as we know it but the impossible residue that resists symbolisation — what cannot be said. The Symbolic is the structure of language that organises social life. The Imaginary is the register of images, identifications, and specular relations.",q:"How does Lacan define the Real?",opts:["A) objective external reality","B) the unconscious desires","C) that which resists symbolisation","D) the mirror stage of development"],ans:"C) that which resists symbolisation",exp:"'the impossible residue that resists symbolisation — what cannot be said'.",audio:"Lacan's Real: not ordinary reality but the impossible residue that resists symbolisation."},
    {ctx:"Epidemiologist: The distinction between efficacy and effectiveness is often elided in public discourse. Efficacy refers to performance under controlled trial conditions; effectiveness refers to real-world performance across diverse populations and delivery systems. A vaccine might show 95% efficacy in a trial but considerably lower effectiveness when deployed through an imperfect health infrastructure.",q:"Why might effectiveness be lower than efficacy?",opts:["A) vaccines lose potency over time","B) trials use larger populations","C) real-world delivery and populations are more variable","D) effectiveness is harder to measure statistically"],ans:"C) real-world delivery and populations are more variable",exp:"'imperfect health infrastructure' and 'diverse populations'.",audio:"Vaccine efficacy 95% in trials can be lower in effectiveness due to imperfect real-world delivery infrastructure."},
    {ctx:"Political theorist: Deliberative democracy holds that legitimate political decisions emerge from reasoned public deliberation rather than mere aggregation of preferences. Habermas's ideal speech situation — in which participants are free from coercion, power, and strategic action — serves as a normative benchmark. Critics note this ideal is unrealisable and that framing it as a standard may obscure actual power relations.",q:"What is a criticism of the deliberative democracy ideal?",opts:["A) it produces poor decisions","B) it is too inclusive","C) it may obscure actual power relations","D) it requires direct democracy"],ans:"C) it may obscure actual power relations",exp:"'framing it as a standard may obscure actual power relations'.",audio:"Critics: Habermas's ideal speech situation is unrealisable and may obscure actual power relations by setting an impossible standard."},
    {ctx:"Economist: Network externalities — the phenomenon where a product becomes more valuable as more people use it — create winner-take-most dynamics in platform markets. Once a platform achieves critical mass, switching costs and network lock-in make it extremely difficult for competitors to displace it even with superior technology. This is why antitrust frameworks designed for traditional markets struggle with digital monopolies.",q:"Why do traditional antitrust frameworks struggle with digital platforms?",opts:["A) platforms are exempt from antitrust law","B) digital markets change too quickly","C) network effects and lock-in dynamics differ from traditional markets","D) platforms are often unprofitable"],ans:"C) network effects and lock-in dynamics differ from traditional markets",exp:"'antitrust frameworks designed for traditional markets struggle with digital monopolies'.",audio:"Network externalities create winner-takes-most dynamics — traditional antitrust tools weren't designed for these lock-in effects."}
  ],
  reading: [
    {ctx:"Quine's thesis of the indeterminacy of translation holds that no fact of the matter determines a unique correct translation between languages. Given any finite body of behavioural evidence, multiple incompatible translation manuals are equally consistent with it. This has radical implications: if there is no fact about what a speaker means beyond their dispositions to assent and dissent, the very concept of meaning becomes philosophically suspect.",q:"What are the implications of Quine's thesis for meaning?",opts:["A) translation is impossible","B) all languages share a deep structure","C) meaning as a fixed fact becomes philosophically suspect","D) behavioural evidence fully determines meaning"],ans:"C) meaning as a fixed fact becomes philosophically suspect",exp:"'the very concept of meaning becomes philosophically suspect'."},
    {ctx:"The developmental state model, associated with post-war East Asian economies, describes governments that actively coordinate industrial policy, direct credit allocation, and protect infant industries to accelerate structural transformation. Japan's MITI and South Korea's Economic Planning Board are canonical examples. Critics of neoliberal orthodoxy cite these cases to argue that market-conforming industrial policy can accelerate development without the distortions predicted by standard models.",q:"What do critics use these cases to argue?",opts:["A) free markets are superior in all contexts","B) industrial policy inevitably fails","C) state-directed industrial policy can succeed without predicted distortions","D) democracy is required for development"],ans:"C) state-directed industrial policy can succeed without predicted distortions",exp:"'market-conforming industrial policy can accelerate development without the distortions predicted'."},
    {ctx:"The nature-culture binary that has structured Western anthropological thinking is increasingly challenged by multispecies ethnography, which insists that human lives are constitutively entangled with non-human organisms, microbes, and environments. Rather than treating 'nature' as a backdrop to human culture, multispecies approaches foreground the co-constitutive relations through which both human and non-human subjects are formed.",q:"What does multispecies ethnography challenge?",opts:["A) the importance of fieldwork","B) the nature-culture binary","C) the concept of culture itself","D) anthropology's scientific status"],ans:"B) the nature-culture binary",exp:"'challenges the nature-culture binary that has structured Western anthropological thinking'."},
    {ctx:"Arrow's impossibility theorem, a foundational result in social choice theory, demonstrates that no voting system can simultaneously satisfy all of a set of seemingly reasonable fairness conditions: unrestricted domain, Pareto efficiency, independence of irrelevant alternatives, and non-dictatorship. The theorem implies that any democratic aggregation procedure must violate at least one of these conditions.",q:"What is the implication of Arrow's theorem?",opts:["A) democracy is impossible","B) some fairness conditions are not actually reasonable","C) all voting systems must violate at least one fairness condition","D) majority voting is optimal"],ans:"C) all voting systems must violate at least one fairness condition",exp:"'any democratic aggregation procedure must violate at least one of these conditions'."},
    {ctx:"The Anthropocene debate reflects deeper tensions about agency, scale, and responsibility. By naming an epoch after the human species, the concept risks obscuring the profoundly unequal contributions to environmental change — a dynamic Malm and Hornborg term the 'Capitalocene', attributing primary responsibility to fossil capitalism rather than humanity as a whole. Others propose 'Plantationocene' to centre the colonial agricultural systems underpinning modern environmental degradation.",q:"What does the term 'Capitalocene' emphasise?",opts:["A) human ingenuity in solving environmental problems","B) equal human responsibility for environmental change","C) fossil capitalism's primary role in environmental degradation","D) the role of agriculture in climate change"],ans:"C) fossil capitalism's primary role in environmental degradation",exp:"'attributing primary responsibility to fossil capitalism rather than humanity as a whole'."},
    {ctx:"The principal-agent problem is exacerbated in professional service relationships where information asymmetry is severe and output quality is difficult to observe. Professionalism — with its codes of ethics, licensing requirements, and socialisation through education — is partly a governance solution to this problem. By internalising norms of client interest, professionals reduce the need for direct monitoring, though critics note that professional associations also serve as cartelising mechanisms protecting members' economic interests.",q:"What dual function do professional associations serve?",opts:["A) they provide education and certification only","B) they govern professional behaviour and also protect members economically","C) they eliminate information asymmetry entirely","D) they ensure government oversight of professions"],ans:"B) they govern professional behaviour and also protect members economically",exp:"'governance solution...professional associations also serve as cartelising mechanisms'."},
    {ctx:"Biomimicry is a design philosophy that draws on natural systems to solve human engineering challenges. The bullet nose of Japan's Shinkansen train was redesigned based on the kingfisher's beak to reduce sonic booms when exiting tunnels; Velcro was inspired by burdock burrs; the structure of termite mounds informed energy-efficient building ventilation. Critics note that biomimicry often involves selective and sometimes misleading analogies between biological and engineering contexts.",q:"What concern do critics raise about biomimicry?",opts:["A) it is too expensive to implement","B) natural systems are too complex to study","C) analogies between biology and engineering can be misleading","D) intellectual property issues arise"],ans:"C) analogies between biology and engineering can be misleading",exp:"'selective and sometimes misleading analogies between biological and engineering contexts'."},
    {ctx:"The sociology of knowledge examines how social factors shape what counts as knowledge within a given community. Fleck's concept of a 'thought collective' — a community sharing a cognitive style that determines what questions can be asked and what answers count as valid — anticipates Kuhn's paradigm concept but emphasises the social rather than purely intellectual dimensions of scientific change.",q:"How does Fleck's thought collective relate to Kuhn's paradigm?",opts:["A) they are identical concepts","B) Fleck's concept preceded and emphasised social dimensions of knowledge","C) Kuhn developed Fleck's ideas mathematically","D) Fleck rejected the idea of collective knowledge"],ans:"B) Fleck's concept preceded and emphasised social dimensions of knowledge",exp:"'anticipates Kuhn's paradigm concept but emphasises the social...dimensions'."},
    {ctx:"The debate over reductionism in philosophy of mind concerns whether mental phenomena can be fully explained in terms of physical processes. Type identity theory holds that mental states are identical to brain states; functionalism identifies mental states by their causal roles, allowing for multiple realisability. Eliminative materialism takes a more radical position: folk psychological concepts like belief and desire will ultimately be replaced by a mature neuroscience.",q:"What does eliminative materialism propose?",opts:["A) mental states are identical to brain states","B) mental states have multiple physical realisations","C) folk psychological concepts will be replaced by neuroscience","D) the mind cannot be studied scientifically"],ans:"C) folk psychological concepts will be replaced by neuroscience",exp:"'folk psychological concepts...will ultimately be replaced by a mature neuroscience'."},
    {ctx:"Liquid modernity, a concept Zygmunt Bauman developed in contrast to 'solid' modernity, describes a social condition characterised by flexibility, uncertainty, and the dissolution of stable institutions, identities, and communities. Where solid modernity offered rigid structures — nation, class, family — as sources of identity, liquid modernity dissolves these, placing the burden of identity construction on the individual, with both liberating and deeply destabilising consequences.",q:"What is the central characteristic of liquid modernity?",opts:["A) rapid technological change","B) dissolution of stable structures and identity sources","C) growth of nationalist movements","D) increasing economic inequality"],ans:"B) dissolution of stable structures and identity sources",exp:"'dissolution of stable institutions, identities, and communities'."}
  ]
},

"8.0": {
  _meta: { band:"8.0–9.0", desc:"Expert User", toeic_equiv:"990" },
  listening: [
    {ctx:"Literary critic: The problem with evaluating autofiction is that the genre deliberately troubles the autobiography-fiction contract. By naming the protagonist after the author while clearly fictionalising events, autofiction generates an oscillation between sincere assertion and fictional performance that unsettles the conventions of both modes. The reader is positioned in a state of productive undecidability.",q:"What effect does autofiction create in readers?",opts:["A) clear identification with the author","B) confusion about the text's quality","C) productive undecidability about sincere vs fictional content","D) rejection of the protagonist's authenticity"],ans:"C) productive undecidability about sincere vs fictional content",exp:"'oscillation between sincere assertion and fictional performance...productive undecidability'.",audio:"Autofiction: naming protagonist after author while fictionalising events creates productive undecidability — unsettling autobiography and fiction conventions."},
    {ctx:"Moral philosopher: Non-identity cases — first raised systematically by Derek Parfit — pose deep challenges for person-affecting views of ethics. If a policy choice determines not just the welfare but the very existence of different future people, how can we say anyone is harmed by the choice that brings them into existence? Yet it seems intuitively wrong to ignore the welfare of people we will cause to exist.",q:"What is the core challenge of non-identity cases?",opts:["A) future people cannot consent","B) it is hard to compare welfare across generations","C) policies that determine existence cannot be evaluated by harm to the individuals they create","D) Parfit's work has been discredited"],ans:"C) policies that determine existence cannot be evaluated by harm to the individuals they create",exp:"'how can we say anyone is harmed by the choice that brings them into existence?'",audio:"Non-identity: if a policy determines who exists, no one is harmed by it — yet ignoring future welfare seems wrong."},
    {ctx:"Historian of science: The Duhem-Quine thesis holds that no single hypothesis can be tested in isolation — only the conjunction of a hypothesis and its auxiliary assumptions faces empirical test. When a prediction fails, logic alone cannot determine which component of the conjunction was false. This gives scientists considerable freedom in protecting core theories by modifying auxiliary assumptions — a practice Lakatos called the 'protective belt'.",q:"What freedom does the Duhem-Quine thesis give scientists?",opts:["A) to ignore experimental results","B) to protect core theories by revising auxiliary assumptions","C) to choose which experiments to conduct","D) to publish negative results selectively"],ans:"B) to protect core theories by revising auxiliary assumptions",exp:"'freedom in protecting core theories by modifying auxiliary assumptions'.",audio:"Duhem-Quine: can't test hypotheses in isolation — scientists can protect cores by modifying auxiliary assumptions, Lakatos's 'protective belt'."},
    {ctx:"Anthropologist: Mauss's essay on the gift introduced three obligations — to give, to receive, and to reciprocate — that structure social relations in non-market societies. But the most radical insight is that the apparent free gift contains a hidden poison: by accepting a gift, the recipient incurs an obligation that, if not repaid, undermines their social standing. The gift, in other words, is never free.",q:"What is Mauss's 'hidden poison' in gift-giving?",opts:["A) gifts often contain material defects","B) accepting creates an obligation that threatens social standing if unreciprocated","C) gift exchange creates economic inequality","D) the giver gains power that cannot be transferred"],ans:"B) accepting creates an obligation that threatens social standing if unreciprocated",exp:"'by accepting a gift, the recipient incurs an obligation...undermines their social standing'.",audio:"Mauss: accepting a gift incurs an obligation — failing to reciprocate undermines social standing. The gift is never free."},
    {ctx:"Political theorist: Mouffe's agonistic democracy rejects both liberal consensus models and the elimination of antagonism. The challenge, she argues, is to transform antagonism — a relation between enemies — into agonism — a relation between adversaries who share a common symbolic space while disagreeing on its meaning. Democratic legitimacy requires that losers accept the outcome not as right but as the result of a fair contest.",q:"What distinguishes agonism from antagonism in Mouffe's framework?",opts:["A) agonism eliminates conflict","B) agonism involves adversaries sharing symbolic space despite disagreement","C) antagonism is inherently democratic","D) agonism requires consensus"],ans:"B) agonism involves adversaries sharing symbolic space despite disagreement",exp:"'adversaries who share a common symbolic space while disagreeing on its meaning'.",audio:"Mouffe: agonism transforms enemies into adversaries sharing symbolic space — disagreeing on meaning but accepting the contest's legitimacy."},
    {ctx:"Physicist: The measurement problem in quantum mechanics is more philosophically significant than it's often presented. The unitary evolution of the Schrödinger equation gives no account of why measurement produces definite outcomes. The Copenhagen interpretation handles this by fiat — by stipulating that measurement 'collapses' the wave function — without explaining the physical process. Many-worlds interpretations avoid collapse but introduce an ontological proliferation that many find unsatisfying.",q:"What is the limitation of the Copenhagen interpretation?",opts:["A) it cannot make predictions","B) it denies quantum superposition","C) it stipulates collapse without explaining the physical mechanism","D) it requires too many worlds"],ans:"C) it stipulates collapse without explaining the physical mechanism",exp:"'stipulating that measurement collapses the wave function — without explaining the physical process'.",audio:"Copenhagen: stipulates wave function collapse without explaining the physical mechanism — a philosophical weakness."},
    {ctx:"Sociologist: The concept of ontological security, developed by Anthony Giddens, refers to the confidence most people have in the continuity of their self-identity and in the constancy of their social and material environments. High modernity, with its reflexive undermining of traditions and stable social structures, poses a chronic threat to this security, making existential anxiety a structural feature of modern life.",q:"How does high modernity affect ontological security?",opts:["A) it strengthens traditional sources of identity","B) it creates new institutions that provide security","C) it chronically threatens security by undermining traditions","D) it has no effect on individual psychology"],ans:"C) it chronically threatens security by undermining traditions",exp:"'reflexive undermining of traditions...poses a chronic threat to this security'.",audio:"Giddens: high modernity's reflexive undermining of traditions chronically threatens ontological security — existential anxiety becomes structural."},
    {ctx:"Philosopher of language: The distinction between semantics and pragmatics — between what sentences mean and what speakers mean in using them — has been complicated by contextualism. Contextualists hold that the truth conditions of many statements depend not just on linguistic meaning but on contextually supplied parameters that vary with the conversational situation. This makes the semantic-pragmatic boundary less stable than classical formal semantics assumed.",q:"What does contextualism argue about truth conditions?",opts:["A) they are fixed by linguistic meaning alone","B) they are always relative to the speaker's intentions","C) they depend partly on contextual parameters beyond linguistic meaning","D) they cannot be formally specified"],ans:"C) they depend partly on contextual parameters beyond linguistic meaning",exp:"'truth conditions depend not just on linguistic meaning but on contextually supplied parameters'.",audio:"Contextualism: truth conditions depend on contextually supplied parameters — destabilising the classical semantic-pragmatic boundary."},
    {ctx:"Economic historian: The standard narrative of British industrialisation emphasises the role of labour-saving technology driven by high wages. Robert Allen's 'Engels pause' documents a period — roughly 1780 to 1840 — during which real wages stagnated while profits surged, fuelling capital accumulation. This challenges both Whig histories of steady progress and Ricardo's subsistence wage theory.",q:"What does the 'Engels pause' challenge?",opts:["A) the importance of technology in industrialisation","B) both progressive Whig history and subsistence wage theory","C) Allen's high-wage hypothesis","D) the dating of industrialisation"],ans:"B) both progressive Whig history and subsistence wage theory",exp:"'challenges both Whig histories of steady progress and Ricardo's subsistence wage theory'.",audio:"Engels pause (1780-1840): stagnant wages with rising profits challenges both Whig progressive narratives and Ricardo's subsistence wage theory."},
    {ctx:"Literary theorist: The New Criticism's insistence on the autonomy of the literary text — the poem itself as an object of analysis, separate from biographical context and authorial intention — was a methodological advance that enabled rigorous close reading. But its neglect of historical and ideological context, foregrounded by cultural materialism and New Historicism, meant that its formalism was itself historically conditioned and politically — if unintentionally — conservative.",q:"What did cultural materialism and New Historicism reveal about New Criticism?",opts:["A) it lacked rigour in close reading","B) its formalism was historically conditioned and unintentionally conservative","C) it relied too heavily on authorial biography","D) it misread canonical texts"],ans:"B) its formalism was historically conditioned and unintentionally conservative",exp:"'formalism was itself historically conditioned and politically...conservative'."}
  ],
  reading: [
    {ctx:"The replication crisis across psychology and social science has prompted fundamental methodological reflection. Studies that once underpinned textbook findings — ego depletion, social priming, power poses — have failed to replicate in large pre-registered multi-site studies. Critics attribute failure to a combination of publication bias, underpowered studies, researcher degrees of freedom (the capacity to make analytical choices that produce significant results), and the file drawer problem — the non-publication of negative results.",q:"What does 'researcher degrees of freedom' refer to?",opts:["A) freedom to choose research topics","B) the ability to make analytical choices that produce significant results","C) flexibility in peer review","D) discretion in participant recruitment"],ans:"B) the ability to make analytical choices that produce significant results",exp:"'analytical choices that produce significant results'."},
    {ctx:"Decolonising the curriculum refers to a set of practices aimed at questioning and revising the Eurocentric assumptions embedded in academic disciplines — not merely by adding non-Western content but by reconsidering what counts as knowledge, whose perspectives shape canonical texts, and what epistemological frameworks are treated as universal. Critics from within the academy caution against conflating decolonisation with diversity and inclusion, noting that Tuck and Yang's influential essay insists decolonisation is not a metaphor — it must involve the repatriation of land and life.",q:"What do Tuck and Yang argue about decolonisation?",opts:["A) it is equivalent to diversity and inclusion","B) it is primarily about curriculum change","C) it must involve repatriation of land, not just metaphorical change","D) it applies only to postcolonial states"],ans:"C) it must involve repatriation of land, not just metaphorical change",exp:"'decolonisation is not a metaphor — it must involve the repatriation of land and life'."},
    {ctx:"Structural adjustment programmes (SAPs), mandated by the IMF and World Bank as conditions for loans in the 1980s and 1990s, required recipient countries to liberalise trade, privatise state enterprises, deregulate labour markets, and reduce public spending. The empirical record is contested: while some countries achieved macroeconomic stabilisation, many experienced increased poverty, deteriorating public services, and deindustrialisation. Post-Washington Consensus scholarship has moved toward acknowledging institutional preconditions for development that SAPs ignored.",q:"What shift does Post-Washington Consensus scholarship represent?",opts:["A) returning to state-led development","B) acknowledging that institutional preconditions matter for development","C) abandoning macroeconomic reform entirely","D) supporting continued SAP conditionality"],ans:"B) acknowledging that institutional preconditions matter for development",exp:"'institutional preconditions for development that SAPs ignored'."},
    {ctx:"Judith Butler's concept of precarity moves beyond her earlier focus on gender to address the differential distribution of grievability — who counts as a life whose loss is mourned. Precarity, in this framework, is not merely an economic condition but an ontological one: certain lives are constituted as ungrievable by the regulatory schemas that define intelligible life. Butler argues that the politics of mourning can become a site of resistance, revealing the contingency of these schemas.",q:"What does Butler mean by 'grievability'?",opts:["A) the ability to express grief","B) which lives are recognised as worth mourning","C) economic security in old age","D) legal rights for the bereaved"],ans:"B) which lives are recognised as worth mourning",exp:"'who counts as a life whose loss is mourned'."},
    {ctx:"The concept of double consciousness, articulated by W.E.B. Du Bois in The Souls of Black Folk, describes the internal conflict experienced by African Americans who must navigate their own self-perception and the perception of them through the eyes of a dominant white society. Du Bois frames this as 'a sense of always looking at oneself through the eyes of others, of measuring one's soul by the tape of a world that looks on in amused contempt.' This twoness is both a burden and, potentially, a form of critical insight.",q:"What potential does Du Bois see in double consciousness?",opts:["A) it enables social mobility","B) it provides a form of critical insight","C) it resolves the conflict between identities","D) it facilitates assimilation"],ans:"B) it provides a form of critical insight",exp:"'potentially, a form of critical insight'."},
    {ctx:"Communicative capitalism, as theorised by Jodi Dean, describes a political-economic configuration in which communication itself — the proliferation of messages, opinions, and contributions — has become a commodity. In this configuration, political participation is increasingly channelled into acts of communication (tweets, posts, petitions) that circulate as contributions to a global network but have no determinate addressee and therefore no political effect. The feeling of participation substitutes for its substance.",q:"What does communicative capitalism replace, according to Dean?",opts:["A) economic production","B) the feeling of political participation for actual political change","C) democratic institutions","D) traditional media consumption"],ans:"B) the feeling of political participation for actual political change",exp:"'feeling of participation substitutes for its substance'."},
    {ctx:"In Hegel's dialectic of recognition, self-consciousness requires recognition from another self-consciousness. The master-slave dialectic illustrates this: the master achieves recognition but from a consciousness that, by virtue of its subjugation, cannot provide genuine recognition. The slave, through labour transforming the world, achieves a form of self-consciousness that the master, dependent on consumption, cannot. This reversal is the motor of historical development in Hegel's account.",q:"Why can the master not receive genuine recognition?",opts:["A) the master refuses to acknowledge the slave","B) recognition from a subjugated consciousness lacks full validity","C) the master is too isolated to receive recognition","D) the slave does not understand the master"],ans:"B) recognition from a subjugated consciousness lacks full validity",exp:"'from a consciousness that, by virtue of its subjugation, cannot provide genuine recognition'."},
    {ctx:"The Overton window — named after policy analyst Joseph Overton — describes the range of ideas politically acceptable to the mainstream at a given moment. It is not fixed by what politicians believe but by what they judge the public will accept. Shifts in the window occur as ideas previously considered fringe become mainstream — often through sustained advocacy, shocking events, or cultural change. Strategically placing radical ideas at the margins may pull the window in their direction even if those ideas are never adopted.",q:"How can radical ideas shift the Overton window?",opts:["A) by being adopted as policy","B) by becoming popular among voters","C) by being placed at the margins to pull the window in that direction","D) by receiving media endorsement"],ans:"C) by being placed at the margins to pull the window in that direction",exp:"'Strategically placing radical ideas at the margins may pull the window in their direction'."},
    {ctx:"Epigenetic inheritance challenges the Weismann barrier — the classical distinction between germline and somatic cells that underpinned Neo-Darwinian synthesis by blocking the inheritance of acquired characteristics. Findings that some epigenetic marks survive reprogramming during gametogenesis suggest a mechanism by which environmental exposures experienced by parents could influence offspring phenotypes — a partial rehabilitation of Lamarckian ideas within a mechanistically specified framework.",q:"What does epigenetic inheritance partially rehabilitate?",opts:["A) Darwin's theory of natural selection","B) Weismann's barrier concept","C) Lamarckian inheritance of acquired characteristics","D) Neo-Darwinian synthesis fully"],ans:"C) Lamarckian inheritance of acquired characteristics",exp:"'partial rehabilitation of Lamarckian ideas'."},
    {ctx:"The topology of power in Foucault's analytics involves a shift from sovereign power — which operates through prohibition and the threat of death — to disciplinary power, which operates through surveillance, normalisation, and the production of docile bodies, and further to biopower, which governs populations through the administration of life itself. These modalities coexist and articulate with each other; the later forms do not simply replace the earlier.",q:"How do Foucault's different modalities of power relate to each other?",opts:["A) biopower replaced disciplinary power completely","B) they are mutually exclusive","C) they coexist and articulate with each other","D) sovereign power was eliminated in modernity"],ans:"C) they coexist and articulate with each other",exp:"'These modalities coexist and articulate with each other; the later forms do not simply replace the earlier'."}
  ]
}

  return normalizeQ({...bank[idx], _src:'bank', _toeicBand:band});
}

const IELTS_BANDS = ['4.0','5.0','6.0','7.0','8.0'];
const IELTS_FROM_DIFF = d => {
  if(d<=1) return '4.0'; if(d<=3) return '5.0'; if(d<=5) return '6.0';
  if(d<=7) return '7.0'; return '8.0';
};
let ieltsUsed = {};
function ieltsReset(){ ieltsUsed = {}; }
function getIELTSQ(band, sec){
  const bank = QB_IELTS[band]?.[sec];
  if(!bank||bank.length===0) return null;
  if(!ieltsUsed[band]) ieltsUsed[band]={};
  if(!ieltsUsed[band][sec]) ieltsUsed[band][sec]=[];
  const used = ieltsUsed[band][sec];
  const avail = bank.map((_,i)=>i).filter(i=>!used.includes(i));
  if(avail.length===0) return null;
  const idx = avail[Math.floor(Math.random()*avail.length)];
  used.push(idx);
  return normalizeQ({...bank[idx], _src:'bank', _ieltsBand:band});
}

    return `<div class="lvc ${cls}" ${style}>${mt.label}</div>`;
  }).join('');
}

async function loadQ(){
  const isT = selType==='toeic'||selType==='ielts';
  const totalQ = isT ? 20 : 40;
  if(cq>=totalQ){showResults();return;}
  const tSECS = ['listening','reading'];
  curSec = isT ? tSECS[Math.floor(cq/10)] : SECS[Math.floor(cq/10)];
  sq = cq%10;
  document.getElementById('pf').style.width=Math.round((cq/(isT?20:40))*100)+'%';

}

function shuffleOptions(q){
  if(!q.options||q.options.length===0||q.type==='fillin')return q;
  const ct=q.answer;const opts=[...q.options];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  const lb=['A','B','C','D'];
  const no=opts.map((o,i)=>`${lb[i]}) ${o.replace(/^[A-D]\)\s*/,'')}`);
  const cc=ct.replace(/^[A-D]\)\s*/,'');
  const ai=no.findIndex(o=>o.replace(/^[A-D]\)\s*/,'')===cc);
  return {...q,options:no,answer:ai>=0?no[ai]:ct};
}

  if(!text || curLang==='en') return text;
  const t=text.trim();

  // ── 공통 헬퍼 ──

      mean:  w=>`「${w}」の意味は何ですか？`,
      compl: w=>`文を完成させてください：${w}`,
      fill:  w=>`空欄に入る言葉を選んでください：${w}`,
      choose:w=>`正しいものを選んでください：${w}`,
      which: w=>`次の中で${w}を表す言葉は？`,
      best:  w=>`最も適切な単語は？ ${w}`,

    'zh-tw':{
      opp:   w=>`「${w}」的反義詞是什麼？`,
      syn:   w=>`選出「${w}」的同義詞。`,
      mean:  w=>`「${w}」的意思是什麼？`,

      fill:  w=>`選出空格中的正確答案：${w}`,
      choose:w=>`請選出正確答案：${w}`,
      which: w=>`下列哪個詞表示${w}？`,
      best:  w=>`最合適的詞是？ ${w}`,
    },
    'zh-cn':{
      opp:   w=>`「${w}」的反义词是什么？`,
      syn:   w=>`选出「${w}」的同义词。`,
      mean:  w=>`「${w}」的意思是什么？`,
      compl: w=>`请完成句子：${w}`,
      fill:  w=>`选出填入空白的正确答案：${w}`,
      choose:w=>`请选出正确答案：${w}`,
      which: w=>`下列哪个词表示${w}？`,
      best:  w=>`最合适的词是？ ${w}`,
    },
    vi:{
      opp:   w=>`Từ trái nghĩa của '${w}' là gì?`,
      syn:   w=>`Chọn từ đồng nghĩa với '${w}'.`,

      choose:w=>`Chọn đáp án đúng: ${w}`,

    mn:{

      choose:w=>`Зөв хариултыг сонгоно уу: ${w}`,
      which: w=>`${w}-ийг илэрхийлэх үг аль вэ?`,
      best:  w=>`Хамгийн тохиромжтой үг: ${w}`,
    },
    th:{
      opp:   w=>`คำตรงข้ามของ '${w}' คือคำใด?`,
      syn:   w=>`เลือกคำที่มีความหมายเหมือนกับ '${w}'`,
      mean:  w=>`'${w}' หมายความว่าอะไร?`,
      compl: w=>`เติมประโยคให้สมบูรณ์: ${w}`,
      fill:  w=>`เลือกคำที่เติมในช่องว่าง: ${w}`,
      choose:w=>`เลือกคำตอบที่ถูกต้อง: ${w}`,
      which: w=>`คำใดมีความหมายว่า ${w}?`,
      best:  w=>`คำที่เหมาะสมที่สุดคือ: ${w}`,
    },
    ar:{
      opp:   w=>`ما هو مضاد كلمة '${w}'؟`,
      syn:   w=>`اختر مرادف كلمة '${w}'.`,
      mean:  w=>`ما معنى كلمة '${w}'؟`,
      compl: w=>`أكمل الجملة: ${w}`,
      fill:  w=>`اختر الكلمة المناسبة للفراغ: ${w}`,
      choose:w=>`اختر الإجابة الصحيحة: ${w}`,
      which: w=>`أي كلمة تعني ${w}؟`,
      best:  w=>`أنسب كلمة هي: ${w}`,
    },
    ru:{
      opp:   w=>`Каков антоним слова '${w}'?`,
      syn:   w=>`Выберите синоним слова '${w}'.`,
      mean:  w=>`Что означает слово '${w}'?`,
      compl: w=>`Завершите предложение: ${w}`,
      fill:  w=>`Выберите слово для пропуска: ${w}`,
      choose:w=>`Выберите правильный ответ: ${w}`,
      which: w=>`Какое слово означает ${w}?`,
      best:  w=>`Наиболее подходящее слово: ${w}`,
    },
    es:{
      opp:   w=>`¿Cuál es el antónimo de '${w}'?`,
      syn:   w=>`Elige el sinónimo de '${w}'.`,
      mean:  w=>`¿Qué significa '${w}'?`,
      compl: w=>`Completa la oración: ${w}`,
      fill:  w=>`Elige la palabra para el espacio: ${w}`,
      choose:w=>`Elige la respuesta correcta: ${w}`,
      which: w=>`¿Qué palabra significa ${w}?`,
      best:  w=>`La palabra más adecuada es: ${w}`,
    },
  };

  const lng = T[curLang];
  if(!lng) return text;

  // ── 패턴 매칭 & 번역 ──

  // 1. "What is the opposite of 'X'?" / "antonym of 'X'"
  let m = t.match(/(?:what is the |choose the |find the )?(?:opposite|antonym) of [''""](.+?)[''""][^a-z]?/i);
  if(m) return lng.opp(m[1]);

  // 2. "Choose the synonym / synonym of 'X'"
  m = t.match(/(?:choose the |select the |find the )?synonym(?:ous word)? (?:of|for) [''""](.+?)[''""][^a-z]?/i);
  if(m) return lng.syn(m[1]);

  // 3. "What does 'X' mean?" / "meaning of 'X'"
  m = t.match(/what does [''""](.+?)[''""] mean/i);
  if(m) return lng.mean(m[1]);

  m = t.match(/(?:choose the |select the )?(?:correct )?meaning of [''""](.+?)[''"'][^a-z]?/i);
  if(m) return lng.mean(m[1]);

  m = t.match(/[''""](.+?)[''""] (?:means|is closest in meaning)/i);
  if(m) return lng.mean(m[1]);

  // 4. "Fill in the blank: ..."
  m = t.match(/fill in(?:\s+the\s+blank)?:?\s+(.+)/i);
  if(m) return lng.fill(m[1]);

  // 5. "Fill in: ..."
  m = t.match(/^fill in:?\s+(.+)/i);
  if(m) return lng.fill(m[1]);

  // 6. "Choose the correct sentence:" / "Choose the word..."
  m = t.match(/^choose (?:the )?(?:correct|best|right)?\s*(?:sentence|word|answer|option):?\s*(.*)/i);
  if(m) return lng.choose(m[1]||t);

  // 7. "Which word means X?"
  m = t.match(/which word (?:best )?(?:means?|describes?|expresses?)\s+(.+?)[\?\.]*$/i);
  if(m) return lng.which(m[1]);

  // 8. "Which one is X?" / "Which of these..."
  m = t.match(/^which (?:one |of these )?(?:is|are)\s+(.+?)[\?\.]*$/i);
  if(m) return lng.choose(m[1]);

  // 9. "What best completes: '...'"
  m = t.match(/(?:what|which word) (?:best )?completes?:?\s*[''""]?(.+?)[''""]?[\?\.]*$/i);
  if(m) return lng.best(m[1]);

  // 10. 매칭 안 되면 원문 반환
  return text;
}


function normalizeQ(q){
  if(!q)return q;
  if(!q.question&&q.q)q.question=q.q;
  if(!q.options&&q.opts)q.options=q.opts;
  if(!q.answer&&q.ans)q.answer=q.ans;
  if(!q.explanation&&q.exp)q.explanation=q.exp;
  if(!q.context&&q.ctx)q.context=q.ctx;
  if(!q.audioScript&&q.audio)q.audioScript=q.audio;
  if(!q.type)q.type='mcq';
  return shuffleOptions(q);
}
async function getQ(lv,sec){
  // TOEIC mode
  if(selType==='toeic'){
    const band = TOEIC_FROM_DIFF(diff);
    const q = getTOEICQ(band, sec);
    if(q) return q;
    return await genAI_TOEIC(band, sec);
  }
  // IELTS mode
  if(selType==='ielts'){
    const band = IELTS_FROM_DIFF(diff);
    const q = getIELTSQ(band, sec);
    if(q) return q;
    return await genAI_IELTS(band, sec);
  }
  // ESL mode
  if(selType==='esl'){
    const eslLv = ESL_FROM_DIFF(diff);
    const q = getESLQ(eslLv, sec);
    if(q) return q;
    return await genAI_ESL(eslLv, sec);
  }
  // Junior mode
  const bank=QB[lv]?.[sec];
  if(bank&&bank.length>0){
    const avail=bank.map((_,i)=>i).filter(i=>!used[sec].includes(i));
    if(avail.length>0){
      const idx=avail[Math.floor(Math.random()*avail.length)];
      used[sec].push(idx);
      return normalizeQ({...bank[idx],_src:'bank',_lv:lv});
    }
  }
  return await genAI(lv,sec);
}

function renderQ(q,sec,lv){

    :`<span class="src-badge src-bank">📚 ${L.src}</span>`;
