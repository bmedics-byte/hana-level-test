<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HANA Academy — Free English Level Test</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--r:#E24B4A;--b:#185FA5;
  --bg:#F7F9F8;--card:#FFFFFF;--border:#E0E6E3;--text:#1A2E25;--muted:#6B8478;
  --shadow:0 1px 4px rgba(0,30,20,.06);
  --radius:10px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem}
/* Header */
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem}
.logo-b{width:40px;height:40px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0}
.hdr-t{font-size:19px;font-weight:700;color:var(--text)}
.hdr-s{font-size:11px;color:var(--muted)}
/* Lang bar */
.lb-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.2rem}
.lb{padding:3px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--card);color:var(--muted);transition:.15s}
.lb:hover{border-color:var(--g)}.lb.on{background:var(--g);color:#fff;border-color:var(--g)}
/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;box-shadow:var(--shadow);margin-bottom:.9rem}
.card-t{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.9rem}
.hint{font-size:12px;color:var(--muted);margin-bottom:.9rem}
/* Form */
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px;margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:var(--muted);font-weight:500}
input,select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#fff;color:var(--text);outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
/* Test type grid */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
.tc{border:1.5px solid var(--border);border-radius:var(--radius);padding:.85rem;cursor:pointer;text-align:center;transition:.15s;background:var(--card)}
.tc:hover{border-color:var(--g)}.tc.on{border-color:var(--g);background:var(--gl)}
.ti{font-size:22px;margin-bottom:4px}.tn{font-size:12px;font-weight:600;color:var(--text)}.td{font-size:10px;color:var(--muted);margin-top:2px}
/* Buttons */
.btn{padding:9px 20px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:.15s;font-weight:500}
.btn:hover{background:#f0f4f2}.btn-p{background:var(--g);color:#fff;border-color:var(--g)}.btn-p:hover{background:var(--gd)}
.btn-sm{padding:6px 14px;font-size:12px}
/* Progress */
.pb-wrap{margin-bottom:.8rem}
.pb{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--g);border-radius:3px;transition:width .3s}
.pb-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
/* Level chips */
.lv-row{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center}
.lv-lbl{font-size:11px;color:var(--muted);margin-right:2px}
.lvc{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--muted);background:var(--card);transition:.2s}
.lvc.cur{font-weight:700;color:#fff;border-width:2px}
.lvc.done{background:var(--gl);color:var(--gd);border-color:var(--g)}
/* Question area */
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:6px}
.sec-badge{padding:3px 10px;border-radius:20px;font-size:11px;background:var(--gl);color:var(--gd);font-weight:500}
.src-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.src-bank{background:#EEF4FF;color:#2D5BE3}.src-ai{background:#FFF3E0;color:#E65100}
.qctx{font-size:13px;color:#4A5E55;background:#F0F7F4;padding:11px 13px;border-radius:8px;margin-bottom:.9rem;line-height:1.75;border-left:3px solid var(--g)}
.qtext{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.9rem;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem}
.opt{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:.15s;background:#fff}
.opt:hover:not(.lk){border-color:var(--g);background:var(--gl)}.opt.ok{background:var(--gl);border-color:var(--g);color:var(--gd);font-weight:500}.opt.bad{background:#FDEAEA;border-color:var(--r);color:#B42020}.lk{pointer-events:none}
.fi{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:.8rem;transition:.15s}
.fi:focus{border-color:var(--g);outline:none}.fi.ok{border-color:var(--g);background:var(--gl)}.fi.bad{border-color:var(--r);background:#FDEAEA}
.fb{padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:.8rem;line-height:1.5}
.fb.ok{background:var(--gl);color:var(--gd);border-left:3px solid var(--g)}.fb.bad{background:#FDEAEA;color:#B42020;border-left:3px solid var(--r)}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem}
.dots{display:flex;gap:3px;flex-wrap:wrap;max-width:260px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:.2s}
.dot.done{background:var(--g)}.dot.active{background:var(--g);box-shadow:0 0 0 2.5px var(--gl)}.dot.wr{background:var(--r)}
/* Audio */
.ab{background:#F0F7F4;border-radius:8px;padding:10px 13px;margin-bottom:.9rem;display:flex;align-items:center;gap:11px}
.play{width:38px;height:38px;border-radius:50%;background:var(--g);border:none;cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.play:hover{background:var(--gd)}.at{font-size:12px;color:var(--muted);line-height:1.5}
/* Loader */
.ldr{text-align:center;padding:2.5rem 1rem}
.spin{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto .8rem}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr-t{font-size:12px;color:var(--muted)}
/* Result */
.tab-row{display:flex;gap:5px;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab{padding:5px 13px;font-size:12px;cursor:pointer;border-radius:8px;color:var(--muted);border:1px solid transparent;font-weight:500;transition:.15s}
.tab.on{background:var(--gl);color:var(--gd);border-color:var(--g)}
.rh{text-align:center;padding:1.2rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.1rem}
.lvbadge{display:inline-block;padding:5px 18px;border-radius:20px;font-size:20px;font-weight:700;color:#fff;margin:5px 0}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.1rem}
@media(min-width:480px){.sg{grid-template-columns:repeat(4,1fr)}}
.sc{background:#F7FBF9;border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.sl{font-size:10px;color:var(--muted);margin-bottom:2px;font-weight:500}.sv{font-size:17px;font-weight:700;color:var(--text)}.ss{font-size:10px;color:var(--muted)}
.br-row{margin-bottom:10px}
.br-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}
.br-track{height:9px;background:var(--border);border-radius:5px;overflow:visible;position:relative}
.br-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.34,1.2,.64,1)}
.br-avg{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--r);border-radius:1px}
.br-score{font-size:10px;font-weight:600;margin-top:2px}
.leg{display:flex;gap:12px;margin-top:5px;font-size:10px;color:var(--muted);align-items:center}
.ld{display:inline-block;width:12px;height:3px;border-radius:2px;margin-right:3px;vertical-align:middle}
/* Answer sheet */
.as-sec{margin-bottom:1.1rem}
.as-st{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.as-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid #F0F4F2;font-size:12px;align-items:flex-start}
.as-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.as-num.ok{background:var(--gl);color:var(--gd)}.as-num.bad{background:#FDEAEA;color:#B42020}
.as-body{flex:1}.as-q{color:var(--text);margin-bottom:3px;line-height:1.4}
.as-r{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px}
.as-c{font-size:10px;color:var(--gd);background:var(--gl);padding:2px 7px;border-radius:8px}
.as-m{font-size:10px;padding:2px 7px;border-radius:8px}
.as-m.ok{color:var(--gd);background:var(--gl)}.as-m.bad{color:#B42020;background:#FDEAEA}
/* CTA */
.cta{text-align:center;padding:1.2rem;background:linear-gradient(135deg,var(--gl),#fff);border-radius:var(--radius);margin-top:1.1rem;border:1px solid rgba(29,158,117,.2)}
.cta-t{font-size:14px;font-weight:700;color:var(--gd);margin-bottom:4px}
.cta-s{font-size:11px;color:var(--g);margin-bottom:10px}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="logo-b">H</div>
  <div><div class="hdr-t">HANA Academy</div><div class="hdr-s">Free English Level Test · Clark, Philippines</div></div>
  <button onclick="goHome()" id="home-btn" style="display:none;margin-left:auto;padding:6px 13px;border-radius:8px;border:1px solid #E24B4A;background:#fff;cursor:pointer;font-size:12px;color:#A32D2D;align-items:center;gap:5px;transition:.15s;font-weight:500" onmouseover="this.style.background='#FDEAEA'" onmouseout="this.style.background='#fff'">

</div>

<!-- SCREEN: TEST TYPE -->
<div id="sc-type" class="hidden">
<div class="card">

  <!-- Korean Curriculum Grade Selector -->
  <div id="korean-grade-wrap" style="display:none;margin-top:10px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:1px solid var(--color-border-tertiary)">
    <label style="font-size:11px;font-weight:600;color:var(--color-text-secondary);display:block;margin-bottom:6px">📚 Select Grade Level</label>
    <select id="korean-grade-sel" onchange="koreanGrade=this.value" style="width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px">
      <option value="elem12" data-ko="🌱 초등 1-2학년 (1-2학년)" data-en="🌱 Grade 1-2 (Elementary)">🌱 Grade 1-2 (Elementary)</option>
      <option value="elem34" data-ko="📗 초등 3-4학년 (3-4학년)" data-en="📗 Grade 3-4 (Elementary)">📗 Grade 3-4 (Elementary)</option>
      <option value="elem56" data-ko="📘 초등 5-6학년 (5-6학년)" data-en="📘 Grade 5-6 (Elementary)">📘 Grade 5-6 (Elementary)</option>
      <option value="mid12" data-ko="📙 중학교 1-2학년 (7-8학년)" data-en="📙 Grade 7-8 (Middle School)">📙 Grade 7-8 (Middle School)</option>
      <option value="mid3hi1" data-ko="📕 중3-고1 (9-10학년)" data-en="📕 Grade 9-10 (Middle-High)">📕 Grade 9-10 (Middle-High)</option>
      <option value="hi23" data-ko="🎓 고2-고3 (11-12학년)" data-en="🎓 Grade 11-12 (High School)">🎓 Grade 11-12 (High School)</option>
    </select>
  </div>
  <button class="btn btn-p" onclick="startTest()" id="t-st">Start Test →</button>
</div>
</div>

<!-- SCREEN: TEST -->
<div id="sc-test" class="hidden">
  <div class="pb-wrap">
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pb-lbl"><span id="pbl">Q1 of 40</span><span id="pbr">Vocabulary</span></div>
  </div>
  <div class="lv-row"><span class="lv-lbl" id="t-lvl">Level:</span><div id="lvrow"></div></div>
  <div class="card">
    <div class="ldr" id="ldr"><div class="spin"></div><div class="ldr-t" id="t-ld">Loading question...</div></div>
    <div id="qc" class="hidden"></div>
  </div>
</div>

<!-- SCREEN: RESULT -->
<div id="sc-result" class="hidden">

    <div class="tab on" id="tab-s" onclick="swTab('s')" id="t-rt">Results</div>
    <div class="tab" id="tab-a" onclick="swTab('a')" id="t-as">Answer Sheet</div>
  </div>
  <div id="res-s"></div>
  <div id="res-a" class="hidden"></div>
</div>

</div><!-- /wrap -->

<script>
// ══════════════════════════════════════════════════
// QUESTION BANK — Lv.1-3 full (10 per section)
// ══════════════════════════════════════════════════
const QB = {};

QB[1] = {
  vocab:[
    {q:"What is this? (🐱)",opts:["A) dog","B) cat","C) bird","D) fish"],ans:"B) cat",exp:"A cat says meow."},
    {q:"Choose the word for the picture: (🍎)",opts:["A) orange","B) banana","C) apple","D) grape"],ans:"C) apple",exp:"A red apple."},
    {q:"What color is the sky?",opts:["A) red","B) green","C) blue","D) black"],ans:"C) blue",exp:"The sky is blue."},
    {q:"How many fingers on one hand?",opts:["A) 3","B) 4","C) 5","D) 6"],ans:"C) 5",exp:"Five fingers on each hand."},
    {q:"Which is a fruit?",opts:["A) carrot","B) bread","C) banana","D) milk"],ans:"C) banana",exp:"Banana is a fruit."},
    {q:"What do you use to write?",opts:["A) spoon","B) pencil","C) shoe","D) cup"],ans:"B) pencil",exp:"A pencil is for writing."},
    {q:"What is the opposite of 'big'?",opts:["A) tall","B) small","C) fast","D) hot"],ans:"B) small",exp:"Big ↔ Small."},
    {q:"A place to sleep?",opts:["A) kitchen","B) garden","C) bedroom","D) garage"],ans:"C) bedroom",exp:"A bedroom is where you sleep."},
    {q:"What do you drink in the morning?",opts:["A) sand","B) milk","C) soap","D) paint"],ans:"B) milk",exp:"Milk is a common morning drink."},
    {q:"Which animal says 'woof'?",opts:["A) cat","B) bird","C) dog","D) fish"],ans:"C) dog",exp:"Dogs say woof."}
  ],
  listening:[
    {ctx:"Teacher: What is your name? Student: My name is Tom.",q:"What is the student's name?",opts:["A) Tim","B) Tom","C) Tony","D) Ted"],ans:"B) Tom",exp:"'My name is Tom'.",audio:"Teacher: What is your name? Student: My name is Tom."},
    {ctx:"Mom: How old are you? Boy: I am seven years old.",q:"How old is the boy?",opts:["A) 5","B) 6","C) 7","D) 8"],ans:"C) 7",exp:"'I am seven'.",audio:"Mom: How old are you? Boy: I am seven years old."},
    {ctx:"Girl: I have a red ball. It is big.",q:"What color is the ball?",opts:["A) blue","B) green","C) red","D) yellow"],ans:"C) red",exp:"'a red ball'.",audio:"Girl: I have a red ball. It is big."},
    {ctx:"Boy: I like cats. They are cute.",q:"What does the boy like?",opts:["A) dogs","B) cats","C) birds","D) fish"],ans:"B) cats",exp:"'I like cats'.",audio:"Boy: I like cats. They are cute."},
    {ctx:"Teacher: Open your book, please.",q:"What does the teacher say?",opts:["A) Close your book","B) Read your book","C) Open your book","D) Buy your book"],ans:"C) Open your book",exp:"'Open your book'.",audio:"Teacher: Open your book please."},
    {ctx:"Girl: Today is Monday. We have English class.",q:"What day is it?",opts:["A) Sunday","B) Tuesday","C) Monday","D) Friday"],ans:"C) Monday",exp:"'Today is Monday'.",audio:"Girl: Today is Monday. We have English class."},
    {ctx:"Boy: My favorite color is yellow.",q:"What is the boy's favorite color?",opts:["A) red","B) blue","C) green","D) yellow"],ans:"D) yellow",exp:"'My favorite color is yellow'.",audio:"Boy: My favorite color is yellow."},
    {ctx:"Mom: Please eat your apple. Boy: OK, Mom.",q:"What should the boy eat?",opts:["A) banana","B) orange","C) apple","D) grape"],ans:"C) apple",exp:"'eat your apple'.",audio:"Mom: Please eat your apple. Boy: OK, Mom."},
    {ctx:"Teacher: Stand up, please. Students: OK!",q:"What do the students do?",opts:["A) Sit down","B) Stand up","C) Clap hands","D) Go home"],ans:"B) Stand up",exp:"'Stand up'.",audio:"Teacher: Stand up please. Students: OK!"},
    {ctx:"Girl: I go to school by bus every day.",q:"How does the girl go to school?",opts:["A) by car","B) by bike","C) on foot","D) by bus"],ans:"D) by bus",exp:"'by bus'.",audio:"Girl: I go to school by bus every day."}
  ],
  reading:[
    {ctx:"I have a dog. His name is Max. Max is brown.",q:"What color is Max?",opts:["A) black","B) white","C) brown","D) yellow"],ans:"C) brown",exp:"'Max is brown'."},
    {ctx:"Tom is 8 years old. He likes to play soccer.",q:"How old is Tom?",opts:["A) 6","B) 7","C) 8","D) 9"],ans:"C) 8",exp:"'Tom is 8 years old'."},
    {ctx:"The sun is big and yellow. It is very hot.",q:"What is the sun like?",opts:["A) small and cold","B) big and yellow","C) blue and wet","D) dark and small"],ans:"B) big and yellow",exp:"'big and yellow'."},
    {ctx:"Ann has three cats. She loves them very much.",q:"How many cats does Ann have?",opts:["A) one","B) two","C) three","D) four"],ans:"C) three",exp:"'three cats'."},
    {ctx:"I eat breakfast at 7 o'clock every morning.",q:"When does the person eat breakfast?",opts:["A) 6:00","B) 7:00","C) 8:00","D) 9:00"],ans:"B) 7:00",exp:"'at 7 o'clock'."},
    {ctx:"My classroom is on the second floor.",q:"Where is the classroom?",opts:["A) first floor","B) third floor","C) second floor","D) fourth floor"],ans:"C) second floor",exp:"'second floor'."},
    {ctx:"Ben likes apples and oranges. He eats fruit every day.",q:"What does Ben eat every day?",opts:["A) vegetables","B) meat","C) fruit","D) bread"],ans:"C) fruit",exp:"'eats fruit every day'."},
    {ctx:"It is raining today. I need an umbrella.",q:"What does the person need?",opts:["A) sunglasses","B) umbrella","C) coat","D) boots"],ans:"B) umbrella",exp:"'I need an umbrella'."},
    {ctx:"My mom is a teacher. She goes to school every day.",q:"What does mom do?",opts:["A) doctor","B) nurse","C) teacher","D) driver"],ans:"C) teacher",exp:"'My mom is a teacher'."},
    {ctx:"There are five birds on the tree. They are singing.",q:"What are the birds doing?",opts:["A) flying","B) sleeping","C) eating","D) singing"],ans:"D) singing",exp:"'They are singing'."}

    {q:"'Compensate' means to:",opts:["A) make worse","B) give something to make up for a loss","C) refuse to pay","D) ignore a problem"],ans:"B) give something to make up for a loss",exp:"Compensate = make amends."},
    {q:"'Persist' means to:",opts:["A) give up quickly","B) change direction","C) continue despite difficulty","D) start over"],ans:"C) continue despite difficulty",exp:"Persist = keep going."},
    {q:"'Virtually' means:",opts:["A) absolutely not","B) almost or nearly","C) exactly","D) occasionally"],ans:"B) almost or nearly",exp:"Virtually = practically."},
    {q:"'Refute' means to:",opts:["A) agree completely","B) prove to be wrong","C) support strongly","D) delay"],ans:"B) prove to be wrong",exp:"Refute = disprove."},
    {q:"'Surplus' means:",opts:["A) a shortage","B) an exact amount","C) an excess beyond what is needed","D) a minimum"],ans:"C) an excess beyond what is needed",exp:"Surplus = more than required."},
    {q:"'Ambivalent' means:",opts:["A) strongly in favor","B) strongly opposed","C) having mixed feelings","D) completely neutral"],ans:"C) having mixed feelings",exp:"Ambivalent = uncertain, mixed feelings."},
    {q:"'Derive' means to:",opts:["A) destroy completely","B) obtain from a source","C) create from scratch","D) hide away"],ans:"B) obtain from a source",exp:"Derive = get from."},
    {q:"'Perpetual' means:",opts:["A) temporary","B) never-ending","C) occasional","D) recent"],ans:"B) never-ending",exp:"Perpetual = continuing indefinitely."},
    {q:"'Contradict' means to:",opts:["A) confirm what was said","B) say the opposite","C) agree enthusiastically","D) pause and reflect"],ans:"B) say the opposite",exp:"Contradict = deny or oppose."},
    {q:"'Advocate' (verb) means to:",opts:["A) oppose strongly","B) publicly support","C) secretly agree","D) completely ignore"],ans:"B) publicly support",exp:"Advocate = speak in favor of."},

    {q:"'Arbitrary' means:",opts:["A) based on careful reasoning","B) based on random choice","C) based on evidence","D) based on tradition"],ans:"B) based on random choice",exp:"Arbitrary = random, without reason."},

  listening: [

    {ctx:"Economist: Rising housing costs in major cities force young professionals to delay marriage, having children, and building savings.",q:"What is one social consequence mentioned?",opts:["A) increased immigration","B) higher crime","C) delayed marriage","D) falling birth rates only"],ans:"C) delayed marriage",exp:"'delay marriage, having children, and savings'.",audio:"Economist: Rising housing costs force young professionals to delay marriage, children, and building savings."},
    {ctx:"Guide: The ancient site was discovered accidentally in 1922 when a worker's shovel struck a stone staircase leading to a sealed tomb.",q:"How was it discovered?",opts:["A) planned excavation","B) satellite imaging","C) accidentally by a worker","D) by local farmers"],ans:"C) accidentally by a worker",exp:"'discovered accidentally...worker's shovel struck'.",audio:"Guide: The site was discovered accidentally in 1922 when a worker's shovel struck a staircase leading to a sealed tomb."},
    {ctx:"Scientist: Children in natural environments show significantly lower stress levels and better concentration than those who spend most time indoors.",q:"What did the study find?",opts:["A) they sleep better","B) they are more social","C) lower stress and better concentration","D) they score better in exams"],ans:"C) lower stress and better concentration",exp:"'lower stress and better concentration'.",audio:"Scientist: Children in natural environments show lower stress and better concentration than those indoors."},
    {ctx:"Philosopher: Utilitarianism holds that the morally right action produces the greatest good for the greatest number of people.",q:"What is the core idea?",opts:["A) individual rights are paramount","B) tradition determines morality","C) greatest good for the greatest number","D) rules must always be followed"],ans:"C) greatest good for the greatest number",exp:"'greatest good for the greatest number'.",audio:"Philosopher: Utilitarianism holds the right action produces the greatest good for the greatest number."},
    {ctx:"Director: The film explores how social media algorithms create echo chambers, reinforcing existing beliefs rather than exposing diverse perspectives.",q:"What do algorithms do?",opts:["A) expose diverse views","B) create echo chambers","C) reduce online time","D) improve critical thinking"],ans:"B) create echo chambers",exp:"'create echo chambers, reinforcing existing beliefs'.",audio:"Director: The film explores how algorithms create echo chambers, reinforcing existing beliefs rather than exposing diverse perspectives."},
    {ctx:"Teacher: When writing an argumentative essay, your thesis must be debatable — not a fact. Support with at least three pieces of evidence.",q:"What must a thesis be?",opts:["A) a known fact","B) very long","C) debatable","D) a question"],ans:"C) debatable",exp:"'thesis must be debatable — not a fact'.",audio:"Teacher: Your thesis must be debatable — not a fact. Support it with at least three pieces of evidence."},
    {ctx:"Analyst: Annual profits fell by 12% due to supply chain disruptions and reduced consumer spending.",q:"What caused the profit fall?",opts:["A) increased competition","B) supply chain disruptions and reduced spending","C) management changes","D) new regulations"],ans:"B) supply chain disruptions and reduced spending",exp:"'supply chain disruptions and reduced spending'.",audio:"Analyst: Annual profits fell 12% due to supply chain disruptions and reduced consumer spending."},
    {ctx:"Historian: The French Revolution dismantled monarchy and privilege but also unleashed violence and instability that took decades to resolve.",q:"What was a negative consequence?",opts:["A) fall of democracy","B) violence and instability","C) loss of trade","D) religious suppression"],ans:"B) violence and instability",exp:"'unleashed violence and instability'.",audio:"Historian: The French Revolution dismantled privilege but unleashed violence and instability that took decades to resolve."},
    {ctx:"Environmental officer: We've detected microplastics in 94% of tap water samples tested.",q:"What percentage had microplastics?",opts:["A) 74%","B) 84%","C) 90%","D) 94%"],ans:"D) 94%",exp:"'94% of samples'.",audio:"Environmental officer: Microplastics were detected in 94 percent of tap water samples tested."},
    {ctx:"Coach: Elite athletes spend up to 70% of training time on weaknesses, not strengths.",q:"What do elite athletes focus on?",opts:["A) existing strengths","B) their weaknesses","C) endurance only","D) mental skills"],ans:"B) their weaknesses",exp:"'70% of training on weaknesses'.",audio:"Coach: Elite athletes spend up to 70 percent of training time on weaknesses, not strengths."},
    {ctx:"Nutritionist: Even foods marketed as 'healthy' may have misleading labels, containing hidden sugars and chemical preservatives.",q:"What warning is given?",opts:["A) always trustworthy","B) contain no sugar","C) labels can be misleading","D) more expensive"],ans:"C) labels can be misleading",exp:"'may have misleading labels'.",audio:"Nutritionist: Foods marketed as healthy may have misleading labels."},
    {ctx:"Tech CEO: AI will not replace human creativity but will radically transform which skills are valued over the next decade.",q:"What does the CEO predict?",opts:["A) AI replaces all workers","B) AI boosts creativity","C) AI transforms valued skills","D) AI development slows"],ans:"C) AI transforms valued skills",exp:"'transform which skills are valued'.",audio:"Tech CEO: AI will not replace creativity but transform which skills are valued in the workplace."},
    {ctx:"Ethicist: Self-driving cars face a dilemma: should algorithms prioritize passenger safety or minimize total harm?",q:"What ethical dilemma is described?",opts:["A) fuel vs. speed","B) passenger safety vs. total harm","C) reliability vs. cost","D) privacy vs. navigation"],ans:"B) passenger safety vs. total harm",exp:"'prioritize passenger safety or minimize total harm'.",audio:"Ethicist: Self-driving cars face a dilemma — prioritize passenger safety or minimize total harm in unavoidable crashes."},
    {ctx:"Biologist: Epigenetics studies how environmental factors switch genes on or off without altering DNA, challenging the idea that genes alone determine traits.",q:"What does epigenetics challenge?",opts:["A) existence of DNA","B) evolutionary theory","C) genes alone determine traits","D) environment's role"],ans:"C) genes alone determine traits",exp:"'challenging...genes alone determine traits'.",audio:"Biologist: Epigenetics studies how environment switches genes on or off, challenging the idea that genes alone determine traits."},
    {ctx:"Policy maker: UBI pilots showed recipients more likely to pursue education and start businesses, while work rates remained largely unchanged.",q:"What did UBI pilots show about work rates?",opts:["A) fell significantly","B) rose sharply","C) remained largely unchanged","D) varied by region"],ans:"C) remained largely unchanged",exp:"'work rates remained largely unchanged'.",audio:"Policy maker: UBI pilots showed recipients pursued education and businesses while work rates remained largely unchanged."},
    {ctx:"Linguist: The Sapir-Whorf hypothesis suggests that the language you speak influences how you perceive the world.",q:"What does the hypothesis suggest?",opts:["A) all languages are equal","B) language influences perception","C) grammar determines intelligence","D) bilingualism causes confusion"],ans:"B) language influences perception",exp:"'language...influences how you perceive the world'.",audio:"Linguist: The Sapir-Whorf hypothesis suggests the language you speak influences how you perceive the world."},
    {ctx:"Sociologist: Social mobility has declined in many developed nations, creating a 'sticky floor and sticky ceiling' effect.",q:"What does 'sticky floor and ceiling' describe?",opts:["A) rising wages","B) reduced social mobility","C) class conflict","D) falling poverty"],ans:"B) reduced social mobility",exp:"'social mobility has declined'.",audio:"Sociologist: Social mobility has declined, creating a sticky floor and sticky ceiling effect."},
    {ctx:"Archaeologist: These tools predate the previously known earliest evidence of human technology by at least 500,000 years.",q:"What is significant?",opts:["A) confirms existing timeline","B) shows early language","C) predates known tech by 500,000 years","D) found in unusual location"],ans:"C) predates known tech by 500,000 years",exp:"'predate...by at least 500,000 years'.",audio:"Archaeologist: These tools predate the earliest known human technology by at least 500,000 years."},
    {ctx:"Astronomer: The Webb telescope detected chemical signatures suggesting conditions possibly compatible with life on a distant exoplanet.",q:"What does the tentative finding suggest?",opts:["A) life is confirmed","B) the planet is uninhabitable","C) conditions may be compatible with life","D) atmosphere identical to Earth"],ans:"C) conditions may be compatible with life",exp:"'conditions compatible with life'.",audio:"Astronomer: The Webb telescope detected signatures suggesting conditions possibly compatible with life on a distant exoplanet."},
    {ctx:"Psychologist: Intrinsic motivation — doing something for internal satisfaction — leads to deeper learning and longer retention than extrinsic rewards.",q:"Why is intrinsic motivation better?",opts:["A) requires less effort","B) deeper learning and longer retention","C) faster results","D) easier to develop"],ans:"B) deeper learning and longer retention",exp:"'deeper learning and longer retention'.",audio:"Psychologist: Intrinsic motivation leads to deeper learning and longer retention than extrinsic rewards like grades."},
    {ctx:"Diplomat: Neither side fully achieved its goals, but both accepted partial gains to avoid a complete breakdown in negotiations.",q:"Why accept the compromise?",opts:["A) they both won fully","B) to avoid negotiation failure","C) under international pressure","D) for economic benefits"],ans:"B) to avoid negotiation failure",exp:"'to avoid a complete breakdown'.",audio:"Diplomat: Neither side fully achieved goals, but both accepted partial gains to avoid a complete breakdown."},
    {ctx:"Neuroscientist: Sleep deprivation impairs the prefrontal cortex, reducing rational judgment to a level comparable to moderate alcohol intoxication.",q:"What does sleep deprivation do?",opts:["A) improves speed","B) no effect","C) reduces rational judgment","D) enhances creativity"],ans:"C) reduces rational judgment",exp:"'reducing rational judgment...comparable to alcohol'.",audio:"Neuroscientist: Sleep deprivation reduces rational judgment to a level comparable to moderate alcohol intoxication."},
    {ctx:"Journalist: Ivory trade has re-emerged through loopholes and corruption, undermining conservation gains since the 1990s.",q:"What is undermining conservation?",opts:["A) climate change","B) habitat loss","C) re-emerged ivory trade","D) poaching alone"],ans:"C) re-emerged ivory trade",exp:"'ivory trade...undermining conservation gains'.",audio:"Journalist: Ivory trade re-emerged through loopholes, undermining conservation gains since the 1990s."},

  reading: [
    {ctx:"Cognitive dissonance occurs when a person holds two contradictory beliefs, causing psychological discomfort. To relieve this, people change a belief, seek confirming information, or minimize the conflict.",q:"How do people resolve cognitive dissonance?",opts:["A) accept both beliefs","B) change a belief or seek confirming info","C) discuss it openly","D) ignore both beliefs"],ans:"B) change a belief or seek confirming info",exp:"'change one belief, seek confirming information'."},
    {ctx:"The gig economy offers flexibility but lacks job security. Critics argue it shifts financial risk from employers to workers.",q:"What is a criticism?",opts:["A) limits flexibility","B) shifts risk to workers","C) reduces innovation","D) increases corporate profits"],ans:"B) shifts risk to workers",exp:"'shifts financial risk from employers to workers'."},
    {ctx:"Quantum computing uses qubits that can exist in multiple states simultaneously — superposition — allowing certain problems to be solved exponentially faster.",q:"What is superposition?",opts:["A) a type of error","B) existing in multiple states at once","C) a storage method","D) a form of encryption"],ans:"B) existing in multiple states at once",exp:"'exist in multiple states simultaneously'."},
    {ctx:"The Milgram experiments showed ordinary people would administer dangerous shocks to strangers because an authority figure instructed them.",q:"What did the experiments reveal?",opts:["A) people are violent","B) authorities are dangerous","C) people comply with authority even harmfully","D) shock therapy works"],ans:"C) people comply with authority even harmfully",exp:"'ordinary people would...shocks...instructed by authority'."},
    {ctx:"Microfinance provides small loans to individuals in developing countries who lack bank access, helping start or expand small businesses.",q:"What is the main benefit?",opts:["A) replacing traditional banks","B) funding government projects","C) improving independence through small loans","D) reducing global debt"],ans:"C) improving independence through small loans",exp:"'improving economic independence'."},
    {ctx:"Genetic engineering modifies DNA to produce desired traits, offering promise in medicine and agriculture but raising ethical questions about consent and biodiversity.",q:"What ethical concern is mentioned?",opts:["A) its high cost","B) slow development","C) consent and biodiversity","D) lack of scientific interest"],ans:"C) consent and biodiversity",exp:"'consent, biodiversity'."},
    {ctx:"Dark matter emerged to explain gravitational effects unexplainable by visible matter. It makes up ~27% of the universe but has never been directly observed.",q:"Why was dark matter introduced?",opts:["A) explain light bending","B) explain unexplained gravity","C) describe black holes","D) explain expansion"],ans:"B) explain unexplained gravity",exp:"'gravitational effects...cannot be explained by visible matter'."},
    {ctx:"Colonialism left lasting consequences. Many post-colonial nations inherited borders ignoring ethnic divisions, contributing to conflicts. Economic exploitation left infrastructure gaps.",q:"What legacy do borders represent?",opts:["A) carefully designed","B) ignored ethnic divisions","C) promoted trade","D) strengthened identity"],ans:"B) ignored ethnic divisions",exp:"'borders that ignored ethnic and cultural divisions'."},
    {ctx:"Neuroplasticity — the brain's ability to form new neural connections — is most rapid in childhood but continues into adulthood.",q:"When is neuroplasticity most rapid?",opts:["A) old age","B) adulthood","C) childhood","D) at birth"],ans:"C) childhood",exp:"'most rapid in childhood'."},
    {ctx:"The tragedy of the commons: individual users acting in self-interest deplete shared resources even when it's not in anyone's long-term interest.",q:"What is the tragedy of the commons?",opts:["A) government failure","B) self-interest depleting shared resources","C) unequal distribution","D) corporate monopolies"],ans:"B) self-interest depleting shared resources",exp:"'individual users...deplete a shared resource'."},
    {ctx:"Behavioral economics challenges the assumption of human rationality, showing people are influenced by framing, loss aversion, and cognitive biases.",q:"What does it challenge?",opts:["A) saving money","B) market competition","C) the assumption of human rationality","D) growth models"],ans:"C) the assumption of human rationality",exp:"'challenges...assumption...humans are rational'."},
    {ctx:"The circular economy designs products for reuse, repair, and recycling — contrasting with the linear take-make-dispose model.",q:"What distinguishes a circular economy?",opts:["A) faster production","B) lower prices","C) designing for reuse and recycling","D) more fossil fuels"],ans:"C) designing for reuse and recycling",exp:"'designing products for reuse, repair, and recycling'."},
    {ctx:"Propaganda uses emotional language, selective information, and repetition to influence opinion. Democratic governments also use it during wartime.",q:"What technique does propaganda use?",opts:["A) objective analysis","B) emotional language and selective info","C) scientific evidence","D) public debate"],ans:"B) emotional language and selective info",exp:"'emotional language, selective information, repetition'."},
    {ctx:"Open-label placebos — where patients know they are taking placebos — can still be effective, challenging standard assumptions about the placebo effect.",q:"What is surprising about open-label placebos?",opts:["A) more expensive","B) work even when known as placebos","C) require larger doses","D) only work on children"],ans:"B) work even when known as placebos",exp:"'effective even when patients know'."},
    {ctx:"By 2050, two-thirds of the world's population will live in cities. Urbanization creates growth opportunities but intensifies challenges around housing and inequality.",q:"What challenge does urbanization intensify?",opts:["A) rural development","B) food production","C) housing and inequality","D) environmental restoration"],ans:"C) housing and inequality",exp:"'housing, infrastructure, and inequality'."},
    {ctx:"Civil disobedience is the deliberate, nonviolent refusal to comply with unjust laws. Gandhi and King demonstrated its effectiveness.",q:"What is civil disobedience?",opts:["A) violent protest","B) legal challenges","C) nonviolent refusal of unjust laws","D) peaceful negotiation"],ans:"C) nonviolent refusal of unjust laws",exp:"'deliberate, nonviolent refusal'."},
    {ctx:"Antibiotic resistance is accelerated by over-prescription, patient non-compliance, and agricultural use.",q:"What accelerates resistance?",opts:["A) improved sanitation","B) over-prescription and agricultural use","C) better vaccines","D) reduced travel"],ans:"B) over-prescription and agricultural use",exp:"'over-prescription...agricultural use'."},
    {ctx:"AI trained on historical data may perpetuate biases. Facial recognition shows higher error rates for darker-skinned individuals, raising fairness concerns.",q:"What concern is raised?",opts:["A) AI is too slow","B) AI perpetuates bias","C) AI is too expensive","D) AI cannot learn"],ans:"B) AI perpetuates bias",exp:"'perpetuate existing biases'."},
    {ctx:"The Flynn effect — rising IQ scores over the 20th century — is attributed to better nutrition, education, and abstract thinking demands.",q:"What explains the Flynn effect?",opts:["A) genetic evolution","B) better test design","C) improved nutrition and education","D) population growth"],ans:"C) improved nutrition and education",exp:"'improvements in nutrition, education'."},
    {ctx:"Geoengineering proposes large-scale interventions like reflecting sunlight or removing CO2. Critics warn of unintended consequences and governance challenges.",q:"What concern do critics raise?",opts:["A) too cheap","B) too slow","C) unintended consequences","D) too many scientists needed"],ans:"C) unintended consequences",exp:"'warn of unintended consequences'."},
    {ctx:"Watson and Crick published DNA's double helix in 1953, building on Rosalind Franklin's X-ray work. Franklin's contribution was not fully acknowledged in the 1962 Nobel Prize.",q:"What controversy surrounds the Nobel Prize?",opts:["A) the science was wrong","B) Franklin's contribution not acknowledged","C) it was shared unfairly","D) awarded too late"],ans:"B) Franklin's contribution not acknowledged",exp:"'not fully acknowledged'."},
    {ctx:"The greenhouse effect warms Earth naturally, but human activity has intensified it, driving temperatures above natural levels.",q:"How have humans affected it?",opts:["A) reduced it","B) intensified it","C) reversed it","D) no effect"],ans:"B) intensified it",exp:"'Human activity has intensified this effect'."},
    {ctx:"The 'hard problem of consciousness' asks why physical brain processes give rise to subjective experience — why there is 'something it is like' to perceive.",q:"What is the hard problem?",opts:["A) studying brain anatomy","B) explaining behavior","C) whether consciousness can be explained by physical processes","D) developing AI"],ans:"C) whether consciousness can be explained by physical processes",exp:"'whether consciousness can be fully explained by physical brain processes'."},
    {ctx:"Scientists warn we may be entering a sixth mass extinction, driven primarily by habitat destruction, pollution, invasive species, and climate change.",q:"What drives the potential sixth extinction?",opts:["A) natural climate cycles","B) volcanic activity","C) human-caused factors","D) ocean currents"],ans:"C) human-caused factors",exp:"'habitat destruction, pollution...climate change'."},
    {ctx:"Economic sanctions pressure behavior change but can harm ordinary citizens more than governments, according to critics.",q:"What criticism is mentioned?",opts:["A) cost too much","B) work too quickly","C) harm citizens more than governments","D) require military support"],ans:"C) harm citizens more than governments",exp:"'harm ordinary citizens more than governments'."},
    {ctx:"Cultural capital (Bourdieu): non-financial social assets — education, skills, networks — that help individuals advance in society.",q:"What is cultural capital?",opts:["A) artistic heritage","B) money from creative work","C) non-financial assets aiding social advancement","D) government education funding"],ans:"C) non-financial assets aiding social advancement",exp:"'non-financial social assets'."},
    {ctx:"Algorithms show users content they agree with, reinforcing existing beliefs in a feedback loop and creating echo chambers.",q:"What do algorithms reinforce?",opts:["A) diverse perspectives","B) scientific thinking","C) existing beliefs","D) critical analysis"],ans:"C) existing beliefs",exp:"'reinforcing existing beliefs'."},
    {ctx:"The Kyoto Protocol and Paris Agreement face enforcement challenges — signatory nations are not legally compelled to meet commitments.",q:"What challenge do they face?",opts:["A) lack of science","B) enforcement limitations","C) insufficient funding","D) UN opposition"],ans:"B) enforcement limitations",exp:"'not legally compelled to meet commitments'."},
    {ctx:"Ego depletion: willpower is a limited resource, depleted by use. Important decisions when mentally fatigued lead to poorer outcomes.",q:"What does ego depletion suggest?",opts:["A) willpower grows with use","B) willpower is unlimited","C) willpower is limited and depleted","D) fatigue has no effect"],ans:"C) willpower is limited and depleted",exp:"'willpower is a limited resource, depleted by use'."},
    {ctx:"Climate tipping points are thresholds beyond which systems undergo irreversible change — like collapse of the Greenland ice sheet.",q:"What characterizes a tipping point?",opts:["A) gradual reversible change","B) irreversible change beyond a threshold","C) predictable cycles","D) human-controlled processes"],ans:"B) irreversible change beyond a threshold",exp:"'thresholds beyond which systems undergo irreversible change'."}

  writing: [
    {q:"Fill in: 'The scientist ___ her findings at the conference last week.'",opts:["A) presents","B) presented","C) has presented","D) will present"],ans:"B) presented",exp:"Simple past for completed action."},
    {q:"Fill in: 'Not only ___ the experiment fail, but it caused damage.'",opts:["A) the experiment did","B) did the experiment","C) the experiment has","D) has the experiment"],ans:"B) did the experiment",exp:"Inversion after fronted 'Not only'."},
    {q:"Fill in: 'Rarely ___ such dedication in a student.'",opts:["A) I have seen","B) have I seen","C) I see","D) do I seen"],ans:"B) have I seen",exp:"Inversion after negative adverb 'Rarely'."},
    {q:"Fill in: 'The policy was introduced ___ reducing unemployment.'",opts:["A) in order to","B) so as","C) with a view to","D) so that"],ans:"C) with a view to",exp:"'With a view to' + gerund."},
    {q:"Fill in: 'Had the government acted sooner, the crisis ___ avoided.'",opts:["A) could be","B) could have been","C) would be","D) will have been"],ans:"B) could have been",exp:"3rd conditional passive."},
    {q:"Fill in: 'The committee is yet ___ a final decision.'",opts:["A) reaching","B) to reach","C) reached","D) having reached"],ans:"B) to reach",exp:"'Yet to' + infinitive."},
    {q:"Fill in: 'It was not until the 18th century ___ scientists fully understood gravity.'",opts:["A) when","B) where","C) that","D) which"],ans:"C) that",exp:"'It was not until...that' — cleft sentence."},
    {q:"Fill in: 'She works as though she ___ the only one who can solve it.'",opts:["A) is","B) was","C) were","D) has been"],ans:"C) were",exp:"As though + subjunctive 'were'."},
    {q:"Fill in: 'The report, ___ the committee had commissioned, was finally published.'",opts:["A) that","B) which","C) who","D) what"],ans:"B) which",exp:"Non-restrictive relative clause uses 'which'."},
    {q:"Fill in: 'I would have attended the lecture ___ I known about it.'",opts:["A) if","B) had","C) unless","D) provided"],ans:"B) had",exp:"Inverted 3rd conditional: Had + subject."},
    {q:"Fill in: 'The findings point ___ a strong correlation.'",opts:["A) at","B) for","C) toward","D) of"],ans:"C) toward",exp:"Point toward = indicate."},
    {q:"Fill in: 'Whether the proposal succeeds ___ on political will.'",opts:["A) depends","B) depend","C) is depending","D) will depend"],ans:"A) depends",exp:"Whether-clause as subject → singular verb."},
    {q:"Fill in: 'She is regarded ___ one of the most influential economists.'",opts:["A) like","B) as","C) for","D) to be"],ans:"B) as",exp:"Regarded as = considered to be."},
    {q:"Fill in: 'The more resources are invested, ___ the outcomes tend to be.'",opts:["A) better","B) the better","C) the more better","D) most better"],ans:"B) the better",exp:"Parallel double comparative."},
    {q:"Fill in: 'He speaks English fluently, ___ having lived abroad only two years.'",opts:["A) despite","B) although","C) however","D) even"],ans:"A) despite",exp:"Despite + noun phrase."},
    {q:"Fill in: 'The arguments ___ in the document are compelling.'",opts:["A) presenting","B) present","C) presented","D) to present"],ans:"C) presented",exp:"Past participial phrase = reduced relative clause."},
    {q:"Fill in: 'Linguists debate ___ language shapes thought or merely expresses it.'",opts:["A) that","B) what","C) whether","D) how"],ans:"C) whether",exp:"Whether = indirect yes/no question."},
    {q:"Fill in: 'The phenomenon ___ psychologists call the bystander effect occurs in crowds.'",opts:["A) which","B) what","C) that","D) where"],ans:"C) that",exp:"Restrictive relative clause uses 'that'."},

  reading: [
    {ctx:"The Anthropocene defines the epoch where human activity has become the dominant force shaping Earth. Scientists debate its precise start date, from the Industrial Revolution to the first nuclear tests.",q:"What is contested?",opts:["A) whether humans affect the planet","B) its precise start date","C) geology's definition","D) nuclear energy's role"],ans:"B) its precise start date",exp:"'Scientists debate its precise start date'."},
    {ctx:"Cognitive load theory: working memory has limited capacity. Instructional design should minimize extraneous load and maximize germane load that builds schemas.",q:"What is extraneous cognitive load?",opts:["A) useful schemas","B) information not contributing to learning","C) emotional stress","D) memory capacity"],ans:"B) information not contributing to learning",exp:"'information that doesn't contribute to learning'."},
    {ctx:"The trolley problem: most pull a lever to divert a trolley from five to one. But in a variant requiring physically pushing someone, most refuse — despite identical arithmetic.",q:"Why is the second variant psychologically different?",opts:["A) outcome is different","B) requires a physical act of harm","C) more people die","D) trolley moves differently"],ans:"B) requires a physical act of harm",exp:"The act of physically pushing, despite identical outcomes."},
    {ctx:"Secular stagnation: advanced economies face persistent low growth, low inflation, and low interest rates due to aging populations, inequality, and a global saving glut.",q:"What causes secular stagnation?",opts:["A) government overspending","B) aging populations and saving surplus","C) declining technology","D) trade deficits"],ans:"B) aging populations and saving surplus",exp:"'aging populations, rising inequality, and a global saving glut'."},
    {ctx:"The observer effect: measuring a quantum particle alters its state. The uncertainty principle: certain paired properties cannot both be precisely known simultaneously.",q:"How do they differ?",opts:["A) observer effect involves certainty","B) uncertainty principle applies to measurement only","C) observer effect = measuring changes state; uncertainty = simultaneous precision limits","D) same phenomenon"],ans:"C) observer effect = measuring changes state; uncertainty = simultaneous precision limits",exp:"Measuring changes state vs. simultaneous knowledge limits."},
    {ctx:"McLuhan's 'the medium is the message': communication medium characteristics shape society more profoundly than content. Television, internet, and print each restructure perception independently.",q:"What is McLuhan's claim?",opts:["A) content determines change","B) technology has no effect","C) the medium shapes society more than content","D) print is most powerful"],ans:"C) the medium shapes society more than content",exp:"'medium shapes society more profoundly than the content'."},
    {ctx:"Risk homeostasis: individuals maintain a constant acceptable risk level. Safety measures reduce perceived risk, leading people to take greater risks elsewhere — seatbelts may cause more reckless driving.",q:"What is the implication?",opts:["A) safety measures always reduce risk","B) they may lead to risk-taking elsewhere","C) they permanently change risk tolerance","D) ineffective without enforcement"],ans:"B) they may lead to risk-taking elsewhere",exp:"'compensate by taking greater risks elsewhere'."},
    {ctx:"Negative liberty: freedom from interference. Positive liberty: capacity and resources to act — freedom to achieve self-realization.",q:"How do they differ?",opts:["A) one is legal, one philosophical","B) one is freedom from interference, other is freedom to achieve","C) they are equivalent","D) one for states, one for individuals"],ans:"B) one is freedom from interference, other is freedom to achieve",exp:"'freedom from interference' vs. 'capacity to act'."},
    {ctx:"Post-truth: emotional appeals consistently outweigh facts in shaping opinion. The backfire effect: confronting people with contrary evidence can reinforce their beliefs.",q:"What is the backfire effect?",opts:["A) facts always change opinions","B) people abandon beliefs with evidence","C) contrary evidence reinforces beliefs","D) emotional appeals are dishonest"],ans:"C) contrary evidence reinforces beliefs",exp:"'people double down when confronted with contradictory evidence'."},
    {ctx:"The resource curse: countries with abundant natural resources tend to have less growth and worse development outcomes. Dutch disease — currency appreciation from resource exports — and elite capture are mechanisms.",q:"What is Dutch disease?",opts:["A) agricultural crisis","B) currency appreciation harming other sectors","C) environmental damage","D) political corruption"],ans:"B) currency appreciation harming other sectors",exp:"'currency appreciation caused by resource exports'."},
    {ctx:"Phenomenology (Husserl) studies the structure of conscious experience from a first-person perspective — how objects appear to consciousness, making subjective experience primary.",q:"What is phenomenology's primary subject?",opts:["A) the physical world","B) mathematical structures","C) subjective conscious experience","D) social institutions"],ans:"C) subjective conscious experience",exp:"'subjective experience as primary subject'."},
    {ctx:"Natural experiments arise from external events creating comparison conditions. Studying identical twins raised apart isolates genetic from environmental effects — highly valued where true randomization is ethically impossible.",q:"Why are natural experiments valued?",opts:["A) cheaper than lab experiments","B) provide randomization where true randomization is unethical","C) eliminate bias completely","D) require no statistics"],ans:"B) provide randomization where true randomization is unethical",exp:"'true randomization is often ethically impossible'."},
    {ctx:"Technological solutionism — every social problem has a technical fix — ignores the political and human dimensions of inequality and conflict. Algorithms cannot solve power imbalances.",q:"What is the criticism?",opts:["A) technology is too slow","B) misunderstands political and human dimensions","C) algorithms are too expensive","D) technology should not be in politics"],ans:"B) misunderstands political and human dimensions",exp:"'misunderstanding the political and human dimensions'."},
    {ctx:"Mancur Olson's logic of collective action: rational individuals may fail to act collectively. Large groups face a free-rider problem — individuals benefit without contributing.",q:"What is the free-rider problem?",opts:["A) transportation costs","B) benefiting from collective goods without contributing","C) too many leaders","D) refusing to join organizations"],ans:"B) benefiting from collective goods without contributing",exp:"'benefit from collective goods without contributing'."},
    {ctx:"Girard's mimetic theory: human desire is fundamentally imitative — we desire what others desire. This leads to rivalry and conflict, underlying myth, religion, and social violence.",q:"What is the basis of desire for Girard?",opts:["A) biological need","B) rational choice","C) imitation of others' desires","D) fear of deprivation"],ans:"C) imitation of others' desires",exp:"'desire is fundamentally imitative'."},
    {ctx:"Separation of powers — legislative, executive, judicial — prevents concentration of authority. Checks and balances allow each branch to limit the others, theoretically preventing tyranny.",q:"What is its purpose?",opts:["A) speed up governance","B) prevent concentration of authority","C) reduce government size","D) ensure economic stability"],ans:"B) prevent concentration of authority",exp:"'prevent the concentration of authority'."},
    {ctx:"Archaeoacoustics finds that many prehistoric sites — Stonehenge, Mayan temples — were designed to produce specific sound effects, suggesting ritual and sound were intertwined.",q:"What does this suggest?",opts:["A) astronomical observatories only","B) designed for specific sound effects","C) built for shelter","D) aligned with solar events only"],ans:"B) designed for specific sound effects",exp:"'designed to produce specific sound effects'."},
    {ctx:"The overjustification effect: external rewards for an intrinsically motivated activity reduce internal motivation. Children paid to draw showed less interest than those who drew voluntarily.",q:"What does it describe?",opts:["A) rewards always increase motivation","B) external rewards can reduce intrinsic motivation","C) children are easily bored","D) money is less motivating than praise"],ans:"B) external rewards can reduce intrinsic motivation",exp:"'external rewards...reduce internal motivation'."},
    {ctx:"The Copernican, Darwinian, and Freudian revolutions each displaced humanity — from the center of the universe, from special creation, and from control of its own mind.",q:"What is Freud's contribution?",opts:["A) the unconscious drives behavior","B) the ego is central","C) psychoanalysis replaced biology","D) the mind is rational"],ans:"A) the unconscious drives behavior",exp:"'displacing the ego from control of its own mind'."},
    {ctx:"Cities account for ~70% of global carbon emissions despite covering 2% of Earth's surface. Urban density can reduce per capita emissions through shared infrastructure and public transit.",q:"Why can density reduce emissions?",opts:["A) cities have fewer cars","B) shared infrastructure reduces per capita emissions","C) cities use only renewables","D) urban populations are smaller"],ans:"B) shared infrastructure reduces per capita emissions",exp:"'shared infrastructure, public transit'."},
    {ctx:"Externalities are costs or benefits for non-participants in a transaction. Negative externalities like pollution are underpriced, leading to overproduction. Pigouvian taxes internalize these costs.",q:"What is a Pigouvian tax designed to do?",opts:["A) raise revenue","B) reduce market size","C) internalize the costs of negative externalities","D) protect domestic industry"],ans:"C) internalize the costs of negative externalities",exp:"'Pigouvian taxes aim to internalize these costs'."},
    {ctx:"Cultural memory spans millennia through monuments, texts, and rituals; communicative memory is transmitted through personal interaction over roughly three generations.",q:"What distinguishes cultural from communicative memory?",opts:["A) cultural memory is always written","B) communicative memory spans longer","C) cultural memory spans millennia through monuments and rituals","D) communicative involves non-personal media"],ans:"C) cultural memory spans millennia through monuments and rituals",exp:"'preserved in monuments, texts, and rituals across millennia'."},
    {ctx:"Confirmation bias makes people apply disproportionate scrutiny to evidence they disagree with while readily accepting weak evidence supporting their position.",q:"What is a subtle feature described?",opts:["A) ignore all evidence","B) distrust experts","C) higher scrutiny to evidence against one's position","D) only affects politics"],ans:"C) higher scrutiny to evidence against one's position",exp:"'disproportionate scrutiny to arguments they disagree with'."},
    {ctx:"The Overton window describes the range of politically acceptable policies. Actors can shift it by introducing extreme positions that make previously radical ideas seem moderate.",q:"How can it be shifted?",opts:["A) by winning elections","B) by passing laws","C) introducing extreme positions that reframe the moderate","D) by media censorship"],ans:"C) introducing extreme positions that reframe the moderate",exp:"'introducing extreme positions that make radical ideas seem moderate'."},
    {ctx:"Epigenetic inheritance: environmentally induced changes to gene expression can be transmitted to offspring without altering DNA sequence — a form of acquired characteristics.",q:"What does it challenge?",opts:["A) existence of genes","B) only DNA sequence is inherited","C) natural selection","D) age of the Earth"],ans:"B) only DNA sequence is inherited",exp:"'changes to gene expression...transmitted...without altering DNA'."},
    {ctx:"Communitarianism challenges liberal individualism: the self is constituted by community — identities, values, and obligations are shaped by community membership, not chosen in isolation.",q:"What does it argue?",opts:["A) individuals have no obligations","B) identity is self-chosen","C) community constitutes the self","D) community is irrelevant to ethics"],ans:"C) community constitutes the self",exp:"'the self is constituted by community'."},
    {ctx:"Degrowth challenges the assumption that GDP growth is inherently good, arguing for reduced production in wealthy nations to achieve ecological sustainability.",q:"What does degrowth challenge?",opts:["A) role of technology","B) GDP growth as inherently good","C) trade agreements","D) environmental regulation"],ans:"B) GDP growth as inherently good",exp:"'challenging...GDP growth is inherently good'."},
    {ctx:"Broken windows theory: visible disorder — graffiti, broken windows — signals neglect and encourages crime. Critics argue it justified aggressive policing harming minorities.",q:"What do critics say?",opts:["A) doesn't reduce crime","B) too expensive","C) justifies policing harming minorities","D) promotes community engagement"],ans:"C) justifies policing harming minorities",exp:"'justify aggressive policing that disproportionately affects minority communities'."},
    {ctx:"Zoonotic diseases — jumping from animals to humans — account for ~75% of emerging infectious diseases. Habitat destruction, wildlife trade, and factory farming increase transmission risk.",q:"What increases risk?",opts:["A) improved sanitation","B) increased vaccination","C) habitat destruction and wildlife trade","D) travel restrictions"],ans:"C) habitat destruction and wildlife trade",exp:"'habitat destruction, wildlife trade, and factory farming'."},
    {ctx:"The naturalistic fallacy (G.E. Moore): deriving moral conclusions from natural facts — concluding that because something is natural it is good — conflates descriptive and normative claims.",q:"What is the naturalistic fallacy?",opts:["A) using science to guide ethics","B) assuming natural things are good","C) ignoring natural evidence","D) basing laws on religion"],ans:"B) assuming natural things are good",exp:"'because something is natural, it is therefore good'."}

    {q:"Fill in: 'The data, once ___,  revealed a clear pattern.'",opts:["A) analyzed","B) analyzing","C) was analyzed","D) had analyzed"],ans:"A) analyzed",exp:"Reduced temporal clause: 'once analyzed'."},
    {q:"Fill in: 'The further we move from the source, ___ reliable the data.'",opts:["A) less","B) the less","C) the least","D) lesser"],ans:"B) the less",exp:"Double comparative."},

    {q:"Fill in: 'There is little doubt ___ the policy had unintended consequences.'",opts:["A) which","B) what","C) whether","D) that"],ans:"D) that",exp:"'There is little doubt that'."},
    {q:"Fill in: 'He is ___ the most widely cited scholar in this field.'",opts:["A) by far","B) as far as","C) so far","D) far from"],ans:"A) by far",exp:"'By far' intensifies a superlative."},
    {q:"Fill in: 'Rather than ___ the source, the author paraphrases it.'",opts:["A) quote","B) quoting","C) to quote","D) quoted"],ans:"B) quoting",exp:"Rather than + gerund."},
    {q:"Fill in: '___ for the intervention, the patient's condition would have deteriorated.'",opts:["A) If not","B) Without","C) But","D) Except"],ans:"C) But",exp:"'But for' = if it had not been for."},
    {q:"Fill in: 'The revision took longer than ___.'",opts:["A) anticipating","B) it was anticipated","C) anticipated","D) was anticipated"],ans:"C) anticipated",exp:"Longer than anticipated = reduced comparative clause."},
    {q:"Fill in: 'The proposal is worth ___ on its merits.'",opts:["A) evaluate","B) to evaluate","C) evaluating","D) having evaluated"],ans:"C) evaluating",exp:"Worth + gerund."},
    {q:"Fill in: '___ its flaws, the model has proven predictive.'",opts:["A) Despite","B) Although","C) While","D) Because of"],ans:"A) Despite",exp:"Despite + noun phrase."},
    {q:"Fill in: 'The study failed to account ___ confounding variables.'",opts:["A) about","B) on","C) of","D) for"],ans:"D) for",exp:"Account for = include or explain."},
    {q:"Fill in: 'Much depends on ___ the reform is implemented gradually or rapidly.'",opts:["A) that","B) whether","C) how","D) what"],ans:"B) whether",exp:"Whether...or = indirect question."},
    {q:"Fill in: 'The argument would be stronger ___ the author had addressed counterevidence.'",opts:["A) if","B) had","C) unless","D) although"],ans:"A) if",exp:"Second conditional: would be stronger if + past simple."},
    {q:"Fill in: 'The analysis ___ on what the data does not show, as much as what it does.'",opts:["A) relies","B) insists","C) turns","D) focuses"],ans:"C) turns",exp:"'Turns on' = depends critically on."},
    {q:"Fill in: 'The author argues, ___ some justification, that institutions resist change.'",opts:["A) with","B) for","C) by","D) from"],ans:"A) with",exp:"'With some justification' = parenthetical qualifier."},
    {q:"Fill in: 'The assumption, ___ it goes unquestioned, shapes all subsequent analysis.'",opts:["A) although","B) as long as","C) once","D) because"],ans:"C) once",exp:"'Once it goes unquestioned' = from the moment accepted."},
    {q:"Fill in: 'The theory is elegant but ___ on an unverifiable premise.'",opts:["A) relies","B) relying","C) relied","D) to rely"],ans:"A) relies",exp:"Main clause requires finite verb."},
    {q:"Fill in: 'It is difficult to overstate ___ consequential this decision was.'",opts:["A) how","B) what","C) that","D) which"],ans:"A) how",exp:"'How consequential' = exclamatory nominal clause."}

  listening: [

    {ctx:"Philosopher: Hegel's dialectic proceeds through thesis, antithesis, and synthesis — each contradiction resolved into a higher unity that becomes the new thesis.",q:"What is the endpoint of each dialectical movement?",opts:["A) the original thesis","B) permanent antithesis","C) a synthesis that becomes the new thesis","D) resolution without contradiction"],ans:"C) a synthesis that becomes the new thesis",exp:"'synthesis...itself becomes the new thesis'.",audio:"Philosopher: Hegel's dialectic moves through thesis, antithesis, and synthesis — each contradiction resolved into a higher unity that becomes the new thesis."},
    {ctx:"Theorist: Foucault argued that power is not held by individuals or states but is diffuse — embedded in discourses, institutions, and practices that shape what we can think and do.",q:"Where does Foucault locate power?",opts:["A) exclusively in governments","B) in individual leaders","C) in discourses and institutions","D) in economic systems alone"],ans:"C) in discourses and institutions",exp:"'embedded in discourses, institutions, and practices'.",audio:"Theorist: Foucault argued power is not held by individuals but is diffuse — embedded in discourses, institutions, and practices."},
    {ctx:"Literary theorist: Derrida's deconstruction reveals that texts undermine their own claims to stable meaning — every text contains traces of what it excludes.",q:"What does deconstruction reveal?",opts:["A) texts always have clear meaning","B) texts undermine their own stable meaning","C) texts require expert interpretation","D) texts reflect authorial intent precisely"],ans:"B) texts undermine their own stable meaning",exp:"'undermine their own claims to stable meaning'.",audio:"Literary theorist: Derrida's deconstruction reveals texts undermine their own stable meaning — every text contains traces of what it excludes."},
    {ctx:"Scientist: Dark energy accounts for ~68% of the universe and drives accelerating expansion, yet its nature remains entirely unknown.",q:"What is unknown about dark energy?",opts:["A) its proportion","B) its effect on expansion","C) its fundamental nature","D) its discovery date"],ans:"C) its fundamental nature",exp:"'its nature remains entirely unknown'.",audio:"Scientist: Dark energy accounts for 68 percent of the universe and drives accelerating expansion, yet its nature remains entirely unknown."},
    {ctx:"Economist: Veblen goods see demand rise as price rises — luxury items consumed as status signals where the high price itself is the point.",q:"What characterizes Veblen goods?",opts:["A) become cheaper over time","B) demand rises with price due to status signaling","C) essential necessities","D) lose value quickly"],ans:"B) demand rises with price due to status signaling",exp:"'demand increases as price rises...status signals'.",audio:"Economist: Veblen goods see demand rise with price — luxury items consumed as status signals where the high price itself is the point."},
    {ctx:"Linguist: Pragmatics studies how context shapes meaning beyond literal words. 'Can you pass the salt?' is grammatically a question about ability but pragmatically a request.",q:"What does pragmatics study?",opts:["A) grammar rules","B) vocabulary acquisition","C) how context shapes meaning","D) the history of languages"],ans:"C) how context shapes meaning",exp:"'how context shapes meaning beyond literal words'.",audio:"Linguist: Pragmatics studies how context shapes meaning beyond literal words. Can you pass the salt is grammatically a question but pragmatically a request."},
    {ctx:"Political philosopher: Libertarianism holds individual freedom is supreme — the only legitimate state action is preventing individuals from harming others.",q:"What do libertarians consider the only legitimate state action?",opts:["A) redistributing wealth","B) providing public services","C) preventing harm to others","D) regulating markets"],ans:"C) preventing harm to others",exp:"'only legitimate state action is preventing harm to others'.",audio:"Political philosopher: Libertarianism holds individual freedom is supreme — the only legitimate state action is preventing harm to others."},
    {ctx:"Critic: The uncanny valley: discomfort humans feel when an artificial figure is almost but not quite human — close enough for recognition but wrong enough for unease.",q:"What causes the discomfort?",opts:["A) figures that look too robotic","B) figures almost but not quite human","C) figures that are too lifelike","D) figures that move too quickly"],ans:"B) figures almost but not quite human",exp:"'almost, but not quite, human'.",audio:"Critic: The uncanny valley describes discomfort when an artificial figure is almost but not quite human — close enough for recognition but wrong enough for unease."},
    {ctx:"Anthropologist: Lévi-Strauss argued myths across cultures share deep structural oppositions — raw and cooked, nature and culture — revealing universal cognitive patterns.",q:"What did Lévi-Strauss discover?",opts:["A) random cultural variation","B) universal deep structural oppositions","C) evidence of migration","D) religious universalism"],ans:"B) universal deep structural oppositions",exp:"'deep structural oppositions...universal cognitive patterns'.",audio:"Anthropologist: Lévi-Strauss argued myths share deep structural oppositions — raw and cooked, nature and culture — revealing universal cognitive patterns."},
    {ctx:"Neurophilosopher: Eliminative materialism argues folk concepts like 'belief' and 'desire' will be replaced by neuroscientific descriptions, just as 'fire' was replaced by 'oxidation'.",q:"What does eliminative materialism predict?",opts:["A) psychology absorbs neuroscience","B) folk concepts replaced by brain-state descriptions","C) free will confirmed","D) consciousness explained by 2100"],ans:"B) folk concepts replaced by brain-state descriptions",exp:"'folk concepts...replaced by neuroscientific descriptions'.",audio:"Neurophilosopher: Eliminative materialism argues folk concepts like belief and desire will be replaced by neuroscientific descriptions, just as fire was replaced by oxidation."},
    {ctx:"Economist: Creative destruction (Schumpeter) — innovation destroys old industries while creating new ones — essential to capitalism's dynamism but disruptive to workers.",q:"What makes creative destruction disruptive?",opts:["A) reduces innovation","B) destroys old industries and disrupts workers","C) increases prices","D) only benefits corporations"],ans:"B) destroys old industries and disrupts workers",exp:"'deeply disruptive to workers and communities'.",audio:"Economist: Schumpeter's creative destruction describes how innovation destroys old industries while creating new ones — essential to capitalism but disruptive to workers."},
    {ctx:"Sociologist: Goffman's dramaturgy presents social life as performance — front stage behavior in public, back stage in private, constantly negotiating identity.",q:"What does Goffman compare social life to?",opts:["A) a scientific experiment","B) a military operation","C) a theatrical performance","D) a legal process"],ans:"C) a theatrical performance",exp:"'social life as performance'.",audio:"Sociologist: Goffman's dramaturgy presents social life as performance — front stage public behavior and back stage private behavior."},
    {ctx:"Philosopher of science: Popper argued theories must be falsifiable — a theory that cannot be proven wrong by any conceivable evidence is not scientific but metaphysical.",q:"What makes a theory scientific for Popper?",opts:["A) verifiable","B) falsifiable","C) mathematical","D) widely accepted"],ans:"B) falsifiable",exp:"'theories must be falsifiable'.",audio:"Philosopher: Popper argued scientific theories must be falsifiable — a theory that cannot be proven wrong is metaphysical, not scientific."},
    {ctx:"Political theorist: Gramsci extends Marx to include cultural superstructure — the dominant class maintains power by shaping the values and worldview of the oppressed.",q:"How does Gramsci extend Marxism?",opts:["A) economic analysis only","B) military theory","C) including cultural values and worldview","D) focusing on rural workers"],ans:"C) including cultural values and worldview",exp:"'shaping values and worldview of the oppressed'.",audio:"Political theorist: Gramsci extends Marx to cultural superstructure — the dominant class maintains power by shaping the values and worldview of the oppressed."},
    {ctx:"Physicist: The second law of thermodynamics states entropy always increases in a closed system, giving time its directionality — the arrow flows from order to disorder.",q:"What gives time its directionality?",opts:["A) speed of light","B) gravitational force","C) the increase of entropy","D) nuclear decay"],ans:"C) the increase of entropy",exp:"'arrow of time flows from order to disorder'.",audio:"Physicist: The second law states entropy always increases, giving time its directionality — the arrow flows from order to disorder."},
    {ctx:"Literary critic: Bakhtin's dialogic imagination: meaning emerges through interaction — every utterance responds to previous speech and anticipates future response, making language social.",q:"What is the central claim?",opts:["A) meaning is fixed","B) language is primarily individual","C) meaning emerges through interaction","D) grammar determines meaning"],ans:"C) meaning emerges through interaction",exp:"'meaning is never fixed but emerges through interaction'.",audio:"Literary critic: Bakhtin's dialogic imagination holds meaning emerges through interaction — every utterance responds to previous speech and anticipates future response."},
    {ctx:"Bioethicist: Double effect holds that harm is permissible if foreseen but not intended, the good is proportionate, and there is sufficient reason.",q:"When is a harmful action permissible?",opts:["A) when no harm occurs","B) when harm is intended for good","C) when harm is foreseen but not intended and proportionate","D) when experts approve"],ans:"C) when harm is foreseen but not intended and proportionate",exp:"'foreseen but not intended, the good is proportionate'.",audio:"Bioethicist: Under double effect, harm is permissible if foreseen but not intended, the good is proportionate, and there is sufficient reason."},
