    {ctx:"To apply for the scholarship, candidates must submit a completed form, two reference letters, and a 500-word personal statement by 30 April.",q:"What is the deadline for the scholarship?",opts:["A) 1 April","B) 15 April","C) 30 April","D) 1 May"],ans:"C) 30 April",exp:"'by 30 April'."}
  ],
  writing: [
    {q:"Fill in: 'I ___ to the cinema last Saturday.'",opts:["A) go","B) gone","C) went","D) was go"],ans:"C) went",exp:"Simple past of go = went."},
    {q:"Fill in: 'She has ___ finished her homework.'",opts:["A) already","B) yet","C) still","D) just yet"],ans:"A) already",exp:"Already used with present perfect in positive sentences."},
    {q:"Fill in: 'If you ___ harder, you will pass the exam.'",opts:["A) study","B) studied","C) will study","D) are studying"],ans:"A) study",exp:"1st conditional: if + present simple."},
    {q:"Fill in: 'The report ___ by the manager yesterday.'",opts:["A) writes","B) is written","C) was written","D) written"],ans:"C) was written",exp:"Passive past simple: was + past participle."},
    {q:"Fill in: 'He speaks English ___ than his brother.'",opts:["A) more fluent","B) fluenter","C) more fluently","D) most fluently"],ans:"C) more fluently",exp:"Comparative adverb: more + adverb."},
    {q:"Fill in: 'We haven't seen each other ___ last summer.'",opts:["A) for","B) since","C) during","D) ago"],ans:"B) since",exp:"Since + point in time with present perfect."},
    {q:"Fill in: 'You ___ smoke inside the building.'",opts:["A) don't have","B) mustn't","C) shouldn't have","D) needn't"],ans:"B) mustn't",exp:"Mustn't = prohibition."},
    {q:"Fill in: '___ a long trip, she arrived safely.'",opts:["A) Despite of","B) Although","C) Despite","D) Even"],ans:"C) Despite",exp:"Despite + noun/gerund (no 'of')."},
    {q:"Fill in: 'By the time I arrived, the film ___.'",opts:["A) starts","B) has started","C) had started","D) was start"],ans:"C) had started",exp:"Past perfect for earlier past event."},
    {q:"Fill in: 'She asked if I ___ help her move.'",opts:["A) can","B) could","C) will","D) shall"],ans:"B) could",exp:"Reported speech: can → could."}
  ]
},

// ─────────────────────────── B1 — Intermediate ───────────────────────────
"B1": {
  _meta: { label:"B1", desc:"Intermediate", equiv:"CEFR B1", ielts:"4.0–5.0", toeic:"550–784" },
  vocab: [
    {q:"'Inevitably' means:",opts:["A) surprisingly","B) certainly going to happen","C) possibly","D) rarely"],ans:"B) certainly going to happen",exp:"Inevitably = unavoidably, as expected."},
    {q:"'Acknowledge' means:",opts:["A) to deny","B) to recognize or admit","C) to ignore","D) to celebrate"],ans:"B) to recognize or admit",exp:"Acknowledge = accept truth of something."},
    {q:"What does 'negotiate' mean?",opts:["A) to refuse firmly","B) to discuss to reach agreement","C) to argue aggressively","D) to demand immediately"],ans:"B) to discuss to reach agreement",exp:"Negotiate = reach agreement through discussion."},
    {q:"'Controversial' describes something:",opts:["A) universally agreed upon","B) causing disagreement","C) very complicated","D) very old"],ans:"B) causing disagreement",exp:"Controversial = causing public debate."},
    {q:"'Implement' means:",opts:["A) to plan","B) to ignore","C) to put into action","D) to cancel"],ans:"C) to put into action",exp:"Implement = carry out, put into effect."},
    {q:"'Adequate' means:",opts:["A) insufficient","B) excessive","C) satisfactory, enough","D) outstanding"],ans:"C) satisfactory, enough",exp:"Adequate = just sufficient."},
    {q:"What does 'perspective' mean?",opts:["A) a type of drawing","B) a particular point of view","C) a legal document","D) a scientific theory"],ans:"B) a particular point of view",exp:"Perspective = a way of seeing or thinking about something."},
    {q:"'Sustain' means:",opts:["A) to destroy gradually","B) to maintain over time","C) to start quickly","D) to reduce"],ans:"B) to maintain over time",exp:"Sustain = keep going, support."},
    {q:"'Contradict' means:",opts:["A) to agree with","B) to support strongly","C) to say the opposite of","D) to misunderstand"],ans:"C) to say the opposite of",exp:"Contradict = assert the opposite."},
    {q:"'Initiative' refers to:",opts:["A) a final result","B) a new plan or action to solve a problem","C) a type of punishment","D) a scientific experiment"],ans:"B) a new plan or action to solve a problem",exp:"Initiative = taking the first step; a plan."}
  ],
  listening: [
    {ctx:"Interviewer: What would you say is your greatest weakness? Candidate: I sometimes take on too much work at once, but I've been learning to prioritize better.",q:"What weakness does the candidate mention?",opts:["A) poor communication","B) taking on too much work","C) missing deadlines","D) difficulty working in teams"],ans:"B) taking on too much work",exp:"'take on too much work at once'.",audio:"Interviewer: What's your greatest weakness? Candidate: I sometimes take on too much work, but I'm learning to prioritize."},
    {ctx:"Professor: The essay must be submitted by Friday noon. Late submissions will be penalized 10 marks per day. Extensions must be requested 48 hours in advance.",q:"How much is the daily late penalty?",opts:["A) 5 marks","B) 8 marks","C) 10 marks","D) 15 marks"],ans:"C) 10 marks",exp:"'10 marks per day'.",audio:"Professor: Essay due Friday noon. Late submissions penalized 10 marks per day. Extensions need 48 hours notice."},
    {ctx:"Man: The new environmental policy requires all companies to reduce carbon emissions by 20% within three years. Critics argue this timeline is too ambitious.",q:"What do critics think about the timeline?",opts:["A) it's too long","B) it's unrealistic","C) it's not ambitious enough","D) it's unfair to small companies"],ans:"B) it's unrealistic",exp:"'Critics argue this timeline is too ambitious' = unrealistic.",audio:"Man: Companies must cut carbon emissions 20% in three years. Critics say the timeline is too ambitious."},
    {ctx:"Woman: I'd recommend the museum's guided tour. It takes about two hours and covers the ancient history section, which is fascinating. You can book online or at the entrance.",q:"How long does the guided tour take?",opts:["A) 1 hour","B) 1.5 hours","C) 2 hours","D) 3 hours"],ans:"C) 2 hours",exp:"'takes about two hours'.",audio:"Woman: The guided tour takes two hours and covers ancient history. Book online or at entrance."},
    {ctx:"Radio presenter: The unemployment rate has fallen to its lowest level in a decade, reaching just 4.2%. Economists attribute this to growth in the technology and service sectors.",q:"What caused the fall in unemployment?",opts:["A) government investment","B) manufacturing growth","C) tech and service sector growth","D) reduced working hours"],ans:"C) tech and service sector growth",exp:"'growth in the technology and service sectors'.",audio:"Presenter: Unemployment fell to 4.2%, its lowest in a decade, due to growth in technology and service sectors."},
    {ctx:"Manager: We're launching a new customer feedback system next quarter. All team members will need to complete a two-hour training session beforehand.",q:"What must team members do before the launch?",opts:["A) take a written exam","B) attend a two-hour training","C) read the manual","D) meet with clients"],ans:"B) attend a two-hour training",exp:"'complete a two-hour training session'.",audio:"Manager: New feedback system launches next quarter. All staff need to complete two-hour training first."},
    {ctx:"Student: I'm struggling with the academic writing style. Tutor: The key issues I see are your paragraph structure and the lack of hedging language. Let's work on those first.",q:"What are the student's main writing problems?",opts:["A) grammar and spelling","B) paragraph structure and hedging","C) vocabulary and length","D) referencing and formatting"],ans:"B) paragraph structure and hedging",exp:"'paragraph structure and the lack of hedging language'.",audio:"Student: I'm struggling with academic writing. Tutor: Key issues are paragraph structure and lack of hedging language."},
    {ctx:"Presenter: The survey found that 68% of employees feel their contributions are not recognized. This is significantly higher than last year's 54%.",q:"How did the result change from last year?",opts:["A) fell by 14%","B) stayed the same","C) rose by 14%","D) rose by 68%"],ans:"C) rose by 14%",exp:"68% - 54% = 14% increase.",audio:"Presenter: 68% of employees feel unrecognized, up from last year's 54%."},
    {ctx:"Woman: I've decided to switch careers. I've been an accountant for eight years, but I want to retrain as a teacher. Man: That's a big change. What motivated you?",q:"How long has the woman been an accountant?",opts:["A) 4 years","B) 6 years","C) 8 years","D) 10 years"],ans:"C) 8 years",exp:"'an accountant for eight years'.",audio:"Woman: I've been an accountant for eight years but want to retrain as a teacher."},
    {ctx:"Lecturer: Globalisation has undoubtedly brought economic benefits, but it has also led to cultural homogenisation and has increased inequality between and within nations.",q:"What negative effect of globalisation is mentioned?",opts:["A) environmental damage","B) political instability","C) increased inequality","D) reduced trade"],ans:"C) increased inequality",exp:"'increased inequality between and within nations'.",audio:"Lecturer: Globalisation brought economic benefits but also increased inequality between and within nations."}
  ],
  reading: [
    {ctx:"The concept of 'slow food' emerged in Italy in the 1980s as a reaction to the fast food industry. It promotes locally sourced ingredients, traditional cooking methods, and taking time to enjoy meals. The movement has since spread to over 160 countries.",q:"What was 'slow food' a reaction to?",opts:["A) poor nutrition","B) expensive restaurants","C) the fast food industry","D) global food shortages"],ans:"C) the fast food industry",exp:"'as a reaction to the fast food industry'."},
    {ctx:"Remote work has transformed urban property markets. With fewer people needing to commute daily, demand for city centre apartments has fallen, while properties in suburban and rural areas have become more desirable. Estate agents report a 25% rise in countryside sales.",q:"What has happened to rural property demand?",opts:["A) it has fallen sharply","B) it has stayed the same","C) it has increased","D) it is unpredictable"],ans:"C) it has increased",exp:"'properties in suburban and rural areas have become more desirable'."},
    {ctx:"Sleep deprivation affects cognitive function in ways similar to alcohol intoxication. Studies show that being awake for 17 hours impairs performance to the same degree as a blood alcohol level of 0.05%.",q:"What does sleep deprivation compare to?",opts:["A) stress","B) poor diet","C) alcohol intoxication","D) physical exhaustion"],ans:"C) alcohol intoxication",exp:"'affects cognitive function in ways similar to alcohol intoxication'."},
    {ctx:"Microplastics have been detected in human blood for the first time, according to a study published in 2022. The particles, smaller than 5mm, enter the body through food, water, and even air. Researchers warn of potential long-term health effects.",q:"How do microplastics enter the human body?",opts:["A) through physical contact only","B) through food, water, and air","C) through contaminated soil","D) through chemical exposure"],ans:"B) through food, water, and air",exp:"'enter the body through food, water, and even air'."},
    {ctx:"Cognitive Behavioural Therapy (CBT) is widely used to treat anxiety and depression. Unlike medication, it focuses on changing thought patterns and behaviours. Research indicates it can be as effective as antidepressants for mild to moderate depression.",q:"How does CBT compare to medication for mild depression?",opts:["A) it is less effective","B) it has more side effects","C) it can be equally effective","D) it works faster"],ans:"C) it can be equally effective",exp:"'can be as effective as antidepressants'."},
    {ctx:"The sharing economy, exemplified by platforms like Airbnb and Uber, has disrupted traditional industries. However, critics argue it creates precarious working conditions and undermines regulated businesses that must comply with strict safety and tax rules.",q:"What criticism of the sharing economy is mentioned?",opts:["A) it is too expensive","B) it reduces innovation","C) it creates precarious work conditions","D) it wastes resources"],ans:"C) it creates precarious work conditions",exp:"'creates precarious working conditions'."},
    {ctx:"Languages are disappearing at an alarming rate. Linguists estimate that of the approximately 7,000 languages currently spoken, half will be extinct by the end of this century. Most at risk are minority languages without official recognition.",q:"Which languages are most at risk?",opts:["A) all major world languages","B) European languages","C) minority languages without official recognition","D) languages with small written traditions"],ans:"C) minority languages without official recognition",exp:"'minority languages without official recognition'."},
    {ctx:"A recent study found that children who participate in team sports develop better social skills and show higher levels of resilience than those who do not. However, the benefits depend heavily on the quality of coaching received.",q:"What determines how beneficial sport is for children?",opts:["A) the type of sport","B) the coaching quality","C) the child's age","D) the frequency of practice"],ans:"B) the coaching quality",exp:"'depend heavily on the quality of coaching received'."},
    {ctx:"Urban green spaces — parks, gardens, and tree-lined streets — have been shown to reduce stress, lower blood pressure, and improve mental wellbeing. Yet urban development continues to reduce the availability of such spaces in many cities.",q:"What problem is highlighted?",opts:["A) green spaces increase crime","B) green spaces are too expensive","C) urban development is reducing green spaces","D) people don't use green spaces enough"],ans:"C) urban development is reducing green spaces",exp:"'urban development continues to reduce the availability of such spaces'."},
    {ctx:"The gig economy refers to a labour market characterised by short-term contracts and freelance work. While it offers flexibility, workers often lack the benefits of permanent employment such as sick pay, pension contributions, and job security.",q:"What is a disadvantage of gig economy work?",opts:["A) lower pay","B) less flexibility","C) lack of employment benefits","D) longer working hours"],ans:"C) lack of employment benefits",exp:"'workers often lack the benefits of permanent employment'."}
  ],
  writing: [
    {q:"Fill in: 'Not only ___ she talented, but she also works extremely hard.'",opts:["A) is","B) does","C) was","D) has"],ans:"A) is",exp:"Inversion after 'not only': Not only + auxiliary + subject."},
    {q:"Fill in: 'The project ___ be completed by Friday at the latest.'",opts:["A) has to","B) ought","C) supposed","D) better"],ans:"A) has to",exp:"Has to = obligation/necessity."},
    {q:"Fill in: 'Hardly ___ I sat down when the phone rang.'",opts:["A) had","B) have","C) did","D) was"],ans:"A) had",exp:"Inversion after 'hardly': Hardly had + subject + past participle."},
    {q:"Fill in: 'The new policy aims ___ reduce carbon emissions by 30%.'",opts:["A) at","B) for","C) to","D) in"],ans:"C) to",exp:"Aim + to-infinitive."},
    {q:"Fill in: 'I'd rather you ___ tell anyone about this.'",opts:["A) don't","B) didn't","C) won't","D) wouldn't"],ans:"B) didn't",exp:"I'd rather + subject + past simple (subjunctive)."},
    {q:"Fill in: 'It's high time we ___ about our environmental impact.'",opts:["A) think","B) thinking","C) thought","D) will think"],ans:"C) thought",exp:"It's high time + past simple (subjunctive)."},
    {q:"Fill in: 'He is said ___ one of the most influential scientists of his generation.'",opts:["A) being","B) to be","C) that he is","D) is"],ans:"B) to be",exp:"Subject + is said + to-infinitive (passive reporting structure)."},
    {q:"Fill in: 'Despite ___ prepared thoroughly, she found the interview very challenging.'",opts:["A) having","B) have","C) she had","D) being"],ans:"A) having",exp:"Despite + having + past participle."},
    {q:"Fill in: 'The results were ___ better than expected.'",opts:["A) considerable","B) considerably","C) consider","D) considering"],ans:"B) considerably",exp:"Adverb modifies adjective: considerably better."},
    {q:"Fill in: '___ the economic benefits, many residents oppose the new development.'",opts:["A) Despite of","B) Although","C) Notwithstanding","D) Even if"],ans:"C) Notwithstanding",exp:"Notwithstanding = despite (formal connector)."}
  ]
},

// ─────────────────────────── B2 — Upper-Intermediate ───────────────────────────
"B2": {
  _meta: { label:"B2", desc:"Upper-Intermediate", equiv:"CEFR B2", ielts:"5.5–6.5", toeic:"785–899" },
  vocab: [
    {q:"'Mitigate' means:",opts:["A) to worsen","B) to reduce the severity of","C) to fully eliminate","D) to investigate"],ans:"B) to reduce the severity of",exp:"Mitigate = lessen, make less severe."},
    {q:"'Albeit' is used to mean:",opts:["A) therefore","B) however","C) even though","D) as a result"],ans:"C) even though",exp:"Albeit = although, even if (concessive conjunction)."},
    {q:"'Pragmatic' describes someone who is:",opts:["A) idealistic and theoretical","B) practical and realistic","C) emotional and sensitive","D) very optimistic"],ans:"B) practical and realistic",exp:"Pragmatic = dealing with things sensibly."},
    {q:"'Nuanced' means:",opts:["A) black and white","B) very simple","C) showing subtle differences","D) extremely loud"],ans:"C) showing subtle differences",exp:"Nuanced = having fine distinctions."},
    {q:"'Exacerbate' means:",opts:["A) to solve","B) to explain in detail","C) to make worse","D) to measure accurately"],ans:"C) to make worse",exp:"Exacerbate = intensify a problem."},
    {q:"'Concurrent' means:",opts:["A) happening in sequence","B) happening at the same time","C) connected by cause","D) opposing each other"],ans:"B) happening at the same time",exp:"Concurrent = simultaneous."},
    {q:"'Rhetoric' refers to:",opts:["A) a type of logical argument","B) persuasive language use","C) scientific methodology","D) ethical principles"],ans:"B) persuasive language use",exp:"Rhetoric = the art of persuasive speaking/writing."},
    {q:"'Tenuous' means:",opts:["A) very strong","B) very important","C) weak and uncertain","D) very detailed"],ans:"C) weak and uncertain",exp:"Tenuous = flimsy, not well-supported."},
    {q:"'Holistic' describes an approach that:",opts:["A) focuses on one part only","B) considers the whole system","C) uses only data","D) ignores context"],ans:"B) considers the whole system",exp:"Holistic = considering all parts together."},
    {q:"'Paradigm' means:",opts:["A) a simple rule","B) a typical example or model","C) a complex equation","D) a political system"],ans:"B) a typical example or model",exp:"Paradigm = a standard example or framework."}
  ],
  listening: [
    {ctx:"Economist: The data suggests a correlation between urban density and innovation output. However, causality is difficult to establish — thriving cities may attract talent rather than create it.",q:"What is the economist's main caveat?",opts:["A) the data is unreliable","B) causality is hard to prove","C) urban density is declining","D) innovation cannot be measured"],ans:"B) causality is hard to prove",exp:"'causality is difficult to establish'.",audio:"Economist: There's correlation between urban density and innovation, but causality is hard to establish."},
    {ctx:"Policy Advisor: The carbon tax proposal faces resistance from industry groups who argue it will raise consumer prices and threaten jobs, despite evidence that comparable policies elsewhere have had negligible economic impact.",q:"What does the evidence suggest?",opts:["A) the tax will raise prices","B) jobs will be lost","C) economic impact has been minimal elsewhere","D) the policy has failed before"],ans:"C) economic impact has been minimal elsewhere",exp:"'comparable policies elsewhere have had negligible economic impact'.",audio:"Advisor: Industry groups oppose the carbon tax, but evidence shows comparable policies elsewhere had negligible economic impact."},
    {ctx:"Academic: What distinguishes expertise from mere competence is the ability to recognise not just what you know, but the boundaries of your knowledge — what epistemologists call metacognition.",q:"What defines expertise according to the academic?",opts:["A) knowing large amounts of information","B) knowing the limits of one's knowledge","C) being able to teach others","D) gaining formal qualifications"],ans:"B) knowing the limits of one's knowledge",exp:"'recognise not just what you know, but the boundaries'.",audio:"Academic: Expertise means recognising the boundaries of your knowledge — what epistemologists call metacognition."},
    {ctx:"Journalist: Critics of the proposed merger argue it would give one company undue control over 60% of the market, stifling competition and ultimately harming consumers.",q:"What is the main concern about the merger?",opts:["A) it will reduce employment","B) it will increase prices immediately","C) one company will dominate the market","D) it violates international law"],ans:"C) one company will dominate the market",exp:"'undue control over 60% of the market'.",audio:"Journalist: Critics say the merger gives one company 60% market control, stifling competition and harming consumers."},
    {ctx:"Researcher: Our longitudinal study tracked 2,000 participants over 20 years. We found that early childhood reading habits were the strongest predictor of adult literacy outcomes, stronger even than socioeconomic background.",q:"What was the strongest predictor of adult literacy?",opts:["A) socioeconomic background","B) quality of schooling","C) early childhood reading habits","D) parental education level"],ans:"C) early childhood reading habits",exp:"'early childhood reading habits were the strongest predictor'.",audio:"Researcher: Early childhood reading habits were the strongest predictor of adult literacy, stronger than socioeconomic background."},
    {ctx:"Philosopher: Utilitarianism evaluates actions solely by their consequences — the greatest good for the greatest number. But this framework struggles with cases where harming one person could benefit many.",q:"What is the limitation of utilitarianism mentioned?",opts:["A) it ignores intentions","B) it is too complex","C) harming one to benefit many is problematic","D) it requires too much data"],ans:"C) harming one to benefit many is problematic",exp:"'struggles with cases where harming one person could benefit many'.",audio:"Philosopher: Utilitarianism maximises overall good, but struggles when harming one benefits many."},
    {ctx:"Business analyst: The company's pivot to subscription-based revenue has been transformative. Recurring income has reduced their vulnerability to market volatility, though the transition period was costly.",q:"What benefit did the subscription model bring?",opts:["A) higher profit margins","B) reduced market vulnerability","C) lower operating costs","D) increased customer satisfaction"],ans:"B) reduced market vulnerability",exp:"'reduced their vulnerability to market volatility'.",audio:"Analyst: Subscription revenue reduced the company's vulnerability to market volatility, though transition was costly."},
    {ctx:"Historian: The revisionist interpretation challenges the traditional narrative by foregrounding the agency of ordinary people rather than focusing exclusively on political elites and their decisions.",q:"What does the revisionist view emphasize?",opts:["A) political leaders","B) economic factors","C) ordinary people's agency","D) international relations"],ans:"C) ordinary people's agency",exp:"'foregrounding the agency of ordinary people'.",audio:"Historian: The revisionist view foregrounds ordinary people's agency rather than focusing on political elites."},
    {ctx:"Tech CEO: Artificial intelligence will not replace human workers wholesale, but it will fundamentally alter the nature of work. The roles most at risk are those involving routine cognitive tasks that can be codified and automated.",q:"Which jobs are most at risk according to the CEO?",opts:["A) creative roles","B) managerial roles","C) routine cognitive tasks","D) physical labour"],ans:"C) routine cognitive tasks",exp:"'roles involving routine cognitive tasks that can be codified'.",audio:"CEO: AI won't replace all workers, but roles involving routine cognitive tasks that can be automated are most at risk."},
    {ctx:"Sociologist: Social media platforms create feedback loops that reinforce existing beliefs — what psychologists call confirmation bias. Over time, this can deepen polarisation and make constructive dialogue increasingly difficult.",q:"What long-term effect does the sociologist describe?",opts:["A) reduced screen time","B) deepening social polarisation","C) more balanced opinions","D) increased civic participation"],ans:"B) deepening social polarisation",exp:"'deepen polarisation and make constructive dialogue increasingly difficult'.",audio:"Sociologist: Social media confirmation bias deepens polarisation over time, making constructive dialogue harder."}
  ],
  reading: [
    {ctx:"The anthropocene — the proposed geological epoch defined by dominant human impact on Earth's geology and ecosystems — remains controversial among scientists. Proponents argue that markers such as plutonium deposits and microplastic layers provide unambiguous stratigraphic evidence. Critics counter that defining epoch boundaries requires longer timescales.",q:"Why do critics oppose the Anthropocene designation?",opts:["A) human impact is overstated","B) epochs need longer timescales","C) evidence is fabricated","D) the concept is political"],ans:"B) epochs need longer timescales",exp:"'defining epoch boundaries requires longer timescales'."},
    {ctx:"Behavioural economists have demonstrated that individuals make systematically irrational decisions. Kahneman and Tversky's prospect theory shows that people feel losses more acutely than equivalent gains — a phenomenon known as loss aversion — which distorts financial decision-making.",q:"What does loss aversion mean?",opts:["A) avoiding financial risk","B) preferring gains over losses","C) feeling losses more intensely than equivalent gains","D) being unable to make decisions"],ans:"C) feeling losses more intensely than equivalent gains",exp:"'feel losses more acutely than equivalent gains'."},
    {ctx:"Gene editing technologies such as CRISPR-Cas9 offer unprecedented precision in modifying DNA. While therapeutic applications for genetic diseases show enormous promise, the prospect of germline editing — changes that would be inherited by future generations — raises profound ethical questions about consent and the definition of disability.",q:"What makes germline editing ethically distinct?",opts:["A) it is more expensive","B) it only works on adults","C) it affects future generations","D) it is less precise"],ans:"C) it affects future generations",exp:"'changes that would be inherited by future generations'."},
    {ctx:"The placebo effect's mechanisms remain incompletely understood, but neuroimaging studies show that the mere expectation of treatment triggers measurable neurological changes, including endorphin release. This challenges the view of medicine as purely biological and highlights the brain's role in healing.",q:"What is significant about the placebo effect?",opts:["A) it works only in severe illness","B) it triggers measurable brain changes","C) it replaces conventional medicine","D) it is purely psychological with no physical effect"],ans:"B) it triggers measurable brain changes",exp:"'triggers measurable neurological changes'."},
    {ctx:"The proliferation of so-called 'dark patterns' in digital design — interface choices that manipulate users into unintended actions such as subscribing to services or sharing data — has prompted regulatory scrutiny in Europe, with the EU's Digital Services Act targeting deceptive design explicitly.",q:"What are 'dark patterns' in digital design?",opts:["A) designs that are visually unappealing","B) manipulative interface choices","C) error messages that confuse users","D) outdated software interfaces"],ans:"B) manipulative interface choices",exp:"'interface choices that manipulate users into unintended actions'."},
    {ctx:"Urban heat islands — zones in cities that are significantly warmer than surrounding rural areas due to heat-absorbing surfaces and reduced vegetation — are exacerbated by climate change. Mitigation strategies include green roofs, urban forests, and high-albedo building materials.",q:"What makes urban heat islands worse?",opts:["A) population growth","B) air pollution","C) climate change","D) noise pollution"],ans:"C) climate change",exp:"'exacerbated by climate change'."},
    {ctx:"The 'resource curse' paradox describes how countries with abundant natural resources often experience lower economic growth and worse development outcomes than resource-poor nations. Explanations include exchange rate appreciation that harms other exports and the entrenchment of extractive political institutions.",q:"What is one explanation for the resource curse?",opts:["A) lack of foreign investment","B) exchange rate effects harming exports","C) over-reliance on agriculture","D) population decline"],ans:"B) exchange rate effects harming exports",exp:"'exchange rate appreciation that harms other exports'."},
    {ctx:"Intersectionality, coined by legal scholar Kimberlé Crenshaw, describes how overlapping social identities — race, gender, class — interact to create unique forms of discrimination that cannot be understood by examining each identity in isolation.",q:"What does intersectionality emphasize?",opts:["A) prioritising one form of discrimination","B) treating all discrimination as equal","C) understanding overlapping identities together","D) focusing on legal remedies"],ans:"C) understanding overlapping identities together",exp:"'overlapping social identities...interact to create unique forms of discrimination'."},
    {ctx:"Neurodiversity advocates argue that conditions such as autism, ADHD, and dyslexia represent natural variations in human cognition rather than deficits. This reframing has implications for education, employment policy, and clinical practice.",q:"What does the neurodiversity perspective argue?",opts:["A) these conditions should be treated aggressively","B) these conditions are purely social constructs","C) they represent natural cognitive variation","D) they only affect children"],ans:"C) they represent natural cognitive variation",exp:"'natural variations in human cognition rather than deficits'."},
    {ctx:"Algorithmic accountability refers to the responsibility to explain and justify decisions made by automated systems. As machine learning systems are deployed in high-stakes domains — credit scoring, parole decisions, medical diagnosis — opacity in their decision-making raises significant fairness concerns.",q:"Why is algorithmic accountability important?",opts:["A) algorithms are often inaccurate","B) automated decisions in high-stakes areas must be explainable","C) algorithms are too expensive","D) they replace too many human workers"],ans:"B) automated decisions in high-stakes areas must be explainable",exp:"'decisions made by automated systems...raises significant fairness concerns'."}
  ],
  writing: [
    {q:"Fill in: 'The research, ___ in three countries, challenges previous assumptions.'",opts:["A) conducting","B) conducted","C) which conducting","D) having been conduct"],ans:"B) conducted",exp:"Reduced relative clause with past participle (passive)."},
    {q:"Fill in: 'Were the proposal to be accepted, it ___ significant investment.'",opts:["A) requires","B) will require","C) would require","D) required"],ans:"C) would require",exp:"Inverted conditional (formal): Were + to-infinitive, would + base."},
    {q:"Fill in: 'The extent ___ which inequality drives social unrest is debated.'",opts:["A) of","B) to","C) by","D) in"],ans:"B) to",exp:"'The extent to which' = fixed formal phrase."},
    {q:"Fill in: 'No sooner ___ the announcement made than criticism followed.'",opts:["A) was","B) had","C) did","D) is"],ans:"A) was",exp:"Inversion after 'no sooner': No sooner + was/had + subject."},
    {q:"Fill in: 'The framework, while theoretically sound, has ___ in practical application.'",opts:["A) shortcomings","B) shortcoming","C) a shortcoming of","D) shortcomings of"],ans:"A) shortcomings",exp:"Has + plural noun (shortcomings = weaknesses)."},
    {q:"Fill in: 'It is widely acknowledged ___ social media has reshaped public discourse.'",opts:["A) which","B) that","C) how","D) what"],ans:"B) that",exp:"It is acknowledged + that-clause."},
    {q:"Fill in: 'She addressed the committee, ___ having prepared extensively.'",opts:["A) despite","B) although","C) however","D) nevertheless"],ans:"A) despite",exp:"Despite + gerund phrase."},
    {q:"Fill in: 'Only by reforming the tax system ___ the deficit be reduced.'",opts:["A) can","B) the deficit","C) will","D) could possibly"],ans:"A) can",exp:"Inversion after 'only by': Only by + gerund + auxiliary + subject."},
    {q:"Fill in: 'The implications of this finding ___ yet to be fully understood.'",opts:["A) is","B) are","C) has","D) was"],ans:"B) are",exp:"Subject: 'implications' (plural) → are."},
    {q:"Fill in: 'Rarely ___ such a significant shift in policy occurred within a single decade.'",opts:["A) has","B) had","C) have","D) did"],ans:"A) has",exp:"Inversion after 'rarely': Rarely + has + subject + past participle."}
  ]
},

// ─────────────────────────── C1 — Advanced ───────────────────────────
"C1": {
  _meta: { label:"C1", desc:"Advanced", equiv:"CEFR C1", ielts:"7.0–7.5", toeic:"900–989" },
  vocab: [
    {q:"'Equivocate' means:",opts:["A) to speak clearly","B) to use ambiguous language to avoid commitment","C) to argue logically","D) to remain silent"],ans:"B) to use ambiguous language to avoid commitment",exp:"Equivocate = hedge, use ambiguous language deliberately."},
    {q:"'Salient' means:",opts:["A) hidden from view","B) most noticeable or important","C) scientifically proven","D) open to debate"],ans:"B) most noticeable or important",exp:"Salient = prominently relevant."},
    {q:"'Perfunctory' describes something done:",opts:["A) with great care","B) with mechanical routine and little thought","C) with genuine enthusiasm","D) with detailed analysis"],ans:"B) with mechanical routine and little thought",exp:"Perfunctory = done as routine, without care."},
    {q:"'Specious' means:",opts:["A) genuinely convincing","B) very rare","C) superficially plausible but actually flawed","D) extremely detailed"],ans:"C) superficially plausible but actually flawed",exp:"Specious = misleadingly attractive or logical."},
    {q:"'Inimical' means:",opts:["A) friendly and supportive","B) harmful or hostile to","C) impossible to measure","D) relating to animals"],ans:"B) harmful or hostile to",exp:"Inimical = tending to obstruct or harm."},
    {q:"'Pellucid' means:",opts:["A) extremely complex","B) transparently clear","C) historically important","D) emotionally charged"],ans:"B) transparently clear",exp:"Pellucid = lucidly clear in expression or meaning."},
    {q:"'Tendentious' describes writing that:",opts:["A) is factually accurate","B) promotes a particular cause","C) avoids all opinion","D) is technically precise"],ans:"B) promotes a particular cause",exp:"Tendentious = biased toward a particular viewpoint."},
    {q:"'Attenuate' means:",opts:["A) to strengthen","B) to redirect","C) to reduce in force or value","D) to examine closely"],ans:"C) to reduce in force or value",exp:"Attenuate = weaken or reduce."},
    {q:"'Apocryphal' describes something:",opts:["A) historically verified","B) of doubtful authenticity","C) very obscure","D) mathematically precise"],ans:"B) of doubtful authenticity",exp:"Apocryphal = of unknown or doubtful authorship."},
    {q:"'Laconic' means:",opts:["A) using many words","B) using very few words","C) very emotional","D) very technical"],ans:"B) using very few words",exp:"Laconic = brief, using minimal words."}
  ],
  listening: [
    {ctx:"Professor: The problem with much contemporary policy-making is that it privileges legibility over complexity — it demands interventions that are administratively tractable rather than those most likely to address the underlying dynamics of a problem.",q:"What does the professor criticise about policy-making?",opts:["A) it is too expensive","B) it favours manageable over effective interventions","C) it ignores expert advice","D) it relies too heavily on data"],ans:"B) it favours manageable over effective interventions",exp:"'privileges legibility over complexity...administratively tractable'.",audio:"Professor: Policy-making privileges legibility over complexity — favoring tractable interventions over those addressing underlying dynamics."},
    {ctx:"Critic: The novel's formal ambiguity is not a flaw but its central achievement. By refusing to resolve its structural tensions, it enacts at the level of form the very irresolvability it thematises in its content.",q:"What does the critic argue about the novel's formal ambiguity?",opts:["A) it weakens the narrative","B) it is unintentional","C) it reflects the novel's themes","D) it confuses readers unnecessarily"],ans:"C) it reflects the novel's themes",exp:"'enacts at the level of form the very irresolvability it thematises in content'.",audio:"Critic: The novel's ambiguity enacts at form level the irresolvability it thematises in content — a central achievement."},
    {ctx:"Economist: The paradox of thrift illustrates a key Keynesian insight: behaviour that is individually rational — saving more during uncertainty — can be collectively catastrophic if everyone does it simultaneously, depressing aggregate demand.",q:"What does the paradox of thrift illustrate?",opts:["A) saving is always beneficial","B) individually rational behaviour can be collectively harmful","C) government spending is wasteful","D) recessions are unavoidable"],ans:"B) individually rational behaviour can be collectively harmful",exp:"'individually rational...collectively catastrophic'.",audio:"Economist: The paradox of thrift: individually rational saving, done collectively, depresses aggregate demand — a Keynesian insight."},
    {ctx:"Philosopher: Moral realism's central claim — that some moral statements are objectively true — faces the challenge of explaining how we could have epistemic access to mind-independent moral facts, given that our moral intuitions seem to vary culturally.",q:"What is the challenge to moral realism described?",opts:["A) morality is purely emotional","B) moral facts cannot be defined","C) how we could know objective moral truths given cultural variation","D) moral language is meaningless"],ans:"C) how we could know objective moral truths given cultural variation",exp:"'epistemic access to mind-independent moral facts...moral intuitions vary culturally'.",audio:"Philosopher: Moral realism claims some moral statements are objectively true, but how can we access mind-independent moral facts given cultural variation?"},
    {ctx:"Neuroscientist: The hard problem of consciousness — explaining why there is something it is like to have experience at all — resists solution by third-person neuroscientific methods, since those methods, however refined, describe functional correlates rather than phenomenal experience itself.",q:"Why does the hard problem resist neuroscience?",opts:["A) neuroscience lacks data","B) the brain is too complex","C) third-person methods describe function, not experience","D) consciousness is supernatural"],ans:"C) third-person methods describe function, not experience",exp:"'third-person methods...describe functional correlates rather than phenomenal experience'.",audio:"Neuroscientist: Neuroscience describes functional correlates, not phenomenal experience itself — which is why the hard problem resists third-person methods."},
    {ctx:"Historian: Counterfactual history is sometimes dismissed as speculation, but it is indispensable for causal analysis. To claim that event A caused event B, one must implicitly assert that absent A, B would not have occurred — which is itself a counterfactual claim.",q:"Why does the historian defend counterfactual history?",opts:["A) it is more interesting","B) causal claims implicitly require counterfactuals","C) it avoids political bias","D) it fills gaps in the record"],ans:"B) causal claims implicitly require counterfactuals",exp:"'To claim A caused B...is itself a counterfactual claim'.",audio:"Historian: Counterfactual history is indispensable — causal claims implicitly require counterfactuals."},
    {ctx:"Literary theorist: The death of the author, as Barthes conceived it, does not mean authors are irrelevant but that the meaning of a text is not fixed by authorial intention. Meaning is produced in the encounter between text and reader.",q:"What does 'the death of the author' mean according to the theorist?",opts:["A) authors are unimportant","B) meaning is fixed in the text","C) meaning arises from text-reader interaction","D) authors should remain anonymous"],ans:"C) meaning arises from text-reader interaction",exp:"'produced in the encounter between text and reader'.",audio:"Theorist: 'Death of the author' means meaning isn't fixed by intention — it's produced in the text-reader encounter."},
    {ctx:"Climate scientist: The distinction between mitigation and adaptation is crucial. Mitigation reduces future emissions to prevent worse warming; adaptation adjusts to changes already locked in. Both are necessary, but the balance of investment between them involves profound value judgements.",q:"What does the scientist say about mitigation and adaptation?",opts:["A) mitigation is more important","B) adaptation is no longer necessary","C) both are needed and their balance involves values","D) only wealthy countries can afford both"],ans:"C) both are needed and their balance involves values",exp:"'Both are necessary, but the balance...involves profound value judgements'.",audio:"Scientist: Both mitigation and adaptation are necessary; the investment balance between them involves value judgements."},
    {ctx:"Linguist: The Sapir-Whorf hypothesis in its strong form — that language determines thought — has largely been discredited. The weak version — that language influences habitual patterns of thought — retains empirical support, particularly in domains like colour perception and spatial reasoning.",q:"What is the current status of the weak Sapir-Whorf hypothesis?",opts:["A) it has been discredited","B) it is untestable","C) it retains empirical support","D) it is identical to the strong version"],ans:"C) it retains empirical support",exp:"'weak version...retains empirical support'.",audio:"Linguist: The strong Sapir-Whorf is discredited; the weak version — language influences thought patterns — retains empirical support."},
    {ctx:"Sociologist: The concept of symbolic capital — prestige, honour, recognition — is crucial to Bourdieu's theory. Unlike economic capital, it operates through misrecognition: it is most powerful when it is least visible as a form of power.",q:"What makes symbolic capital most powerful?",opts:["A) when it is loudly displayed","B) when it is combined with wealth","C) when it is least visible as power","D) when it is formally recognised"],ans:"C) when it is least visible as power",exp:"'most powerful when it is least visible as a form of power'.",audio:"Sociologist: Bourdieu's symbolic capital is most powerful when least visible as power — it operates through misrecognition."}
  ],
  reading: [
    {ctx:"Wittgenstein's later philosophy, culminating in the Philosophical Investigations, represents a repudiation of the picture theory of meaning advanced in the Tractatus. Where the Tractatus held that propositions depict possible states of affairs, the Investigations locates meaning in use — in the 'language games' embedded in forms of life.",q:"What shift does Wittgenstein's later work represent?",opts:["A) from logic to ethics","B) from meaning as depiction to meaning as use","C) from certainty to scepticism","D) from language to mathematics"],ans:"B) from meaning as depiction to meaning as use",exp:"'locates meaning in use' vs 'propositions depict possible states'."},
    {ctx:"The principal-agent problem arises when one party (the agent) is engaged to act in the interests of another (the principal) but has incentives to act in their own interest instead. The divergence of interests is exacerbated by information asymmetry, since agents typically know more about their own actions than principals.",q:"What makes the principal-agent problem worse?",opts:["A) legal constraints","B) market competition","C) information asymmetry","D) high transaction costs"],ans:"C) information asymmetry",exp:"'exacerbated by information asymmetry'."},
    {ctx:"Rawls' veil of ignorance is a heuristic for designing just institutions: imagine you are choosing principles of justice without knowing your position in society — your wealth, talents, or identity. Rawls argues rational agents behind this veil would choose principles that maximise the position of the worst-off.",q:"What principle would rational agents choose behind the veil?",opts:["A) maximise average welfare","B) protect existing inequalities","C) maximise the position of the worst-off","D) ensure equal outcomes"],ans:"C) maximise the position of the worst-off",exp:"'principles that maximise the position of the worst-off'."},
    {ctx:"The concept of regulatory capture describes a situation in which regulatory agencies, originally established to act in the public interest, come to be dominated by the industries they regulate. This can occur through revolving doors between industry and regulatory bodies, information dependencies, and lobbying.",q:"How does regulatory capture occur according to the passage?",opts:["A) through corruption only","B) through revolving doors and information dependencies","C) through public pressure","D) through international treaties"],ans:"B) through revolving doors and information dependencies",exp:"'revolving doors...information dependencies, and lobbying'."},
    {ctx:"Epigenetics has complicated the classical gene-centric view of heredity by demonstrating that gene expression can be modified by environmental factors without changes to the DNA sequence itself. Crucially, some epigenetic modifications can be transmitted across generations, blurring the boundary between acquired and inherited traits.",q:"What is the significance of trans-generational epigenetic transmission?",opts:["A) DNA is unstable","B) acquired traits can be inherited","C) genes are unimportant","D) environmental factors don't affect development"],ans:"B) acquired traits can be inherited",exp:"'acquired and inherited traits' distinction is blurred."},
    {ctx:"The tragedy of the commons, articulated by Garrett Hardin, describes how rational self-interest in shared resource exploitation leads to collective destruction. However, Elinor Ostrom's empirical work demonstrated that communities frequently develop effective governance mechanisms to manage commons sustainably without privatisation or state regulation.",q:"What did Ostrom's work demonstrate?",opts:["A) the tragedy of the commons is inevitable","B) private ownership is essential","C) communities can self-govern commons sustainably","D) state regulation is the only solution"],ans:"C) communities can self-govern commons sustainably",exp:"'communities frequently develop effective governance mechanisms'."},
    {ctx:"Postcolonial theory interrogates how colonial power structures persist in epistemic, cultural, and institutional forms after formal decolonisation. Scholars like Said, Spivak, and Bhabha have examined how the colonial encounter produced knowledge formations that marginalised or silenced subaltern voices.",q:"What does postcolonial theory examine?",opts:["A) the economic causes of colonialism","B) how to achieve political independence","C) persistence of colonial power in knowledge and culture","D) military history of empires"],ans:"C) persistence of colonial power in knowledge and culture",exp:"'colonial power structures persist in epistemic, cultural, and institutional forms'."},
    {ctx:"The black swan metaphor, popularised by Nassim Taleb, describes high-impact, low-probability events that are unpredictable in advance yet rationalised as inevitable in retrospect. Taleb argues conventional risk models are systematically inadequate because they assume Gaussian distributions that underestimate tail risk.",q:"What is Taleb's criticism of conventional risk models?",opts:["A) they are too conservative","B) they rely on subjective judgement","C) they underestimate extreme events","D) they are too expensive to implement"],ans:"C) they underestimate extreme events",exp:"'underestimate tail risk'."},
    {ctx:"Structural linguistics, following Saussure, holds that linguistic signs are arbitrary — the relationship between signifier and signified is conventional, not natural. This arbitrariness is the condition of linguistic creativity: because signs are not bound to the world, they can be recombined indefinitely.",q:"What does the arbitrariness of signs enable?",opts:["A) greater accuracy","B) fixed meanings","C) indefinite recombination of signs","D) direct reference to reality"],ans:"C) indefinite recombination of signs",exp:"'because signs are not bound to the world, they can be recombined indefinitely'."},
    {ctx:"Frankfurt School critical theory distinguished itself from traditional theory by insisting that social inquiry cannot be value-neutral. The theorist is always positioned within the social totality they study, and emancipatory knowledge — knowledge oriented toward human liberation — is normatively superior to instrumental knowledge oriented toward control.",q:"What distinguishes emancipatory from instrumental knowledge?",opts:["A) emancipatory knowledge is more accurate","B) emancipatory knowledge is oriented toward liberation","C) instrumental knowledge is more practical","D) they are methodologically identical"],ans:"B) emancipatory knowledge is oriented toward liberation",exp:"'emancipatory knowledge — oriented toward human liberation'."}
  ],
  writing: [
    {q:"Fill in: 'The argument, ___ superficially compelling, collapses under scrutiny.'",opts:["A) while","B) despite","C) however","D) even so"],ans:"A) while",exp:"'While superficially compelling' = concessive clause."},
    {q:"Fill in: 'It is ___ that the policy has had unintended consequences.'",opts:["A) undeniable","B) undeniably","C) undeniably true","D) an undeniable"],ans:"A) undeniable",exp:"It is + adjective (not adverb) in predicative position."},
    {q:"Fill in: 'The data ___ to a more complex picture than initially assumed.'",opts:["A) points","B) point","C) is pointing","D) pointed"],ans:"A) points",exp:"'The data' in academic English takes singular verb."},
    {q:"Fill in: 'Such ___ the complexity of the issue that no single intervention can resolve it.'",opts:["A) is","B) are","C) has","D) was"],ans:"A) is",exp:"'Such is...' = inverted exclamatory/emphatic construction."},
    {q:"Fill in: '___ one takes an instrumentalist or a realist view, the predictions remain the same.'",opts:["A) Whether","B) Although","C) Despite","D) However"],ans:"A) Whether",exp:"Whether...or... = regardless of which alternative."},
    {q:"Fill in: 'The phenomenon resists easy classification, ___ its theoretical interest.'",opts:["A) hence","B) thus","C) whence","D) therefore"],ans:"C) whence",exp:"'Whence' = from which; formal causal connective."},
    {q:"Fill in: 'There is little ___ that the intervention had any measurable effect.'",opts:["A) proof","B) evidence","C) doubt","D) argument"],ans:"B) evidence",exp:"'Little evidence that' = standard academic hedging."},
    {q:"Fill in: 'The position, ___ defensible in principle, is difficult to operationalise.'",opts:["A) if","B) as","C: while","D) although"],ans:"C) while",exp:"'While defensible in principle' = reduced concessive clause."},
    {q:"Fill in: 'Not until the late twentieth century ___ the concept gain widespread acceptance.'",opts:["A) the concept","B) did","C) has","D) was"],ans:"B) did",exp:"Inversion after 'not until': Not until + time + did + subject."},
    {q:"Fill in: 'The framework ___ well to contexts outside its original scope.'",opts:["A) generalises","B) general","C) is generalising","D) generalised to"],ans:"A) generalises",exp:"'Generalise to/well' — present simple for general truths."}
  ]
},

// ─────────────────────────── C2 — Mastery ───────────────────────────
"C2": {
  _meta: { label:"C2", desc:"Mastery / Proficiency", equiv:"CEFR C2", ielts:"8.0–9.0", toeic:"990" },
  vocab: [
    {q:"'Tendentious' most precisely describes discourse that:",opts:["A) is logically rigorous","B) advances a particular viewpoint through selective emphasis","C) avoids all rhetorical devices","D) relies on empirical evidence"],ans:"B) advances a particular viewpoint through selective emphasis",exp:"Tendentious = promoting a particular cause, often unfairly one-sided."},
    {q:"'Prolix' describes writing that is:",opts:["A) excessively concise","B) using unnecessarily many words","C) technically imprecise","D) emotionally neutral"],ans:"B) using unnecessarily many words",exp:"Prolix = tiresomely wordy."},
    {q:"'Apophatic' theology proceeds by:",opts:["A) stating what God is","B) describing God through positive attributes","C) saying what God is not","D) using mathematical logic"],ans:"C) saying what God is not",exp:"Apophatic = via negativa; defining by negation."},
    {q:"'Aporetic' means:",opts:["A) expressing certainty","B) expressing insoluble doubt or puzzlement","C) logically decisive","D) historically verified"],ans:"B) expressing insoluble doubt or puzzlement",exp:"Aporetic = marked by aporia; expressing irresolvable perplexity."},
    {q:"'Synecdoche' is a figure of speech in which:",opts:["A) an idea is repeated for emphasis","B) a part stands for the whole or vice versa","C) opposite meanings are juxtaposed","D) a word imitates a sound"],ans:"B) a part stands for the whole or vice versa",exp:"Synecdoche = pars pro toto (e.g. 'all hands on deck')."},
    {q:"'Enantiosemy' refers to a word that:",opts:["A) has no known etymology","B) contains its own antonym","C) is used only in formal registers","D) has identical sound and spelling to another"],ans:"B) contains its own antonym",exp:"Enantiosemy = one word holding opposing meanings (e.g. 'sanction')."},
    {q:"'Heterodox' most precisely means:",opts:["A) conforming to established doctrine","B) departing from accepted beliefs","C) relating to religious hierarchy","D) empirically unverifiable"],ans:"B) departing from accepted beliefs",exp:"Heterodox = contrary to orthodox opinion."},
    {q:"'Palimpsest' is used metaphorically to describe:",opts:["A) a completely erased record","B) a clear and unambiguous document","C) something carrying traces of earlier versions","D) a forgery"],ans:"C) something carrying traces of earlier versions",exp:"Palimpsest = a text or surface in which earlier writing is visible beneath new writing."},
    {q:"'Bricolage' in cultural theory describes:",opts:["A) the creation of original works","B) construction using whatever materials are available","C) systematic theoretical analysis","D) strict adherence to genre conventions"],ans:"B) construction using whatever materials are available",exp:"Bricolage = constructing something from available materials, repurposing them."},
    {q:"'Apotropaic' means:",opts:["A) relating to logical proof","B) intended to ward off evil","C) expressing grief","D) belonging to oral tradition"],ans:"B) intended to ward off evil",exp:"Apotropaic = having the power to avert evil influences."}
  ],
  listening: [
    {ctx:"Philosopher: The relationship between reasons and causes is complicated. To explain an action by citing reasons is to give it a rational reconstruction — but whether those reasons are also causally efficacious in producing the action is a separate, and deeply contested, empirical and conceptual question.",q:"What philosophical distinction does the speaker draw?",opts:["A) between ethics and logic","B) between rational reconstruction and causal explanation","C) between empirical and normative claims","D) between action and intention"],ans:"B) between rational reconstruction and causal explanation",exp:"'rational reconstruction' vs 'causally efficacious in producing the action'.",audio:"Philosopher: Explaining action by reasons is rational reconstruction; whether those reasons are causally efficacious is a separate question."},
    {ctx:"Critic: The poem's ostensible subject — the changing seasons — is merely the vehicle for a sustained meditation on mortality that accumulates through a series of oblique, paratactic juxtapositions rather than through discursive argument.",q:"How does the poem develop its meditation on mortality?",opts:["A) through direct statement","B) through narrative progression","C) through oblique paratactic juxtapositions","D) through rhetorical questions"],ans:"C) through oblique paratactic juxtapositions",exp:"'oblique, paratactic juxtapositions rather than discursive argument'.",audio:"Critic: The poem develops its mortality meditation through oblique, paratactic juxtapositions rather than discursive argument."},
    {ctx:"Economist: The efficient market hypothesis exists in three forms. The weak form holds that past prices cannot predict future prices; the semi-strong that public information is already priced in; the strong that even private information cannot generate abnormal returns. Most empirical evidence challenges the strong form.",q:"Which form of EMH has the weakest empirical support?",opts:["A) weak form","B) semi-strong form","C) strong form","D) all three equally"],ans:"C) strong form",exp:"'Most empirical evidence challenges the strong form'.",audio:"Economist: EMH's strong form — that even private info can't generate abnormal returns — has the weakest empirical support."},
    {ctx:"Anthropologist: Gift exchange in Mauss's analysis is never purely altruistic nor purely economic. The obligation to give, receive, and reciprocate constitutes a total social fact — a phenomenon in which legal, economic, religious, and aesthetic dimensions are simultaneously present.",q:"What does Mauss's 'total social fact' mean in this context?",opts:["A) gift exchange is fundamentally economic","B) gift exchange incorporates multiple social dimensions simultaneously","C) gift exchange is religious in origin","D) gift exchange is primarily legal"],ans:"B) gift exchange incorporates multiple social dimensions simultaneously",exp:"'legal, economic, religious, and aesthetic dimensions are simultaneously present'.",audio:"Anthropologist: Mauss's 'total social fact' in gift exchange means legal, economic, religious, and aesthetic dimensions are simultaneously present."},
    {ctx:"Legal theorist: Hart and Dworkin's debate over legal positivism hinges on whether law is a system of social facts — rules that can be identified without recourse to their moral merits — or whether moral principles are always already constitutive of law's content.",q:"What is the core of the Hart-Dworkin debate?",opts:["A) whether judges should make law","B) whether law is separate from morality","C) whether legal systems are universal","D) whether precedent should bind courts"],ans:"B) whether law is separate from morality",exp:"'law is a system of social facts' vs 'moral principles are constitutive of law'.",audio:"Legal theorist: Hart vs Dworkin: is law identifiable without moral merits, or are moral principles constitutive of law?"},
    {ctx:"Physicist: Quantum entanglement suggests that measuring one particle instantaneously determines the state of its entangled partner, regardless of distance. This does not permit faster-than-light communication, however, because the measurement outcomes appear random locally and only reveal their correlation when results are compared through conventional channels.",q:"Why doesn't entanglement permit faster-than-light communication?",opts:["A) particles move too slowly","B) only one particle can be measured","C) local outcomes are random and correlation requires conventional comparison","D) the effect degrades over distance"],ans:"C) local outcomes are random and correlation requires conventional comparison",exp:"'measurement outcomes appear random locally...only reveal correlation when compared through conventional channels'.",audio:"Physicist: Entanglement doesn't allow FTL communication — local results appear random; correlation only emerges through conventional comparison."},
    {ctx:"Literary critic: Derrida's différance, with its untranslatable play on differing and deferring, stages the impossibility of presence in language: meaning is never fully present in a sign but is always constituted through its difference from other signs and deferred along a chain of signification.",q:"What does Derrida's différance stage?",opts:["A) the presence of meaning in signs","B) the independence of signs from context","C) the impossibility of full presence in language","D) the priority of speech over writing"],ans:"C) the impossibility of full presence in language",exp:"'meaning is never fully present...always constituted through difference and deferred'.",audio:"Critic: Derrida's différance stages the impossibility of presence — meaning is never fully present, always differed and deferred."},
    {ctx:"Neurophilosopher: The predictive processing framework, developed by Friston and Clark among others, reframes perception not as passive reception of sensory data but as active hypothesis-testing in which the brain continuously generates predictions and updates them on the basis of prediction error.",q:"How does predictive processing reframe perception?",opts:["A) as passive data reception","B) as instinctive response","C) as active hypothesis-testing updated by prediction error","D) as pattern matching from memory"],ans:"C) as active hypothesis-testing updated by prediction error",exp:"'active hypothesis-testing...updates on the basis of prediction error'.",audio:"Neurophilosopher: Predictive processing reframes perception as active hypothesis-testing updated by prediction error, not passive reception."},
    {ctx:"Historian of science: The demarcation problem — distinguishing science from non-science — has resisted solution. Popper's falsifiability criterion fails to exclude clearly non-scientific theories and incorrectly excludes some well-confirmed scientific ones. Lakatos's sophisticated falsificationism introduced the notion of research programmes with hard cores protected by auxiliary hypotheses.",q:"What is Lakatos's contribution to the demarcation problem?",opts:["A) he endorsed Popper's criterion","B) he rejected demarcation as impossible","C) he introduced research programmes with protected cores","D) he proposed experiments as the sole criterion"],ans:"C) he introduced research programmes with protected cores",exp:"'research programmes with hard cores protected by auxiliary hypotheses'.",audio:"Historian: Lakatos responded to Popper's demarcation problems with research programmes — hard cores protected by auxiliary hypotheses."},
    {ctx:"Moral philosopher: Parfit's teletransportation puzzle challenges personal identity theories. If you are scanned, your body destroyed, and a perfect replica created elsewhere, is it you who arrives? The psychological continuity theory says yes; the biological criterion says no. The puzzle suggests that personal identity may not be what matters for survival.",q:"What is Parfit's conclusion from the puzzle?",opts:["A) personal identity is biologically determined","B) teletransportation is impossible","C) psychological continuity guarantees identity","D) personal identity may not be what ultimately matters"],ans:"D) personal identity may not be what ultimately matters",exp:"'personal identity may not be what matters for survival'.",audio:"Parfit: Teletransportation puzzle suggests personal identity — whatever theory you use — may not be what matters for survival."}
  ],
  reading: [
    {ctx:"Agamben's concept of the state of exception describes the paradoxical condition in which the sovereign suspends the legal order to preserve it — a zone of indistinction between law and its outside that Agamben argues is not a peripheral anomaly but the hidden foundation of political order.",q:"What does Agamben argue about the state of exception?",opts:["A) it is an emergency measure","B) it is foundational to political order","C) it occurs only in authoritarian states","D) it is prohibited by international law"],ans:"B) it is foundational to political order",exp:"'not a peripheral anomaly but the hidden foundation of political order'."},
    {ctx:"Gödel's incompleteness theorems demonstrate that within any consistent formal system sufficiently powerful to express basic arithmetic, there exist true statements that cannot be proved within that system. This limits the ambitions of logicism — the programme of grounding all mathematics in logic — and suggests that mathematical truth transcends formal provability.",q:"What is the implication for logicism?",opts:["A) mathematics is purely logical","B) all mathematical truths can be proved","C) mathematical truth exceeds formal provability","D) arithmetic is inconsistent"],ans:"C) mathematical truth exceeds formal provability",exp:"'mathematical truth transcends formal provability'."},
    {ctx:"Butler's performativity theory argues that gender is not an expression of an inner essence but is constituted through repeated citational performances. The appearance of a stable, coherent gender identity is an effect of this sedimented repetition, not its cause — which opens possibilities for subversive resignification.",q:"What makes subversive resignification possible?",opts:["A) gender has a stable inner essence","B) gender is biologically determined","C) gender is constituted by repeated performances that can be reiterated differently","D) legal change precedes cultural change"],ans:"C) gender is constituted by repeated performances that can be reiterated differently",exp:"'constituted through repeated citational performances...opens possibilities for subversive resignification'."},
    {ctx:"The extended mind thesis, proposed by Clark and Chalmers, challenges the assumption that cognitive processes are bounded by the skin and skull. If a notebook functions in cognitive processing in ways relevantly similar to how memory functions internally, the thesis claims, there is no principled reason to exclude it from the mind.",q:"On what basis does the extended mind thesis include external objects?",opts:["A) they are physically attached to the body","B) they function relevantly similarly to internal cognitive processes","C) they are made by humans","D) they are stored near the person"],ans:"B) they function relevantly similarly to internal cognitive processes",exp:"'functions in cognitive processing in ways relevantly similar to memory'."},
    {ctx:"Foucault's genealogy, adapting Nietzsche's method, traces the contingent, discontinuous, and power-laden origins of concepts and practices typically presented as natural or necessary. Rather than revealing hidden essences, genealogy exposes how the present is the product of struggles, accidents, and power relations.",q:"What does genealogy reveal, according to the passage?",opts:["A) the essential truth of concepts","B) universal historical laws","C) the contingent, power-laden origins of the present","D) the natural development of institutions"],ans:"C) the contingent, power-laden origins of the present",exp:"'contingent, discontinuous, and power-laden origins...product of struggles, accidents, and power relations'."},
    {ctx:"Žižek's reading of ideology follows Althusser in arguing that ideology operates not primarily through conscious belief but through practice — through what Althusser called 'Ideological State Apparatuses'. The subject who says 'I know very well X is ideology, but I act as if it weren't' exemplifies what Žižek calls the cynical structure of contemporary ideology.",q:"What characterises cynical ideology in Žižek's analysis?",opts:["A) sincere belief without awareness","B) awareness of ideology combined with continued compliance","C) rejection of all ideological systems","D) collective political resistance"],ans:"B) awareness of ideology combined with continued compliance",exp:"'I know very well X is ideology, but I act as if it weren't'."},
    {ctx:"In thermodynamics, the Maxwell demon thought experiment imagines a being who could sort fast and slow molecules without expending energy, apparently violating the second law. The resolution, proposed by Landauer, is that the demon's memory must be erased to complete the cycle, and erasure necessarily dissipates energy — linking information and thermodynamics.",q:"How does Landauer's principle resolve the Maxwell demon paradox?",opts:["A) the demon cannot distinguish molecules","B) information erasure dissipates energy","C) the second law applies only to gases","D) sorting requires physical contact"],ans:"B) information erasure dissipates energy",exp:"'erasure necessarily dissipates energy'."},
    {ctx:"Haraway's cyborg manifesto argued that the cyborg — the hybrid of organism and machine — is a useful ironic myth for feminist politics because it refuses the dualisms that have structured Western thought: nature/culture, body/mind, human/animal. Rather than recovering a pre-technological purity, the cyborg embraces the productive impurity of boundary crossing.",q:"Why does Haraway favour the cyborg as a political myth?",opts:["A) it restores natural purity","B) it transcends bodily experience","C) it refuses dualistic thinking through boundary crossing","D) it celebrates technological progress"],ans:"C) it refuses dualistic thinking through boundary crossing",exp:"'refuses the dualisms that have structured Western thought'."},
    {ctx:"The underdetermination thesis in philosophy of science holds that empirical evidence is always compatible with more than one theory: theories are underdetermined by the data. This raises the question of what non-evidential factors — simplicity, elegance, explanatory breadth — legitimately influence theory choice.",q:"What question does underdetermination raise?",opts:["A) whether experiments can be replicated","B) what role non-evidential factors play in choosing theories","C) whether observations are objective","D) how scientists reach consensus"],ans:"B) what role non-evidential factors play in choosing theories",exp:"'what non-evidential factors...legitimately influence theory choice'."},
    {ctx:"Negative capability, as Keats defined it, is the capacity to remain in uncertainty, mystery, and doubt without any irritable reaching after fact and reason. Keats considered it the defining quality of the poet, enabling the negative capability holder to inhabit contradictions rather than resolving them prematurely into system.",q:"What makes negative capability valuable for poetry?",opts:["A) it produces logical certainty","B) it enables inhabiting contradictions without premature resolution","C) it replaces reason with emotion","D) it increases factual accuracy"],ans:"B) it enables inhabiting contradictions without premature resolution",exp:"'inhabit contradictions rather than resolving them prematurely into system'."}
  ],
  writing: [
    {q:"Fill in: 'What appears ___ on the surface conceals deeper structural tensions.'",opts:["A) coherent","B) coherently","C) to be coherent","D) as coherent"],ans:"A) coherent",exp:"'What appears + adjective' — linking verb + predicate adjective."},
    {q:"Fill in: '___ all attempts at resolution, the contradiction persists.'",opts:["A) Despite of","B) Notwithstanding","C) In spite","D) Even though"],ans:"B) Notwithstanding",exp:"Notwithstanding = despite (preposition, no 'of')."},

    {ctx:"Woman: Our customer retention rate dropped from 87% to 81% this quarter. Man: That's concerning. Did the survey results shed any light on why? Woman: The main complaints were around response times and the self-service portal being difficult to navigate.",q:"What two issues did customers cite?",opts:["A) pricing and product quality","B) response times and difficult portal","C) delivery delays and billing errors","D) staff attitude and store hours"],ans:"B) response times and difficult portal",exp:"'response times and the self-service portal being difficult'.",audio:"Customer retention down from 87% to 81%. Main complaints: response times and difficult self-service portal."},

    {ctx:"Narrator: The following is a voicemail message. Hi, this is Priya from Cascade Design. I'm calling about the website mock-ups we submitted last Friday. We've received your general feedback, but to move forward we'll need your specific comments on the colour palette and typography by Thursday. Otherwise, we may need to push back the go-live date.",q:"What information is needed by Thursday?",opts:["A) budget approval","B) colour and typography feedback","C) final content copy","D) domain registration details"],ans:"B) colour and typography feedback",exp:"'specific comments on the colour palette and typography by Thursday'.",audio:"We need your comments on colour palette and typography by Thursday or the go-live date may slip."},
    {ctx:"Woman: The stakeholder presentation has been pushed to the 22nd. That gives us an extra week. Man: Good. I was worried the market analysis section wasn't solid enough. Woman: Agreed. Let's also revisit the risk assessment — a few assumptions there feel outdated.",q:"What needs to be revisited?",opts:["A) the financial model","B) the executive summary","C) the risk assessment","D) the team bios"],ans:"C) the risk assessment",exp:"'revisit the risk assessment — assumptions feel outdated'.",audio:"Presentation pushed to 22nd. Let's revisit the risk assessment — some assumptions feel outdated."},
    {ctx:"Man: I looked at the Q3 production figures. Output was up 8%, but defect rates also rose from 1.2% to 1.9%. Woman: So efficiency gains aren't translating to quality improvements. Man: Exactly. We may need to revisit the line configuration.",q:"What problem is identified?",opts:["A) output targets were missed","B) quality declined despite higher output","C) labour costs increased","D) supply chain disruption"],ans:"B) quality declined despite higher output",exp:"'defect rates rose from 1.2% to 1.9%'.",audio:"Output up 8% but defect rates rose from 1.2% to 1.9% — efficiency not translating to quality."},
    {ctx:"Narrator: The following is part of a business conference talk. The companies that have thrived post-pandemic share three traits: they invested in digital infrastructure before it was urgent, they maintained supplier diversification rather than optimising purely for cost, and they empowered mid-level managers to make rapid decisions.",q:"What is one trait of successful post-pandemic companies?",opts:["A) reducing headcount quickly","B) early investment in digital infrastructure","C) focusing on a single supplier","D) centralising all decision-making"],ans:"B) early investment in digital infrastructure",exp:"'invested in digital infrastructure before it was urgent'.",audio:"Successful post-pandemic companies invested in digital infrastructure early, maintained supplier diversification, and empowered managers."},
    {ctx:"Woman: We're seeing a bottleneck at the approval stage. On average, requests sit in the queue for 11 days before being processed. Man: That's well above our 5-day target. Is it a capacity issue or a process one? Woman: Mostly process — approvers say the routing rules are unclear.",q:"What is the root cause of the bottleneck?",opts:["A) insufficient staffing","B) unclear routing rules","C) outdated software","D) too many requests"],ans:"B) unclear routing rules",exp:"'approvers say the routing rules are unclear'.",audio:"Requests sit 11 days vs 5-day target. Root cause: routing rules are unclear, per approvers."},
    {ctx:"Man: We have three office space options. Option A is near the client, but the lease is above budget. Option B fits the budget but adds 20 minutes to the average commute. Option C is within budget and close to transit but requires a full fit-out.",q:"What is the drawback of Option C?",opts:["A) too expensive","B) poor location","C) requires a full fit-out","D) short lease term"],ans:"C) requires a full fit-out",exp:"'requires a full fit-out'.",audio:"Option C is in budget and near transit but requires a full fit-out."},
    {ctx:"Narrator: Good afternoon. I'm calling from Meridian Insurance. We've completed our review of your claim number 4471-B. We can confirm that the claim is covered under your policy. However, the settlement amount will be slightly lower than requested due to the depreciation calculation applied to the items listed.",q:"Why will the settlement be lower than requested?",opts:["A) the claim was partly rejected","B) the policy limit was exceeded","C) depreciation was applied","D) some items were excluded"],ans:"C) depreciation was applied",exp:"'due to the depreciation calculation applied to the items'.",audio:"Claim 4471-B is covered. Settlement will be slightly lower due to depreciation calculation on listed items."},
    {ctx:"Woman: I noticed our marketing spend is up 22% but conversion rates are flat. Man: We're probably hitting the wrong segments. Woman: Agreed — I'd recommend a full attribution analysis before we commit to next year's plan.",q:"What does the woman recommend?",opts:["A) reducing the budget","B) hiring a new agency","C) running an attribution analysis","D) pausing all campaigns"],ans:"C) running an attribution analysis",exp:"'recommend a full attribution analysis'.",audio:"Marketing spend up 22%, conversions flat. Woman: attribution analysis before committing to next year's plan."}

    {q:"The committee ___ whether to approve the proposal when new data emerged.",opts:["A) has been deliberating","B) was deliberating","C) deliberates","D) will have deliberated"],ans:"B) was deliberating",exp:"Past continuous: action in progress when another event occurred."},
    {ctx:"To: R. Tanaka\nFrom: M. Hoffman\nRe: Staffing Contingency Plan\nGiven the likelihood of project scope expansion in Q2, I recommend we pre-approve two contract positions. This would allow us to onboard quickly if scope is confirmed without going through a lengthy approval process mid-project.",q:"Why does Hoffman recommend pre-approving positions?",opts:["A) to reduce salary costs","B) to avoid delays if scope expands","C) to replace current staff","D) to meet a regulatory requirement"],ans:"B) to avoid delays if scope expands",exp:"'onboard quickly if scope is confirmed without a lengthy approval process'."},
    {q:"The facility operates at ___ capacity during peak season, often requiring temporary staff.",opts:["A) near-full","B) nearly full","C) near full","D) near to full"],ans:"A) near-full",exp:"Compound adjective before noun: near-full capacity."},
